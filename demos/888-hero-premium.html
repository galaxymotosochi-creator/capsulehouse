<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>888.ESTATE — Премиум</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Montserrat:wght@200;300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Cormorant Garamond', serif;
    overflow: hidden;
    height: 100vh;
    background: #f5f0eb;
  }

  #gradientCanvas {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    z-index: 0;
  }

  #particleCanvas {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    z-index: 1;
    pointer-events: none;
  }

  .overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    z-index: 2;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 40px;
    text-align: center;
  }

  .border-frame {
    position: fixed;
    top: 24px; left: 24px;
    right: 24px; bottom: 24px;
    border: 1px solid rgba(180, 150, 100, 0.15);
    z-index: 2;
    pointer-events: none;
    opacity: 0;
    animation: frameFade 2.5s ease forwards;
    animation-delay: 2s;
  }
  @keyframes frameFade {
    to { opacity: 1; }
  }

  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(4rem, 12vw, 10rem);
    letter-spacing: 0.35em;
    color: #2a2520;
    opacity: 0;
    animation: fadeUp 2s ease forwards;
    animation-delay: 0.5s;
    text-shadow: 0 2px 20px rgba(0,0,0,0.03);
  }
  .logo span { color: #b89664; font-weight: 600; }

  .tagline {
    font-family: 'Montserrat', sans-serif;
    font-weight: 200;
    font-size: clamp(0.85rem, 1.5vw, 1.2rem);
    letter-spacing: 0.6em;
    text-transform: uppercase;
    color: #8a7a6a;
    margin-top: 20px;
    opacity: 0;
    animation: fadeUp 2s ease forwards;
    animation-delay: 1.8s;
  }

  .divider {
    width: 0;
    height: 1px;
    background: #b89664;
    margin: 30px 0 20px;
    animation: lineGrow 2s ease forwards;
    animation-delay: 2.5s;
  }
  @keyframes lineGrow {
    to { width: 120px; }
  }

  .sub {
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    font-size: clamp(0.7rem, 1vw, 0.9rem);
    letter-spacing: 0.3em;
    color: #a09080;
    opacity: 0;
    animation: fadeUp 2s ease forwards;
    animation-delay: 3s;
  }

  @keyframes fadeUp {
    0% { opacity: 0; transform: translateY(30px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .scroll-hint {
    position: fixed;
    bottom: 50px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 3;
    opacity: 0;
    animation: fadeUp 2s ease forwards;
    animation-delay: 4s;
    cursor: pointer;
  }
  .scroll-hint span {
    display: block;
    font-family: 'Montserrat', sans-serif;
    font-size: 0.6rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #8a7a6a;
    margin-bottom: 8px;
  }
  .scroll-hint .mouse {
    width: 20px; height: 32px;
    border: 1.5px solid #b89664;
    border-radius: 10px;
    margin: 0 auto;
    position: relative;
  }
  .scroll-hint .mouse::after {
    content: '';
    position: absolute;
    top: 6px; left: 50%;
    transform: translateX(-50%);
    width: 2px; height: 6px;
    background: #b89664;
    border-radius: 2px;
    animation: scrollWheel 1.5s ease infinite;
  }
  @keyframes scrollWheel {
    0% { opacity: 1; transform: translateX(-50%) translateY(0); }
    100% { opacity: 0; transform: translateX(-50%) translateY(10px); }
  }

  @media (max-width: 768px) {
    .border-frame { top: 12px; left: 12px; right: 12px; bottom: 12px; }
    .logo { letter-spacing: 0.2em; }
    .tagline { letter-spacing: 0.3em; }
  }
</style>
</head>
<body>

<canvas id="gradientCanvas"></canvas>
<canvas id="particleCanvas"></canvas>

<div class="border-frame"></div>

<div class="overlay">
  <div class="logo"><span>888</span>.ESTATE</div>
  <div class="tagline">Премиальная недвижимость</div>
  <div class="divider"></div>
  <div class="sub">Сочи · Красная Поляна · Побережье</div>
</div>

<div class="scroll-hint">
  <span>Листайте</span>
  <div class="mouse"></div>
</div>

<script>
// ===================== ГРАДИЕНТНЫЙ ФОН =====================
const gradCanvas = document.getElementById('gradientCanvas');
const gCtx = gradCanvas.getContext('2d');

function resizeGrad() {
  gradCanvas.width = window.innerWidth;
  gradCanvas.height = window.innerHeight;
}
resizeGrad();
window.addEventListener('resize', resizeGrad);

const colors = [
  { r: 245, g: 240, b: 235 },
  { r: 242, g: 233, b: 220 },
  { r: 238, g: 225, b: 210 },
  { r: 248, g: 242, b: 235 },
  { r: 235, g: 225, b: 215 },
];

let colorIndex = 0;
let mix = 0;
const speed = 0.002;

function drawGradient(time) {
  const w = gradCanvas.width;
  const h = gradCanvas.height;

  const c1 = colors[colorIndex % colors.length];
  const c2 = colors[(colorIndex + 1) % colors.length];

  mix += speed;
  if (mix >= 1) { mix = 0; colorIndex++; }

  const t = easeInOut(mix);
  const r = c1.r + (c2.r - c1.r) * t;
  const g = c1.g + (c2.g - c1.g) * t;
  const b = c1.b + (c2.b - c1.b) * t;

  const cx = w * 0.5 + Math.sin(time * 0.00005) * w * 0.15;
  const cy = h * 0.4 + Math.cos(time * 0.00007) * h * 0.1;

  const gradient = gCtx.createRadialGradient(cx, cy, 0, cx, cy, w * 0.8);
  gradient.addColorStop(0, `rgb(${r+10},${g+8},${b+5})`);
  gradient.addColorStop(0.4, `rgb(${r},${g},${b})`);
  gradient.addColorStop(0.8, `rgb(${r-10},${g-8},${b-5})`);
  gradient.addColorStop(1, `rgb(${r-15},${g-12},${b-8})`);

  gCtx.fillStyle = gradient;
  gCtx.fillRect(0, 0, w, h);

  // лёгкий шум зернистости
  const imageData = gCtx.getImageData(0, 0, w, h);
  const d = imageData.data;
  for (let i = 0; i < d.length; i += 16) {
    const noise = (Math.random() - 0.5) * 6;
    d[i] += noise;
    d[i+1] += noise;
    d[i+2] += noise;
  }
  gCtx.putImageData(imageData, 0, 0);

  requestAnimationFrame(drawGradient);
}

function easeInOut(t) {
  return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
}

requestAnimationFrame(drawGradient);

// ===================== ЗОЛОТЫЕ ПЫЛИНКИ =====================
const pCtx = document.getElementById('particleCanvas').getContext('2d');
const pCanvas = document.getElementById('particleCanvas');

let particles = [];

function resizeParticles() {
  pCanvas.width = window.innerWidth;
  pCanvas.height = window.innerHeight;
  initParticles();
}

function initParticles() {
  particles = [];
  const count = Math.min(70, Math.floor(pCanvas.width * pCanvas.height / 15000));
  for (let i = 0; i < count; i++) {
    particles.push({
      x: Math.random() * pCanvas.width,
      y: Math.random() * pCanvas.height,
      size: Math.random() * 2.5 + 0.5,
      speedY: -Math.random() * 0.3 - 0.05,
      speedX: (Math.random() - 0.5) * 0.1,
      opacity: Math.random() * 0.4 + 0.1,
      pulse: Math.random() * Math.PI * 2,
      phase: Math.random() * Math.PI * 2,
    });
  }
}

let pWidth, pHeight;

function drawParticles(time) {
  pWidth = pCanvas.width;
  pHeight = pCanvas.height;
  pCtx.clearRect(0, 0, pWidth, pHeight);

  for (const p of particles) {
    p.pulse += 0.01;
    const flicker = 0.3 + 0.7 * Math.abs(Math.sin(p.pulse));

    const gold = `rgba(184, 150, 100, ${p.opacity * flicker})`;
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    pCtx.fillStyle = gold;
    pCtx.fill();

    // небольшое свечение
    const glow = pCtx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * 4);
    glow.addColorStop(0, `rgba(184, 150, 100, ${p.opacity * flicker * 0.2})`);
    glow.addColorStop(1, 'rgba(184, 150, 100, 0)');
    pCtx.fillStyle = glow;
    pCtx.fillRect(p.x - p.size * 4, p.y - p.size * 4, p.size * 8, p.size * 8);

    p.x += p.speedX;
    p.y += p.speedY;

    if (p.y < -10) { p.y = pHeight + 10; p.x = Math.random() * pWidth; }
    if (p.x < -10) p.x = pWidth + 10;
    if (p.x > pWidth + 10) p.x = -10;
  }

  requestAnimationFrame(drawParticles);
}

resizeParticles();
window.addEventListener('resize', resizeParticles);
requestAnimationFrame(drawParticles);
</script>
</body>
</html>
