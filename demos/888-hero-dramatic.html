<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>888.ESTATE — Премиальная недвижимость</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;600;700&family=Montserrat:wght@200;300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    overflow: hidden;
    height: 100vh;
    font-family: 'Cormorant Garamond', serif;
  }

  #threeCanvas {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    z-index: 0;
  }

  .overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    z-index: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    pointer-events: none;
  }

  .frame-line {
    position: fixed;
    background: rgba(180, 150, 100, 0.08);
    z-index: 1;
    animation: frameAppear 2s ease forwards;
    animation-delay: 2.5s;
    opacity: 0;
  }
  .frame-t, .frame-b { left: 30px; right: 30px; height: 1px; }
  .frame-l, .frame-r { top: 30px; bottom: 30px; width: 1px; }
  .frame-t { top: 30px; }
  .frame-b { bottom: 30px; }
  .frame-l { left: 30px; }
  .frame-r { right: 30px; }
  @keyframes frameAppear { to { opacity: 1; } }

  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(2.5rem, 10vw, 10rem);
    letter-spacing: 0.35em;
    color: #fff;
    opacity: 0;
    animation: logoReveal 2.5s ease forwards;
    animation-delay: 0.8s;
    text-align: center;
    line-height: 1;
    transition: text-shadow 1.5s ease;
  }
  .logo span {
    color: #c9a84c;
    font-weight: 700;
  }

  @keyframes logoReveal {
    0% { opacity: 0; transform: scale(0.9) translateY(20px); letter-spacing: 0.6em; filter: blur(4px); }
    60% { filter: blur(0); }
    100% { opacity: 1; transform: scale(1) translateY(0); letter-spacing: 0.35em; }
  }

  @keyframes textGlow {
    0%, 100% {
      text-shadow:
        0 0 30px rgba(201, 168, 76, 0.25),
        0 0 60px rgba(201, 168, 76, 0.1);
    }
    50% {
      text-shadow:
        0 0 50px rgba(201, 168, 76, 0.45),
        0 0 100px rgba(201, 168, 76, 0.2),
        0 0 150px rgba(201, 168, 76, 0.08);
    }
  }
  .logo.glow {
    animation: textGlow 3s ease-in-out infinite;
  }
  .logo.glow span {
    text-shadow:
      0 0 40px rgba(201, 168, 76, 0.4),
      0 0 80px rgba(201, 168, 76, 0.2),
      0 0 120px rgba(201, 168, 76, 0.1);
  }

  .tagline {
    font-family: 'Montserrat', sans-serif;
    font-weight: 200;
    font-size: clamp(0.6rem, 1.2vw, 1rem);
    letter-spacing: 0.7em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.6);
    margin-top: 24px;
    opacity: 0;
    animation: tagReveal 2s ease forwards;
    animation-delay: 2.5s;
    transition: text-shadow 1.5s ease;
  }
  .tagline.glow {
    animation: tagGlow 3s ease-in-out infinite;
  }
  @keyframes tagGlow {
    0%, 100% { text-shadow: 0 0 15px rgba(201, 168, 76, 0.15); }
    50% { text-shadow: 0 0 30px rgba(201, 168, 76, 0.3), 0 0 60px rgba(201, 168, 76, 0.1); }
  }

  @keyframes tagReveal {
    0% { opacity: 0; transform: translateY(15px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .gold-line {
    width: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, #c9a84c, transparent);
    margin: 28px auto 20px;
    animation: lineExpand 2s ease forwards;
    animation-delay: 3s;
  }
  @keyframes lineExpand {
    to { width: 140px; }
  }

  .sub {
    font-family: 'Montserrat', sans-serif;
    font-weight: 200;
    font-size: clamp(0.5rem, 0.9vw, 0.8rem);
    letter-spacing: 0.4em;
    color: rgba(255,255,255,0.35);
    opacity: 0;
    animation: tagReveal 2s ease forwards;
    animation-delay: 3.5s;
  }

  .scroll-hint {
    position: fixed;
    bottom: 50px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2;
    opacity: 0;
    animation: tagReveal 2s ease forwards;
    animation-delay: 4.5s;
    text-align: center;
    pointer-events: none;
  }
  .scroll-hint span {
    display: block;
    font-family: 'Montserrat', sans-serif;
    font-size: 0.55rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    margin-bottom: 8px;
  }
  .scroll-hint .mouse {
    width: 18px; height: 28px;
    border: 1px solid rgba(201, 168, 76, 0.4);
    border-radius: 9px;
    margin: 0 auto;
    position: relative;
  }
  .scroll-hint .mouse::after {
    content: '';
    position: absolute;
    top: 5px; left: 50%;
    transform: translateX(-50%);
    width: 2px; height: 5px;
    background: #c9a84c;
    border-radius: 2px;
    animation: wheelAnim 1.5s ease infinite;
  }
  @keyframes wheelAnim {
    0% { opacity: 1; transform: translateX(-50%) translateY(0); }
    100% { opacity: 0; transform: translateX(-50%) translateY(8px); }
  }

  .vignette {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    z-index: 1;
    pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);
  }

  @media (max-width: 768px) {
    .frame-t, .frame-b { left: 15px; right: 15px; }
    .frame-l, .frame-r { top: 15px; bottom: 15px; }
    .logo { letter-spacing: 0.2em; font-size: clamp(2rem, 8vw, 5rem); }
    .tagline { letter-spacing: 0.3em; font-size: clamp(0.45rem, 1.4vw, 0.8rem); }
    .sub { letter-spacing: 0.2em; font-size: clamp(0.4rem, 1vw, 0.65rem); }
    .scroll-hint { bottom: 30px; }
  }
  @media (max-width: 480px) {
    .frame-t, .frame-b { left: 10px; right: 10px; }
    .frame-l, .frame-r { top: 10px; bottom: 10px; }
    .logo { font-size: clamp(1.5rem, 7vw, 3rem); letter-spacing: 0.15em; }
    .tagline { font-size: clamp(0.4rem, 1.2vw, 0.6rem); letter-spacing: 0.2em; margin-top: 16px; }
    .gold-line { margin: 18px auto 14px; }
    .sub { font-size: clamp(0.35rem, 1vw, 0.55rem); letter-spacing: 0.15em; }
    .scroll-hint { display: none; }
  }
  @media (max-width: 360px) {
    .logo { font-size: clamp(1.2rem, 6vw, 2rem); letter-spacing: 0.1em; }
    .tagline { font-size: clamp(0.35rem, 1vw, 0.5rem); }
  }
</style>
</head>
<body>

<canvas id="threeCanvas"></canvas>

<div class="vignette"></div>

<div class="frame-line frame-t"></div>
<div class="frame-line frame-b"></div>
<div class="frame-line frame-l"></div>
<div class="frame-line frame-r"></div>

<div class="overlay">
  <div class="logo"><span>888</span>.ESTATE</div>
  <div class="tagline">Премиальная недвижимость у моря</div>
  <div class="gold-line"></div>
  <div class="sub">Sochi . Krasnaya Polyana . Coast</div>
</div>

<div class="scroll-hint">
  <span>Scroll</span>
  <div class="mouse"></div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

const canvas = document.getElementById('threeCanvas');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0a);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 1, 8);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

// STARS
const starsGeo = new THREE.BufferGeometry();
const starsCount = 1500;
const starsPos = new Float32Array(starsCount * 3);
const starsSize = new Float32Array(starsCount);
for (let i = 0; i < starsCount; i++) {
  const radius = 15 + Math.random() * 30;
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  starsPos[i*3] = radius * Math.sin(phi) * Math.cos(theta);
  starsPos[i*3+1] = Math.abs(radius * Math.cos(phi)) * 0.4;
  starsPos[i*3+2] = -radius * Math.sin(phi) * Math.sin(theta) - 5;
  starsSize[i] = Math.random() * 2 + 0.5;
}
starsGeo.setAttribute('position', new THREE.BufferAttribute(starsPos, 3));
starsGeo.setAttribute('size', new THREE.BufferAttribute(starsSize, 1));

const starMat = new THREE.PointsMaterial({
  color: 0xffffff,
  size: 0.04,
  transparent: true,
  opacity: 0.6,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
});
const stars = new THREE.Points(starsGeo, starMat);
scene.add(stars);

// GRID
const gridHelper = new THREE.GridHelper(12, 20, 0x1a1a1a, 0x1a1a1a);
gridHelper.position.y = -1.5;
gridHelper.material.transparent = true;
gridHelper.material.opacity = 0.15;
scene.add(gridHelper);

// GOLD PARTICLES
const glowCount = 120;
const glowGeo = new THREE.BufferGeometry();
const glowPos = new Float32Array(glowCount * 3);
const glowData = [];
for (let i = 0; i < glowCount; i++) {
  const theta = Math.random() * Math.PI * 2;
  const r = 2 + Math.random() * 4;
  const y = (Math.random() - 0.5) * 5;
  glowPos[i*3] = Math.cos(theta) * r;
  glowPos[i*3+1] = y;
  glowPos[i*3+2] = Math.sin(theta) * r - 1;
  glowData.push({
    theta, r, y,
    speed: 0.1 + Math.random() * 0.2,
    floatSpeed: 0.3 + Math.random() * 0.5,
    floatOff: Math.random() * Math.PI * 2,
    size: 0.03 + Math.random() * 0.06,
  });
}
glowGeo.setAttribute('position', new THREE.BufferAttribute(glowPos, 3));

const glowMat = new THREE.PointsMaterial({
  color: 0xc9a84c,
  size: 0.04,
  transparent: true,
  opacity: 0.5,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  sizeAttenuation: true,
});
const glowPoints = new THREE.Points(glowGeo, glowMat);
scene.add(glowPoints);

// TEXT GLOW - enable after all CSS animations complete
setTimeout(() => {
  document.querySelector('.logo')?.classList.add('glow');
  document.querySelector('.tagline')?.classList.add('glow');
}, 4200);

// ANIMATION
let time = 0;

function animate() {
  requestAnimationFrame(animate);
  time += 0.01;

  stars.rotation.y += 0.0002;

  const positions = glowPoints.geometry.attributes.position.array;
  for (let i = 0; i < glowCount; i++) {
    const d = glowData[i];
    const a = d.theta + time * d.speed * 0.05;
    positions[i*3] = Math.cos(a) * d.r;
    positions[i*3+1] = d.y + Math.sin(time * d.floatSpeed + d.floatOff) * 0.3;
    positions[i*3+2] = Math.sin(a) * d.r - 1;
  }
  glowPoints.geometry.attributes.position.needsUpdate = true;

  starMat.opacity = 0.4 + Math.sin(time * 0.5) * 0.15;

  camera.position.x = Math.sin(time * 0.03) * 0.5;
  camera.position.y = 1 + Math.sin(time * 0.02) * 0.1;
  camera.lookAt(0, 0, 0);

  renderer.render(scene, camera);
}

animate();

// RESIZE
window.addEventListener('resize', () => {
  const w = window.innerWidth;
  const h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
});
</script>
</body>
</html>
