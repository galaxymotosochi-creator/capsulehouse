<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>888.ESTATE — Премиальная недвижимость</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;600;700&family=Montserrat:wght@200;300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    overflow: hidden;
    height: 100vh;
    font-family: 'Cormorant Garamond', serif;
  }

  #threeCanvas {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    z-index: 0;
  }

  .overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    z-index: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    pointer-events: none;
  }

  .frame-line {
    position: fixed;
    background: rgba(180, 150, 100, 0.08);
    z-index: 1;
    animation: frameAppear 2s ease forwards;
    animation-delay: 2.5s;
    opacity: 0;
  }
  .frame-t, .frame-b { left: 30px; right: 30px; height: 1px; }
  .frame-l, .frame-r { top: 30px; bottom: 30px; width: 1px; }
  .frame-t { top: 30px; }
  .frame-b { bottom: 30px; }
  .frame-l { left: 30px; }
  .frame-r { right: 30px; }
  @keyframes frameAppear { to { opacity: 1; } }

  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(2.5rem, 10vw, 10rem);
    letter-spacing: 0.35em;
    color: #fff;
    opacity: 0;
    animation: logoReveal 2.5s ease forwards;
    animation-delay: 0.8s;
    text-align: center;
    line-height: 1;
    margin-bottom: 0;
    transition: filter 2s ease;
  }
  .logo span {
    color: #c9a84c;
    font-weight: 700;
  }

  @keyframes logoReveal {
    0% { opacity: 0; transform: scale(0.9) translateY(20px); letter-spacing: 0.6em; filter: blur(4px); }
    60% { filter: blur(0); }
    100% { opacity: 1; transform: scale(1) translateY(0); letter-spacing: 0.35em; }
  }

  @keyframes tagReveal {
    0% { opacity: 0; transform: translateY(15px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .hero-title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-size: clamp(0.9rem, 1.6vw, 1.8rem);
    letter-spacing: 0.15em;
    color: #c9a84c;
    margin-top: 28px;
    opacity: 0;
    animation: tagReveal 2s ease forwards;
    animation-delay: 2.8s;
    text-align: center;
    line-height: 1.4;
    max-width: 90vw;
  }

  .hero-sub {
    font-family: 'Montserrat', sans-serif;
    font-weight: 200;
    font-size: clamp(0.5rem, 0.9vw, 0.8rem);
    letter-spacing: 0.4em;
    color: rgba(255,255,255,0.4);
    margin-top: 12px;
    opacity: 0;
    animation: tagReveal 2s ease forwards;
    animation-delay: 3.5s;
    text-align: center;
  }

  .hero-btns {
    display: flex;
    gap: 16px;
    margin-top: 36px;
    opacity: 0;
    animation: tagReveal 1.5s ease forwards;
    animation-delay: 4.2s;
  }
  .hero-btn {
    font-family: 'Montserrat', sans-serif;
    font-weight: 500;
    font-size: clamp(0.65rem, 0.9vw, 0.85rem);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 14px 32px;
    border: none;
    border-radius: 2px;
    cursor: pointer;
    pointer-events: auto;
    transition: all 0.3s ease;
    text-decoration: none;
    display: inline-block;
  }
  .hero-btn-primary {
    background: #c9a84c;
    color: #0a0a0a;
  }
  .hero-btn-primary:hover {
    background: #dab85e;
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(201, 168, 76, 0.3);
  }
  .hero-btn-secondary {
    background: transparent;
    color: #c9a84c;
    border: 1px solid rgba(201, 168, 76, 0.4);
  }
  .hero-btn-secondary:hover {
    background: rgba(201, 168, 76, 0.08);
    border-color: #c9a84c;
    transform: translateY(-1px);
  }

  .scroll-hint {
    position: fixed;
    bottom: 50px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2;
    opacity: 0;
    animation: tagReveal 2s ease forwards;
    animation-delay: 4.5s;
    text-align: center;
    pointer-events: none;
  }
  .scroll-hint span {
    display: block;
    font-family: 'Montserrat', sans-serif;
    font-size: 0.55rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    margin-bottom: 8px;
  }
  .scroll-hint .mouse {
    width: 18px; height: 28px;
    border: 1px solid rgba(201, 168, 76, 0.4);
    border-radius: 9px;
    margin: 0 auto;
    position: relative;
  }
  .scroll-hint .mouse::after {
    content: '';
    position: absolute;
    top: 5px; left: 50%;
    transform: translateX(-50%);
    width: 2px; height: 5px;
    background: #c9a84c;
    border-radius: 2px;
    animation: wheelAnim 1.5s ease infinite;
  }
  @keyframes wheelAnim {
    0% { opacity: 1; transform: translateX(-50%) translateY(0); }
    100% { opacity: 0; transform: translateX(-50%) translateY(8px); }
  }

  .vignette {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    z-index: 1;
    pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);
  }

  @media (max-width: 768px) {
    .frame-t, .frame-b { left: 15px; right: 15px; }
    .frame-l, .frame-r { top: 15px; bottom: 15px; }
    .logo { letter-spacing: 0.2em; font-size: clamp(2rem, 8vw, 5rem); }
    .hero-title { font-size: clamp(0.7rem, 1.6vw, 1.2rem); }
    .hero-sub { font-size: clamp(0.4rem, 1vw, 0.65rem); }
    .hero-btns { gap: 12px; }
    .hero-btn { padding: 10px 20px; font-size: clamp(0.5rem, 1vw, 0.75rem); }
    .scroll-hint { bottom: 30px; }
  }
  @media (max-width: 480px) {
    .frame-t, .frame-b { left: 10px; right: 10px; }
    .frame-l, .frame-r { top: 10px; bottom: 10px; }
    .logo { font-size: clamp(1.5rem, 7vw, 3rem); letter-spacing: 0.15em; }
    .hero-title { font-size: clamp(0.6rem, 3vw, 0.9rem); margin-top: 20px; }
    .hero-sub { font-size: clamp(0.35rem, 2vw, 0.55rem); }
    .hero-btns { flex-direction: column; gap: 10px; margin-top: 24px; }
    .hero-btn { padding: 12px 24px; font-size: clamp(0.5rem, 2.5vw, 0.7rem); text-align: center; }
    .scroll-hint { display: none; }
  }
  @media (max-width: 360px) {
    .logo { font-size: clamp(1.2rem, 6vw, 2rem); letter-spacing: 0.1em; }
    .hero-title { font-size: clamp(0.5rem, 2.8vw, 0.75rem); }
  }
</style>
</head>
<body>

<canvas id="threeCanvas"></canvas>

<div class="vignette"></div>

<div class="frame-line frame-t"></div>
<div class="frame-line frame-b"></div>
<div class="frame-line frame-l"></div>
<div class="frame-line frame-r"></div>

<div class="overlay">
  <div class="logo"><span>888</span>.ESTATE</div>
  <div class="hero-title">ДОСТАВКА КАПСУЛЬНЫХ ДОМОВ<br>НОВОГО ПОКОЛЕНИЯ ПОД КЛЮЧ</div>
  <div class="hero-sub">Современные решения для жизни, работы и бизнеса</div>
  <div class="hero-btns">
    <a href="#" class="hero-btn hero-btn-primary">Оставить заявку</a>
    <a href="#" class="hero-btn hero-btn-secondary">Связаться в Telegram</a>
  </div>
</div>

<div class="scroll-hint">
  <span>Scroll</span>
  <div class="mouse"></div>
</div>

<script>
// ----- ЗВЁЗДЫ + ТЕКСТОВАЯ ПОДСВЕТКА -----
// Всё в одном обычном скрипте — без CDN, без модулей, работает всегда

(function() {
  // 1. ЗВЁЗДЫ НА CANVAS 2D
  const canvas = document.getElementById('threeCanvas');
  const ctx = canvas.getContext('2d');
  let W, H;
  
  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();
  
  const stars = [];
  for (let i = 0; i < 500; i++) {
    stars.push({
      x: (Math.random() - 0.5) * 2,
      y: (Math.random() - 0.5) * 1.4,
      z: Math.random() * 0.8 + 0.2,
      size: Math.random() * 2 + 0.5,
      twinkle: 0.3 + Math.random() * 0.7,
      phase: Math.random() * Math.PI * 2,
    });
  }
  
  const golds = [];
  for (let i = 0; i < 60; i++) {
    golds.push({
      x: (Math.random() - 0.5) * 5,
      y: (Math.random() - 0.5) * 3,
      z: Math.random() * 3 + 1,
      size: Math.random() * 2 + 1,
      angle: Math.random() * Math.PI * 2,
      radius: Math.random() * 2 + 1,
      speed: 0.1 + Math.random() * 0.2,
      floatS: 0.2 + Math.random() * 0.3,
      floatOff: Math.random() * Math.PI * 2,
    });
  }
  
  let time = 0;
  
  function drawScene() {
    requestAnimationFrame(drawScene);
    time += 0.01;
    
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, W, H);
    
    // Stars
    for (const s of stars) {
      const tw = 0.3 + Math.sin(time * s.twinkle + s.phase) * 0.3;
      const sx = W * (0.5 + s.x * s.z * 15);
      const sy = H * (0.5 + s.y * s.z * 12);
      const sz = s.size * s.z * 2 * tw;
      ctx.beginPath();
      ctx.arc(sx, sy, sz * 0.5, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,' + (0.3 + tw * 0.5) + ')';
      ctx.fill();
    }
    
    // Gold particles
    for (const g of golds) {
      const a = g.angle + time * g.speed;
      const px = W * (0.5 + (Math.cos(a) * g.radius + Math.sin(time * 0.5 + g.floatOff) * 0.3) * 0.06);
      const py = H * (0.5 + (Math.sin(a) * g.radius * 0.5 + Math.sin(time * g.floatS + g.floatOff) * 0.4) * 0.06);
      ctx.beginPath();
      ctx.arc(px, py, g.size * 0.5, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(201,168,76,' + (0.2 + Math.sin(time + g.floatOff) * 0.12) + ')';
      ctx.fill();
    }
  }
  
  drawScene();
})();

// 2. ТЕКСТОВАЯ ПОДСВЕТКА (равномерная для всего слова 888.ESTATE)
setTimeout(() => {
  const logo = document.querySelector('.logo');
  const title = document.querySelector('.hero-title');
  const sub = document.querySelector('.hero-sub');
  if (!logo) return;
  
  let phase = 0;
  const pulse = () => {
    phase++;
    const t = 0.3 + Math.sin(phase * 0.04) * 0.3;
    // Единое свечение для всего слова 888.ESTATE
    const a1 = 0.2 + t * 0.25;
    const a2 = 0.08 + t * 0.12;
    logo.style.textShadow = '0 0 ' + (15 + t * 20) + 'px rgba(201,168,76,' + a1 + '), 0 0 ' + (30 + t * 40) + 'px rgba(201,168,76,' + a2 + ')';
    if (title) {
      title.style.textShadow = '0 0 ' + (10 + t * 15) + 'px rgba(201,168,76,' + (0.15 + t * 0.15) + '), 0 0 ' + (20 + t * 30) + 'px rgba(201,168,76,' + (0.08 + t * 0.08) + ')';
    }
    if (sub) {
      sub.style.textShadow = '0 0 ' + (8 + t * 10) + 'px rgba(201,168,76,' + (0.08 + t * 0.1) + ')';
    }
    setTimeout(pulse, 60);
  };
  pulse();
}, 4800);
</script>
</body>
</html>
