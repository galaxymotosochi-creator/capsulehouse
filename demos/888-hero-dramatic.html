<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>888.ESTATE — Премиальная недвижимость</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;600;700&family=Montserrat:wght@200;300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    overflow: hidden;
    height: 100vh;
    font-family: 'Cormorant Garamond', serif;
  }

  #threeCanvas {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    z-index: 0;
  }

  .overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    z-index: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    pointer-events: none;
  }

  .frame-line {
    position: fixed;
    background: rgba(180, 150, 100, 0.08);
    z-index: 1;
    animation: frameAppear 2s ease forwards;
    animation-delay: 2.5s;
    opacity: 0;
  }
  .frame-t, .frame-b { left: 30px; right: 30px; height: 1px; }
  .frame-l, .frame-r { top: 30px; bottom: 30px; width: 1px; }
  .frame-t { top: 30px; }
  .frame-b { bottom: 30px; }
  .frame-l { left: 30px; }
  .frame-r { right: 30px; }
  @keyframes frameAppear { to { opacity: 1; } }

  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(2.5rem, 10vw, 10rem);
    letter-spacing: 0.35em;
    color: #fff;
    opacity: 0;
    animation: logoReveal 2.5s ease forwards;
    animation-delay: 0.8s;
    text-align: center;
    line-height: 1;
    margin-bottom: 0;
    transition: filter 2s ease;
  }
  .logo span {
    color: #c9a84c;
    font-weight: 700;
  }

  @keyframes logoReveal {
    0% { opacity: 0; transform: scale(0.9) translateY(20px); letter-spacing: 0.6em; filter: blur(4px); }
    60% { filter: blur(0); }
    100% { opacity: 1; transform: scale(1) translateY(0); letter-spacing: 0.35em; }
  }

  @keyframes tagReveal {
    0% { opacity: 0; transform: translateY(15px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .hero-title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-size: clamp(0.9rem, 1.6vw, 1.8rem);
    letter-spacing: 0.15em;
    color: #c9a84c;
    margin-top: 28px;
    opacity: 0;
    animation: tagReveal 2s ease forwards;
    animation-delay: 2.8s;
    text-align: center;
    line-height: 1.4;
    max-width: 90vw;
  }

  .hero-sub {
    font-family: 'Montserrat', sans-serif;
    font-weight: 200;
    font-size: clamp(0.5rem, 0.9vw, 0.8rem);
    letter-spacing: 0.4em;
    color: rgba(255,255,255,0.4);
    margin-top: 12px;
    opacity: 0;
    animation: tagReveal 2s ease forwards;
    animation-delay: 3.5s;
    text-align: center;
  }

  .hero-btns {
    display: flex;
    gap: 16px;
    margin-top: 36px;
    opacity: 0;
    animation: tagReveal 1.5s ease forwards;
    animation-delay: 4.2s;
  }
  .hero-btn {
    font-family: 'Montserrat', sans-serif;
    font-weight: 500;
    font-size: clamp(0.65rem, 0.9vw, 0.85rem);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 14px 32px;
    border: none;
    border-radius: 2px;
    cursor: pointer;
    pointer-events: auto;
    transition: all 0.3s ease;
    text-decoration: none;
    display: inline-block;
  }
  .hero-btn-primary {
    background: #c9a84c;
    color: #0a0a0a;
  }
  .hero-btn-primary:hover {
    background: #dab85e;
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(201, 168, 76, 0.3);
  }
  .hero-btn-secondary {
    background: transparent;
    color: #c9a84c;
    border: 1px solid rgba(201, 168, 76, 0.4);
  }
  .hero-btn-secondary:hover {
    background: rgba(201, 168, 76, 0.08);
    border-color: #c9a84c;
    transform: translateY(-1px);
  }

  .scroll-hint {
    position: fixed;
    bottom: 50px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2;
    opacity: 0;
    animation: tagReveal 2s ease forwards;
    animation-delay: 4.5s;
    text-align: center;
    pointer-events: none;
  }
  .scroll-hint span {
    display: block;
    font-family: 'Montserrat', sans-serif;
    font-size: 0.55rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    margin-bottom: 8px;
  }
  .scroll-hint .mouse {
    width: 18px; height: 28px;
    border: 1px solid rgba(201, 168, 76, 0.4);
    border-radius: 9px;
    margin: 0 auto;
    position: relative;
  }
  .scroll-hint .mouse::after {
    content: '';
    position: absolute;
    top: 5px; left: 50%;
    transform: translateX(-50%);
    width: 2px; height: 5px;
    background: #c9a84c;
    border-radius: 2px;
    animation: wheelAnim 1.5s ease infinite;
  }
  @keyframes wheelAnim {
    0% { opacity: 1; transform: translateX(-50%) translateY(0); }
    100% { opacity: 0; transform: translateX(-50%) translateY(8px); }
  }

  .vignette {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    z-index: 1;
    pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);
  }

  @media (max-width: 768px) {
    .frame-t, .frame-b { left: 15px; right: 15px; }
    .frame-l, .frame-r { top: 15px; bottom: 15px; }
    .logo { letter-spacing: 0.2em; font-size: clamp(2rem, 8vw, 5rem); }
    .hero-title { font-size: clamp(0.7rem, 1.6vw, 1.2rem); }
    .hero-sub { font-size: clamp(0.4rem, 1vw, 0.65rem); }
    .hero-btns { gap: 12px; }
    .hero-btn { padding: 10px 20px; font-size: clamp(0.5rem, 1vw, 0.75rem); }
    .scroll-hint { bottom: 30px; }
  }
  @media (max-width: 480px) {
    .frame-t, .frame-b { left: 10px; right: 10px; }
    .frame-l, .frame-r { top: 10px; bottom: 10px; }
    .logo { font-size: clamp(1.5rem, 7vw, 3rem); letter-spacing: 0.15em; }
    .hero-title { font-size: clamp(0.6rem, 3vw, 0.9rem); margin-top: 20px; }
    .hero-sub { font-size: clamp(0.35rem, 2vw, 0.55rem); }
    .hero-btns { flex-direction: column; gap: 10px; margin-top: 24px; }
    .hero-btn { padding: 12px 24px; font-size: clamp(0.5rem, 2.5vw, 0.7rem); text-align: center; }
    .scroll-hint { display: none; }
  }
  @media (max-width: 360px) {
    .logo { font-size: clamp(1.2rem, 6vw, 2rem); letter-spacing: 0.1em; }
    .hero-title { font-size: clamp(0.5rem, 2.8vw, 0.75rem); }
  }
</style>
</head>
<body>

<canvas id="threeCanvas"></canvas>

<div class="vignette"></div>

<div class="frame-line frame-t"></div>
<div class="frame-line frame-b"></div>
<div class="frame-line frame-l"></div>
<div class="frame-line frame-r"></div>

<div class="overlay">
  <div class="logo"><span>888</span>.ESTATE</div>
  <div class="hero-title">ДОСТАВКА КАПСУЛЬНЫХ ДОМОВ<br>НОВОГО ПОКОЛЕНИЯ ПОД КЛЮЧ</div>
  <div class="hero-sub">Современные решения для жизни, работы и бизнеса</div>
  <div class="hero-btns">
    <a href="#" class="hero-btn hero-btn-primary">Оставить заявку</a>
    <a href="#" class="hero-btn hero-btn-secondary">Связаться в Telegram</a>
  </div>
</div>

<div class="scroll-hint">
  <span>Scroll</span>
  <div class="mouse"></div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

const canvas = document.getElementById('threeCanvas');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0a);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 1, 8);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

// STARS
const starsGeo = new THREE.BufferGeometry();
const starsCount = 1500;
const starsPos = new Float32Array(starsCount * 3);
const starsSize = new Float32Array(starsCount);
for (let i = 0; i < starsCount; i++) {
  const radius = 15 + Math.random() * 30;
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  starsPos[i*3] = radius * Math.sin(phi) * Math.cos(theta);
  starsPos[i*3+1] = Math.abs(radius * Math.cos(phi)) * 0.4;
  starsPos[i*3+2] = -radius * Math.sin(phi) * Math.sin(theta) - 5;
  starsSize[i] = Math.random() * 2 + 0.5;
}
starsGeo.setAttribute('position', new THREE.BufferAttribute(starsPos, 3));
starsGeo.setAttribute('size', new THREE.BufferAttribute(starsSize, 1));

const starMat = new THREE.PointsMaterial({
  color: 0xffffff,
  size: 0.04,
  transparent: true,
  opacity: 0.6,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
});
const stars = new THREE.Points(starsGeo, starMat);
scene.add(stars);

// GRID
const gridHelper = new THREE.GridHelper(12, 20, 0x1a1a1a, 0x1a1a1a);
gridHelper.position.y = -1.5;
gridHelper.material.transparent = true;
gridHelper.material.opacity = 0.15;
scene.add(gridHelper);

// GOLD PARTICLES
const glowCount = 120;
const glowGeo = new THREE.BufferGeometry();
const glowPos = new Float32Array(glowCount * 3);
const glowData = [];
for (let i = 0; i < glowCount; i++) {
  const theta = Math.random() * Math.PI * 2;
  const r = 2 + Math.random() * 4;
  const y = (Math.random() - 0.5) * 5;
  glowPos[i*3] = Math.cos(theta) * r;
  glowPos[i*3+1] = y;
  glowPos[i*3+2] = Math.sin(theta) * r - 1;
  glowData.push({
    theta, r, y,
    speed: 0.1 + Math.random() * 0.2,
    floatSpeed: 0.3 + Math.random() * 0.5,
    floatOff: Math.random() * Math.PI * 2,
    size: 0.03 + Math.random() * 0.06,
  });
}
glowGeo.setAttribute('position', new THREE.BufferAttribute(glowPos, 3));

const glowMat = new THREE.PointsMaterial({
  color: 0xc9a84c,
  size: 0.04,
  transparent: true,
  opacity: 0.5,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  sizeAttenuation: true,
});
const glowPoints = new THREE.Points(glowGeo, glowMat);
scene.add(glowPoints);

// TEXT GLOW - яркое золотое свечение (drop-shadow видно даже на телефонах)
setTimeout(() => {
  const logo = document.querySelector('.logo');
  const title = document.querySelector('.hero-title');
  const sub = document.querySelector('.hero-sub');
  
  // Мгновенное включение text-shadow для быстрого эффекта
  if (logo) logo.style.textShadow = '0 0 30px rgba(201,168,76,0.7), 0 0 60px rgba(201,168,76,0.35), 0 0 100px rgba(201,168,76,0.12)';
  if (title) title.style.textShadow = '0 0 20px rgba(201,168,76,0.5), 0 0 40px rgba(201,168,76,0.2)';
  if (sub) sub.style.textShadow = '0 0 15px rgba(201,168,76,0.3)';
  
  // Пульсирующий filter: drop-shadow для заметного свечения
  let phase = 0;
  const pulse = () => {
    phase++;
    const t = 0.4 + Math.sin(phase * 0.04) * 0.6;
    
    if (logo) {
      logo.style.filter = 'drop-shadow(0 0 ' + (18 + t * 32) + 'px rgba(201,168,76,' + (0.4 + t * 0.5) + ')) drop-shadow(0 0 ' + (35 + t * 65) + 'px rgba(201,168,76,' + (0.15 + t * 0.3) + ')) drop-shadow(0 0 ' + (60 + t * 100) + 'px rgba(201,168,76,' + (0.05 + t * 0.12) + '))';
    }
    if (title) {
      title.style.filter = 'drop-shadow(0 0 ' + (10 + t * 20) + 'px rgba(201,168,76,' + (0.2 + t * 0.4) + ')) drop-shadow(0 0 ' + (20 + t * 40) + 'px rgba(201,168,76,' + (0.1 + t * 0.2) + '))';
    }
    if (sub) {
      sub.style.filter = 'drop-shadow(0 0 ' + (5 + t * 15) + 'px rgba(201,168,76,' + (0.1 + t * 0.2) + '))';
    }
    
    setTimeout(pulse, 60);
  };
  pulse();
}, 4800);

// ANIMATION
let time = 0;

function animate() {
  requestAnimationFrame(animate);
  time += 0.01;

  stars.rotation.y += 0.0002;

  const positions = glowPoints.geometry.attributes.position.array;
  for (let i = 0; i < glowCount; i++) {
    const d = glowData[i];
    const a = d.theta + time * d.speed * 0.05;
    positions[i*3] = Math.cos(a) * d.r;
    positions[i*3+1] = d.y + Math.sin(time * d.floatSpeed + d.floatOff) * 0.3;
    positions[i*3+2] = Math.sin(a) * d.r - 1;
  }
  glowPoints.geometry.attributes.position.needsUpdate = true;

  starMat.opacity = 0.4 + Math.sin(time * 0.5) * 0.15;

  camera.position.x = Math.sin(time * 0.03) * 0.5;
  camera.position.y = 1 + Math.sin(time * 0.02) * 0.1;
  camera.lookAt(0, 0, 0);

  renderer.render(scene, camera);
}

animate();

// RESIZE
window.addEventListener('resize', () => {
  const w = window.innerWidth;
  const h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
});
</script>
</body>
</html>
