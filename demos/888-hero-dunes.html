<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>888.ESTATE — Барханы</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;600;700&family=Montserrat:wght@200;300;400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f5f0eb;
    overflow: hidden;
    height: 100vh;
    font-family: 'Cormorant Garamond', serif;
  }
  #waveCanvas {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    z-index: 0;
  }
  .overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    z-index: 2;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
  }
  .border-frame {
    position: fixed;
    top: 24px; left: 24px;
    right: 24px; bottom: 24px;
    z-index: 1;
    pointer-events: none;
  }
  .border-frame .corner { position: absolute; width: 30px; height: 30px; }
  .border-frame .corner-tl { top: 0; left: 0; border-top: 1px solid rgba(180,150,100,0.2); border-left: 1px solid rgba(180,150,100,0.2); }
  .border-frame .corner-tr { top: 0; right: 0; border-top: 1px solid rgba(180,150,100,0.2); border-right: 1px solid rgba(180,150,100,0.2); }
  .border-frame .corner-bl { bottom: 0; left: 0; border-bottom: 1px solid rgba(180,150,100,0.2); border-left: 1px solid rgba(180,150,100,0.2); }
  .border-frame .corner-br { bottom: 0; right: 0; border-bottom: 1px solid rgba(180,150,100,0.2); border-right: 1px solid rgba(180,150,100,0.2); }
  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(4rem, 12vw, 10rem);
    letter-spacing: 0.35em;
    color: #2a2520;
    opacity: 0;
    animation: fadeUp 2s ease forwards;
    animation-delay: 0.8s;
  }
  .logo span { color: #b89664; font-weight: 700; }
  .tagline {
    font-family: 'Montserrat', sans-serif;
    font-weight: 200;
    font-size: clamp(0.85rem, 1.5vw, 1.1rem);
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: #8a7a6a;
    margin-top: 16px;
    opacity: 0;
    animation: fadeUp 2s ease forwards;
    animation-delay: 2s;
  }
  .divider {
    width: 0; height: 1px;
    background: #b89664;
    margin: 24px 0 16px;
    animation: lineGrow 2s ease forwards;
    animation-delay: 2.8s;
  }
  @keyframes lineGrow { to { width: 100px; } }
  .sub {
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    font-size: clamp(0.65rem, 0.9vw, 0.8rem);
    letter-spacing: 0.3em;
    color: #a09080;
    opacity: 0;
    animation: fadeUp 2s ease forwards;
    animation-delay: 3.5s;
  }
  @keyframes fadeUp {
    0% { opacity: 0; transform: translateY(25px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  .scroll-hint {
    position: fixed;
    bottom: 50px; left: 50%;
    transform: translateX(-50%);
    z-index: 3;
    opacity: 0;
    animation: fadeUp 2s ease forwards;
    animation-delay: 4.5s;
    text-align: center;
  }
  .scroll-hint span {
    display: block;
    font-family: 'Montserrat', sans-serif;
    font-size: 0.55rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #8a7a6a;
    margin-bottom: 6px;
  }
  .scroll-hint .mouse {
    width: 18px; height: 28px;
    border: 1.5px solid #b89664;
    border-radius: 9px;
    margin: 0 auto;
    position: relative;
  }
  .scroll-hint .mouse::after {
    content: '';
    position: absolute;
    top: 5px; left: 50%;
    transform: translateX(-50%);
    width: 2px; height: 5px;
    background: #b89664;
    border-radius: 2px;
    animation: wheel 1.5s ease infinite;
  }
  @keyframes wheel {
    0% { opacity: 1; transform: translateX(-50%) translateY(0); }
    100% { opacity: 0; transform: translateX(-50%) translateY(8px); }
  }
  @media (max-width: 768px) {
    .border-frame .corner { width: 20px; height: 20px; }
    .logo { letter-spacing: 0.2em; }
    .tagline { letter-spacing: 0.3em; }
  }
</style>
</head>
<body>
<canvas id="waveCanvas"></canvas>
<div class="border-frame">
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>
</div>
<div class="overlay">
  <div class="logo"><span>888</span>.ESTATE</div>
  <div class="tagline">Премиальная недвижимость</div>
  <div class="divider"></div>
  <div class="sub">Сочи · Красная Поляна · Побережье</div>
</div>
<div class="scroll-hint">
  <span>Листайте</span>
  <div class="mouse"></div>
</div>

<script>
const canvas = document.getElementById('waveCanvas');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

const palette = [[245,240,235],[238,225,210],[230,215,195],[215,195,175],[242,233,220]];
let colorIndex = 0, mix = 0;

function getColors() {
  const c1 = palette[colorIndex % palette.length];
  const c2 = palette[(colorIndex + 1) % palette.length];
  mix += 0.0008;
  if (mix >= 1) { mix = 0; colorIndex++; }
  const t = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
  return [c1[0]+(c2[0]-c1[0])*t, c1[1]+(c2[1]-c1[1])*t, c1[2]+(c2[2]-c1[2])*t];
}

let time = 0;

function draw() {
  time += 0.005;
  const [br, bg, bb] = getColors();
  ctx.fillStyle = `rgb(${br},${bg},${bb})`;
  ctx.fillRect(0, 0, W, H);

  // Волны-барханы
  for (let l = 0; l < 5; l++) {
    const a = 0.03 + l * 0.025;
    const sp = 1 + l * 0.3;
    const amp = 15 + l * 8;
    const fr = 0.003 + l * 0.001;
    const yOff = H * 0.6 + l * 40;

    ctx.beginPath();
    ctx.moveTo(0, H);
    for (let x = 0; x <= W; x += 2) {
      const y = yOff + Math.sin(x*fr + time*sp)*amp + Math.sin(x*fr*0.5 + time*sp*0.7)*amp*0.5 + Math.sin(x*fr*0.3 + time*sp*0.4 + l)*amp*0.3;
      ctx.lineTo(x, y);
    }
    ctx.lineTo(W, H);
    ctx.closePath();
    ctx.fillStyle = `rgba(${br-10-l*5},${bg-8-l*4},${bb-5-l*3},${a})`;
    ctx.fill();
  }

  // Тонкая линия-горизонт
  ctx.beginPath();
  ctx.moveTo(0, H * 0.45);
  for (let x = 0; x <= W; x += 2) {
    ctx.lineTo(x, H*0.45 + Math.sin(x*0.004+time*1.2)*6 + Math.sin(x*0.007+time*0.8)*3);
  }
  ctx.strokeStyle = `rgba(184,150,100,${0.12+0.06*Math.sin(time*0.3)})`;
  ctx.lineWidth = 0.5;
  ctx.stroke();

  // Блики на гребнях
  for (let i = 0; i < 8; i++) {
    const sx = ((i/8)*W + time*20*(1+i*0.3)) % W;
    const sy = H*0.6 + i*35 + Math.sin(sx*0.003+time*(1+i*0.3))*18 + Math.sin(sx*0.0015+time*0.7+i)*9;
    const sp = 0.2 + 0.4*Math.abs(Math.sin(time*1.5+i*2));
    ctx.beginPath();
    ctx.arc(sx, sy, 1.5+sp*1.5, 0, Math.PI*2);
    ctx.fillStyle = `rgba(184,150,100,${sp*0.6})`;
    ctx.fill();
    // glow
    ctx.beginPath();
    ctx.arc(sx, sy, 4+sp*3, 0, Math.PI*2);
    ctx.fillStyle = `rgba(184,150,100,${sp*0.1})`;
    ctx.fill();
  }

  requestAnimationFrame(draw);
}

// Fix easeInOut
const easeInOut = (t) => t < 0.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2;

requestAnimationFrame(draw);
</script>
</body>
</html>
