<!DOCTYPE html><html lang="ru"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>888.ESTATE — ТУМАН И СВЕЧЕНИЕ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;600;700&family=Montserrat:wght@200;300;400&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#070707;overflow:hidden;height:100vh;font-family:'Cormorant Garamond',serif}
#c{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:0}
.overlay{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:2;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;pointer-events:none}
.v{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:1;background:radial-gradient(ellipse at center,transparent 20%,rgba(0,0,0,0.85) 100%)}
.f{position:fixed;background:rgba(201,168,76,0.06);z-index:1;animation:fa 2.5s ease forwards;animation-delay:2.5s;opacity:0}
.f-t,.f-b{left:30px;right:30px;height:1px}.f-l,.f-r{top:30px;bottom:30px;width:1px}
.f-t{top:30px}.f-b{bottom:30px}.f-l{left:30px}.f-r{right:30px}
@keyframes fa{to{opacity:1}}
.logo{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:clamp(4rem,12vw,10rem);letter-spacing:0.35em;color:#fff;opacity:0;animation:lr 2.5s ease forwards;animation-delay:1s}
.logo span{color:#c9a84c;font-weight:700;text-shadow:0 0 80px rgba(201,168,76,0.2)}
@keyframes lr{0%{opacity:0;transform:scale(0.92);filter:blur(3px)}100%{opacity:1;transform:scale(1);filter:blur(0)}}
.tag{font-family:'Montserrat',sans-serif;font-weight:200;font-size:clamp(0.75rem,1.2vw,1rem);letter-spacing:0.7em;text-transform:uppercase;color:rgba(255,255,255,0.5);margin-top:20px;opacity:0;animation:tr 2s ease forwards;animation-delay:2.5s}
@keyframes tr{0%{opacity:0;transform:translateY(15px)}100%{opacity:1;transform:translateY(0)}}
.gl{width:0;height:1px;background:linear-gradient(90deg,transparent,#c9a84c,transparent);margin:24px auto 16px;animation:le 2s ease forwards;animation-delay:3.2s}
@keyframes le{to{width:120px}}
.sub{font-family:'Montserrat',sans-serif;font-weight:200;font-size:clamp(0.6rem,0.9vw,0.8rem);letter-spacing:0.4em;color:rgba(255,255,255,0.3);opacity:0;animation:tr 2s ease forwards;animation-delay:3.8s}
.sh{position:fixed;bottom:50px;left:50%;transform:translateX(-50%);z-index:3;opacity:0;animation:tr 2s ease forwards;animation-delay:4.5s;text-align:center}
.sh span{display:block;font-family:'Montserrat',sans-serif;font-size:0.55rem;letter-spacing:0.4em;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:6px}
.sh .m{width:18px;height:28px;border:1px solid rgba(201,168,76,0.3);border-radius:9px;margin:0 auto;position:relative}
.sh .m::after{content:'';position:absolute;top:5px;left:50%;transform:translateX(-50%);width:2px;height:5px;background:#c9a84c;border-radius:2px;animation:w 1.5s ease infinite}
@keyframes w{0%{opacity:1;transform:translateX(-50%)translateY(0)}100%{opacity:0;transform:translateX(-50%)translateY(8px)}}
@media(max-width:768px){.f-t,.f-b{left:15px;right:15px}.f-l,.f-r{top:15px;bottom:15px}.logo{letter-spacing:0.2em}.tag{letter-spacing:0.3em}}
</style></head><body>
<canvas id="c"></canvas><div class="v"></div>
<div class="f f-t"></div><div class="f f-b"></div><div class="f f-l"></div><div class="f f-r"></div>
<div class="overlay">
<div class="logo"><span>888</span>.ESTATE</div>
<div class="tag">Премиальная недвижимость</div>
<div class="gl"></div>
<div class="sub">Сочи · Красная Поляна · Побережье</div>
</div>
<div class="sh"><span>Листайте</span><div class="m"></div></div>
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"}}</script>
<script type="module">
import*as THREE from 'three';
import{EffectComposer}from 'three/addons/postprocessing/EffectComposer.js';
import{RenderPass}from 'three/addons/postprocessing/RenderPass.js';
import{UnrealBloomPass}from 'three/addons/postprocessing/UnrealBloomPass.js';

const c=document.getElementById('c');
const scene=new THREE.Scene();scene.background=new THREE.Color(0x070707);
const camera=new THREE.PerspectiveCamera(50,window.innerWidth/window.innerHeight,0.1,100);
camera.position.set(0,1,10);camera.lookAt(0,0,0);
const renderer=new THREE.WebGLRenderer({canvas:c,antialias:true,alpha:false});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.2;

// Post-processing bloom
const composer=new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
const bloom=new UnrealBloomPass(new THREE.Vector2(window.innerWidth,window.innerHeight),0.7,0.5,0.12);
composer.addPass(bloom);

// Volumetric light rays
const rayGroup=new THREE.Group();scene.add(rayGroup);
for(let i=0;i<6;i++){
  const w=1.5+Math.random()*3,h=5+Math.random()*3;
  const geo=new THREE.PlaneGeometry(w,h);
  const mat=new THREE.MeshBasicMaterial({color:0xc9a84c,transparent:true,opacity:0.008+Math.random()*0.008,blending:THREE.AdditiveBlending,depthWrite:false,side:THREE.DoubleSide});
  const mesh=new THREE.Mesh(geo,mat);
  mesh.position.set((Math.random()-0.5)*8,h/2-1,(Math.random()-0.5)*4-1);
  mesh.rotation.x=(Math.random()-0.5)*0.25;mesh.rotation.z=(Math.random()-0.5)*0.25;
  mesh.userData={sp:0.1+Math.random()*0.15,ph:Math.random()*Math.PI*2,opBase:mat.opacity};
  rayGroup.add(mesh);
}

// Bottom warm wash
const washMat=new THREE.MeshBasicMaterial({color:0xc9a84c,transparent:true,opacity:0.05,blending:THREE.AdditiveBlending,depthWrite:false,side:THREE.DoubleSide});
const wash=new THREE.Mesh(new THREE.PlaneGeometry(14,4),washMat);
wash.position.set(0,-3.2,-1);wash.rotation.x=-Math.PI/2;scene.add(wash);

const washMat2=new THREE.MeshBasicMaterial({color:0xd4a84c,transparent:true,opacity:0.03,blending:THREE.AdditiveBlending,depthWrite:false,side:THREE.DoubleSide});
const wash2=new THREE.Mesh(new THREE.PlaneGeometry(10,2),washMat2);
wash2.position.set(0,-3.5,-0.5);wash2.rotation.x=-Math.PI/2;scene.add(wash2);

// Stars
const SG=1500;const sg=new THREE.BufferGeometry();
const sp=new Float32Array(SG*3);
for(let i=0;i<SG;i++){
  const r=15+Math.random()*35,t=Math.random()*Math.PI*2,p=Math.acos(2*Math.random()-1);
  sp[i*3]=r*Math.sin(p)*Math.cos(t);sp[i*3+1]=Math.abs(r*Math.cos(p))*0.3;sp[i*3+2]=-r*Math.sin(p)*Math.sin(t)-5;
}
sg.setAttribute('position',new THREE.BufferAttribute(sp,3));
const stars=new THREE.Points(sg,new THREE.PointsMaterial({color:0xffffff,size:0.025,transparent:true,opacity:0.4,blending:THREE.AdditiveBlending,depthWrite:false,sizeAttenuation:true}));
scene.add(stars);

// Layer 1 — tiny gold dust (800 particles)
const PC1=800;const p1g=new THREE.BufferGeometry();const p1p=new Float32Array(PC1*3);const p1d=[];
for(let i=0;i<PC1;i++){
  const r=2+Math.random()*6,t=Math.random()*Math.PI*2;
  p1p[i*3]=r*Math.cos(t);p1p[i*3+1]=(Math.random()-0.5)*5;p1p[i*3+2]=r*Math.sin(t)-2;
  p1d.push({t,r,oy:p1p[i*3+1],sp:0.08+Math.random()*0.15,fo:Math.random()*Math.PI*2});
}
p1g.setAttribute('position',new THREE.BufferAttribute(p1p,3));
const p1m=new THREE.PointsMaterial({color:0xc9a84c,size:0.015,transparent:true,opacity:0.3,blending:THREE.AdditiveBlending,depthWrite:false,sizeAttenuation:true});
const p1=new THREE.Points(p1g,p1m);scene.add(p1);

// Layer 2 — large floating luminous orbs (30)
const PC2=30;const p2g=new THREE.BufferGeometry();const p2p=new Float32Array(PC2*3);const p2d=[];
for(let i=0;i<PC2;i++){
  const r=3+Math.random()*4,t=Math.random()*Math.PI*2;
  p2p[i*3]=r*Math.cos(t);p2p[i*3+1]=(Math.random()-0.5)*4;p2p[i*3+2]=r*Math.sin(t)-1;
  p2d.push({t,r,oy:p2p[i*3+1],sp:0.04+Math.random()*0.08,fo:Math.random()*Math.PI*2});
}
p2g.setAttribute('position',new THREE.BufferAttribute(p2p,3));
// Use sprites for glow orbs
const p2m=new THREE.PointsMaterial({color:0xffd080,size:0.08,transparent:true,opacity:0.15,blending:THREE.AdditiveBlending,depthWrite:false,sizeAttenuation:true});
const p2=new THREE.Points(p2g,p2m);scene.add(p2);

// Fog with gold tint
scene.fog=new THREE.FogExp2(0x1a1208,0.025);

// Glow fog sphere
const fogSphere=new THREE.Mesh(new THREE.SphereGeometry(0.3,16,16),new THREE.MeshBasicMaterial({color:0xc9a84c,transparent:true,opacity:0.05}));
fogSphere.position.set(0,-1,-3);scene.add(fogSphere);

const fogSphere2=new THREE.Mesh(new THREE.SphereGeometry(0.5,16,16),new THREE.MeshBasicMaterial({color:0x8a7a5a,transparent:true,opacity:0.04}));
fogSphere2.position.set(2,0.5,-4);scene.add(fogSphere2);

// Animation
let time=0;
function animate(){
  requestAnimationFrame(animate);time+=0.005;
  
  // Rays pulse
  rayGroup.children.forEach((m,i)=>{m.material.opacity=m.userData.opBase*(0.5+0.5*Math.sin(time*m.userData.sp+m.userData.ph));m.position.y+=Math.sin(time*0.3+m.userData.ph)*0.0005;});
  
  // Layer 1 particles rotate
  const pos1=p1.geometry.attributes.position.array;
  for(let i=0;i<PC1;i++){const d=p1d[i];const a=d.t+time*d.sp;pos1[i*3]=Math.cos(a)*d.r;pos1[i*3+1]=d.oy+Math.sin(time*d.sp*0.3+d.fo)*0.3;pos1[i*3+2]=Math.sin(a)*d.r-2;}
  p1.geometry.attributes.position.needsUpdate=true;
  
  // Layer 2 orbs drift
  const pos2=p2.geometry.attributes.position.array;
  for(let i=0;i<PC2;i++){const d=p2d[i];const a=d.t+time*d.sp*0.5;pos2[i*3]=Math.cos(a)*d.r;pos2[i*3+1]=d.oy+Math.sin(time*d.sp*0.2+d.fo)*0.5;pos2[i*3+2]=Math.sin(a)*d.r-1;}
  p2.geometry.attributes.position.needsUpdate=true;
  
  // Stars subtle rotation
  stars.rotation.y+=0.0001;
  
  // Camera slow drift
  camera.position.x=Math.sin(time*0.03)*1.5;
  camera.position.y=1+Math.sin(time*0.02)*0.15;
  camera.lookAt(0,0,0);
  
  // Bloom intensity breathes
  bloom.strength=0.6+Math.sin(time*0.15)*0.1;
  
  composer.render();
}
animate();

window.addEventListener('resize',()=>{
  const w=window.innerWidth,h=window.innerHeight;
  camera.aspect=w/h;camera.updateProjectionMatrix();
  renderer.setSize(w,h);composer.setSize(w,h);
});
</script></body></html>
