<!DOCTYPE html><html lang="ru"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>888.ESTATE — ЗОЛОТОЙ ВИХРЬ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;600;700&family=Montserrat:wght@200;300;400&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050505;overflow:hidden;height:100vh;font-family:'Cormorant Garamond',serif}
#c{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:0}
.overlay{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:2;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;pointer-events:none}
.v{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:1;background:radial-gradient(ellipse at 50% 40%,transparent 15%,rgba(0,0,0,0.9) 100%)}
.f{position:fixed;background:rgba(201,168,76,0.06);z-index:1;animation:fa 2.5s ease forwards;animation-delay:2.5s;opacity:0}
.f-t,.f-b{left:30px;right:30px;height:1px}.f-l,.f-r{top:30px;bottom:30px;width:1px}
.f-t{top:30px}.f-b{bottom:30px}.f-l{left:30px}.f-r{right:30px}
@keyframes fa{to{opacity:1}}
.logo{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:clamp(4rem,12vw,10rem);letter-spacing:0.35em;color:#fff;opacity:0;animation:lr 2.5s ease forwards;animation-delay:1s}
.logo span{color:#c9a84c;font-weight:700;text-shadow:0 0 80px rgba(201,168,76,0.25)}
@keyframes lr{0%{opacity:0;transform:scale(0.92);filter:blur(3px)}100%{opacity:1;transform:scale(1);filter:blur(0)}}
.tag{font-family:'Montserrat',sans-serif;font-weight:200;font-size:clamp(0.75rem,1.2vw,1rem);letter-spacing:0.7em;text-transform:uppercase;color:rgba(255,255,255,0.5);margin-top:20px;opacity:0;animation:tr 2s ease forwards;animation-delay:2.5s}
@keyframes tr{0%{opacity:0;transform:translateY(15px)}100%{opacity:1;transform:translateY(0)}}
.gl{width:0;height:1px;background:linear-gradient(90deg,transparent,#c9a84c,transparent);margin:24px auto 16px;animation:le 2s ease forwards;animation-delay:3.2s}
@keyframes le{to{width:120px}}
.sub{font-family:'Montserrat',sans-serif;font-weight:200;font-size:clamp(0.6rem,0.9vw,0.8rem);letter-spacing:0.4em;color:rgba(255,255,255,0.3);opacity:0;animation:tr 2s ease forwards;animation-delay:3.8s}
.sh{position:fixed;bottom:50px;left:50%;transform:translateX(-50%);z-index:3;opacity:0;animation:tr 2s ease forwards;animation-delay:4.5s;text-align:center}
.sh span{display:block;font-family:'Montserrat',sans-serif;font-size:0.55rem;letter-spacing:0.4em;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:6px}
.sh .m{width:18px;height:28px;border:1px solid rgba(201,168,76,0.3);border-radius:9px;margin:0 auto;position:relative}
.sh .m::after{content:'';position:absolute;top:5px;left:50%;transform:translateX(-50%);width:2px;height:5px;background:#c9a84c;border-radius:2px;animation:w 1.5s ease infinite}
@keyframes w{0%{opacity:1;transform:translateX(-50%)translateY(0)}100%{opacity:0;transform:translateX(-50%)translateY(8px)}}
@media(max-width:768px){.f-t,.f-b{left:15px;right:15px}.f-l,.f-r{top:15px;bottom:15px}.logo{letter-spacing:0.2em}.tag{letter-spacing:0.3em}}
</style></head><body>
<canvas id="c"></canvas><div class="v"></div>
<div class="f f-t"></div><div class="f f-b"></div><div class="f f-l"></div><div class="f f-r"></div>
<div class="overlay">
<div class="logo"><span>888</span>.ESTATE</div>
<div class="tag">Премиальная недвижимость</div>
<div class="gl"></div>
<div class="sub">Сочи · Красная Поляна · Побережье</div>
</div>
<div class="sh"><span>Листайте</span><div class="m"></div></div>
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"}}</script>
<script type="module">
import*as THREE from 'three';
import{EffectComposer}from 'three/addons/postprocessing/EffectComposer.js';
import{RenderPass}from 'three/addons/postprocessing/RenderPass.js';
import{UnrealBloomPass}from 'three/addons/postprocessing/UnrealBloomPass.js';

const c=document.getElementById('c');
const scene=new THREE.Scene();scene.background=new THREE.Color(0x050505);
const camera=new THREE.PerspectiveCamera(50,window.innerWidth/window.innerHeight,0.1,100);
camera.position.set(0,0.5,10);camera.lookAt(0,0,0);
const renderer=new THREE.WebGLRenderer({canvas:c,antialias:true,alpha:false});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.0;

// Post-processing
const composer=new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
const bloom=new UnrealBloomPass(new THREE.Vector2(window.innerWidth,window.innerHeight),0.8,0.3,0.1);
composer.addPass(bloom);

// Bottom warm glow
const washMat=new THREE.MeshBasicMaterial({color:0x8a6a2c,transparent:true,opacity:0.03,blending:THREE.AdditiveBlending,depthWrite:false,side:THREE.DoubleSide});
const wash=new THREE.Mesh(new THREE.PlaneGeometry(14,3),washMat);
wash.position.set(0,-2.8,-1);wash.rotation.x=-Math.PI/2;scene.add(wash);

// Stars
const SG=1000;const sg=new THREE.BufferGeometry();
const sp=new Float32Array(SG*3);
for(let i=0;i<SG;i++){
  const r=15+Math.random()*35,t=Math.random()*Math.PI*2,p=Math.acos(2*Math.random()-1);
  sp[i*3]=r*Math.sin(p)*Math.cos(t);sp[i*3+1]=Math.abs(r*Math.cos(p))*0.3;sp[i*3+2]=-r*Math.sin(p)*Math.sin(t)-5;
}
sg.setAttribute('position',new THREE.BufferAttribute(sp,3));
const stars=new THREE.Points(sg,new THREE.PointsMaterial({color:0xffffff,size:0.02,transparent:true,opacity:0.3,blending:THREE.AdditiveBlending,depthWrite:false,sizeAttenuation:true}));
scene.add(stars);

// === VORTEX PARTICLES ===
const NUM=2000;
const pg=new THREE.BufferGeometry();
const pp=new Float32Array(NUM*3),ps=new Float32Array(NUM),pc=new Float32Array(NUM*3);
const pd=[];
for(let i=0;i<NUM;i++){
  const t=Math.random()*Math.PI*2;
  const r=0.5+Math.random()*4.5;
  const y=(Math.random()-0.5)*5;
  const a=t+r*0.3+Math.random()*0.5;
  pp[i*3]=Math.cos(a)*r;
  pp[i*3+1]=y;
  pp[i*3+2]=Math.sin(a)*r;
  ps[i]=0.01+Math.random()*0.03;
  const col=new THREE.Color().setHSL(0.1-Math.random()*0.02,0.8,0.4+Math.random()*0.3);
  pc[i*3]=col.r;pc[i*3+1]=col.g;pc[i*3+2]=col.b;
  pd.push({t,r,y:a,sp:0.2+Math.random()*0.3,off:Math.random()*Math.PI*2,r0:r,phase:Math.random()*Math.PI*2});
}
pg.setAttribute('position',new THREE.BufferAttribute(pp,3));
pg.setAttribute('size',new THREE.BufferAttribute(ps,1));
pg.setAttribute('color',new THREE.BufferAttribute(pc,3));

const pm=new THREE.PointsMaterial({
  size:0.08,transparent:true,opacity:0.6,
  blending:THREE.AdditiveBlending,depthWrite:false,
  sizeAttenuation:true,vertexColors:true
});
const vortex=new THREE.Points(pg,pm);scene.add(vortex);

// Central glow core
const coreGeo=new THREE.SphereGeometry(0.15,16,16);
const coreMat=new THREE.MeshBasicMaterial({color:0xffd080,transparent:true,opacity:0.5});
const core=new THREE.Mesh(coreGeo,coreMat);core.position.set(0,0,0);scene.add(core);

const coreGlow=new THREE.Mesh(new THREE.SphereGeometry(0.3,16,16),new THREE.MeshBasicMaterial({color:0xc9a84c,transparent:true,opacity:0.1}));
coreGlow.position.set(0,0,0);scene.add(coreGlow);

// Fog
scene.fog=new THREE.FogExp2(0x050505,0.03);

// Animation
let time=0;
function animate(){
  requestAnimationFrame(animate);time+=0.006;
  
  // Vortex spiral motion
  const pos=vortex.geometry.attributes.position.array;
  for(let i=0;i<NUM;i++){
    const d=pd[i];
    const a=d.y+time*d.sp;
    const r=d.r0*(1+Math.sin(time*0.1+d.phase)*0.05);
    pos[i*3]=Math.cos(a)*r;
    pos[i*3+1]=d.y+Math.sin(time*d.sp*0.3+d.off)*0.2;
    pos[i*3+2]=Math.sin(a)*r;
  }
  vortex.geometry.attributes.position.needsUpdate=true;
  
  // Rotate whole vortex group slowly
  vortex.rotation.y=time*0.01;
  
  // Core pulses
  const pulse=0.5+Math.sin(time*0.5)*0.2;
  core.material.opacity=pulse;
  coreGlow.material.opacity=0.08+Math.sin(time*0.5)*0.04;
  coreGlow.scale.setScalar(1+Math.sin(time*0.5)*0.15);
  
  // Bloom breathes
  bloom.strength=0.7+Math.sin(time*0.2)*0.1;
  
  // Camera drift
  camera.position.x=Math.sin(time*0.02)*1;
  camera.position.y=0.5+Math.sin(time*0.015)*0.1;
  camera.lookAt(0,0,0);
  
  composer.render();
}
animate();

window.addEventListener('resize',()=>{
  const w=window.innerWidth,h=window.innerHeight;
  camera.aspect=w/h;camera.updateProjectionMatrix();
  renderer.setSize(w,h);composer.setSize(w,h);
});
</script></body></html>
