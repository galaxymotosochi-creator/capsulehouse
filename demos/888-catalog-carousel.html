<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>888.ESTATE — Карусель</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#070707;color:#fff;font-family:'Cormorant Garamond',serif;min-height:100vh;overflow-x:hidden}
.f{position:fixed;background:rgba(201,168,76,0.07);z-index:100;pointer-events:none}
.f-t,.f-b{left:24px;right:24px;height:1px}.f-l,.f-r{top:24px;bottom:24px;width:1px}
.f-t{top:24px}.f-b{bottom:24px}.f-l{left:24px}.f-r{right:24px}
header{position:sticky;top:0;z-index:50;background:rgba(7,7,7,0.85);backdrop-filter:blur(12px);border-bottom:1px solid rgba(201,168,76,0.08);padding:16px 48px}
.header-inner{max-width:1280px;margin:0 auto;display:flex;justify-content:space-between;align-items:center}
.logo{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:1.4rem;letter-spacing:0.25em;color:#fff;text-decoration:none}
.logo span{color:#c9a84c;font-weight:600}
nav{font-family:'Montserrat',sans-serif;font-weight:300;font-size:0.75rem;letter-spacing:0.15em;text-transform:uppercase}
nav a{color:rgba(255,255,255,0.5);text-decoration:none;margin-left:28px;transition:color 0.3s}
nav a:hover{color:#c9a84c}
.section-title{text-align:center;padding:64px 24px 8px}
.section-title h1{font-weight:300;font-size:clamp(1.4rem,2.2vw,2.4rem);letter-spacing:0.2em}
.section-title h1 span{color:#c9a84c;font-weight:600}
.section-title .gl{width:50px;height:1px;background:linear-gradient(90deg,transparent,#c9a84c,transparent);margin:14px auto}
.section-title .sub{font-family:'Montserrat',sans-serif;font-weight:200;font-size:0.65rem;letter-spacing:0.35em;color:rgba(255,255,255,0.35);text-transform:uppercase}
.carousel-wrap{position:relative;max-width:1280px;margin:24px auto 80px;padding:0 48px}
.carousel{display:flex;gap:24px;overflow-x:auto;scroll-snap-type:x mandatory;scrollbar-width:none;-ms-overflow-style:none;padding:8px 0 20px;scroll-behavior:smooth}
.carousel::-webkit-scrollbar{display:none}
.card{flex:0 0 calc(50% - 12px);scroll-snap-align:start;border:1px solid rgba(201,168,76,0.06);background:rgba(255,255,255,0.015);transition:all 0.4s;cursor:pointer}
.card:hover{border-color:rgba(201,168,76,0.22)}
.card-img{width:100%;height:280px;position:relative;overflow:hidden}
.card-img .ph{width:100%;height:100%}
.card-img .badge{position:absolute;top:14px;left:14px;font-family:'Montserrat',sans-serif;font-size:0.5rem;letter-spacing:0.12em;text-transform:uppercase;padding:4px 10px;background:rgba(201,168,76,0.9);color:#070707;font-weight:500}
.card-body{padding:24px 28px 30px}
.card-title{font-weight:400;font-size:1.35rem;letter-spacing:0.05em;margin-bottom:4px}
.card-loc{font-family:'Montserrat',sans-serif;font-size:0.6rem;letter-spacing:0.12em;color:rgba(255,255,255,0.3);margin-bottom:10px}
.card-price{font-weight:600;font-size:1.3rem;color:#c9a84c;margin-bottom:10px}
.card-price span{font-weight:300;font-size:0.7rem;color:rgba(255,255,255,0.25)}
.card-desc{font-family:'Montserrat',sans-serif;font-weight:200;font-size:0.7rem;line-height:1.6;color:rgba(255,255,255,0.3);margin-bottom:14px}
.card-features{display:flex;gap:18px;font-family:'Montserrat',sans-serif;font-size:0.55rem;color:rgba(255,255,255,0.35)}
.card-features span{display:flex;align-items:center;gap:4px}
.card-features .num{color:rgba(255,255,255,0.7);font-weight:400}
.controls{display:flex;justify-content:center;gap:12px;margin-top:4px}
.ctrl{width:36px;height:36px;border:1px solid rgba(201,168,76,0.15);background:transparent;color:#c9a84c;font-size:1.1rem;cursor:pointer;transition:all 0.3s;display:flex;align-items:center;justify-content:center}
.ctrl:hover{border-color:#c9a84c;background:rgba(201,168,76,0.06)}
.dots{display:flex;justify-content:center;gap:6px;margin-top:12px}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(201,168,76,0.15);border:none;cursor:pointer;transition:all 0.3s}
.dot.active{background:#c9a84c;width:18px;border-radius:3px}
@media(max-width:900px){.card{flex:0 0 calc(100% - 0px)}}
@media(max-width:768px){
  header{padding:12px 20px}.header-inner{flex-direction:column;gap:10px}
  nav a{margin:0 10px;font-size:0.65rem}
  .carousel-wrap{padding:0 20px}.f-t,.f-b{left:12px;right:12px}.f-l,.f-r{top:12px;bottom:12px}
}
</style></head>
<body>
<div class="f f-t"></div><div class="f f-b"></div><div class="f f-l"></div><div class="f f-r"></div>
<header><div class="header-inner">
<a href="#" class="logo"><span>888</span>.ESTATE</a>
<nav><a href="#" class="active">Рекомендуем</a><a href="#">Новинки</a><a href="#">Premium</a></nav>
</div></header>
<section class="section-title"><h1><span>Избранные</span> объекты</h1><div class="gl"></div><div class="sub">Листайте →</div></section>
<div class="carousel-wrap">
  <div class="carousel" id="carousel"></div>
  <div class="controls"><button class="ctrl" id="prevBtn">←</button><button class="ctrl" id="nextBtn">→</button></div>
  <div class="dots" id="dots"></div>
</div>
<script>
const props=[
  {t:'Особняк «Горный ручей»',l:'Эстосадок',p:'65 000 000 ₽',a:'480 м²',b:'6',ba:'4',ty:'Особняк',d:'Эксклюзивный особняк с камином, винным погребом и спа-зоной в тихом районе Эстосадка.',cl:'gold'},
  {t:'Вилла «Золотой берег»',l:'Красная Поляна',p:'28 500 000 ₽',a:'320 м²',b:'4',ba:'3',ty:'Вилла',d:'Панорамный вид на горы, бассейн, терраса 80 м², ландшафтный парк.',cl:'gold'},
  {t:'Пентхаус «Панорама»',l:'Адлер',p:'47 800 000 ₽',a:'210 м²',b:'3',ba:'2',ty:'Пентхаус',d:'Двухуровневый, терраса 60 м², вид на море и горы, собственный лифт.',cl:'warm'},
  {t:'Вилла «Сосновая аллея»',l:'Красная Поляна',p:'52 000 000 ₽',a:'380 м²',b:'5',ba:'3',ty:'Вилла',d:'В сосновом лесу, 4 спальни, кабинет, кинозал, хамам, камин.',cl:'gold'},
  {t:'Резиденция «Император»',l:'Красная Поляна',p:'89 000 000 ₽',a:'620 м²',b:'8',ba:'5',ty:'Резиденция',d:'Флагманский объект: бассейн, СПА, свой парк, охраняемая территория.',cl:'gold'},
  {t:'Вилла «Чайный дом»',l:'Дагомыс',p:'38 900 000 ₽',a:'290 м²',b:'4',ba:'2',ty:'Вилла',d:'Среди чайных плантаций, бассейн, беседка, фруктовый сад.',cl:'gold'}
];
const pal={gold:'linear-gradient(135deg,#1a140a,#2a1f0d,#3d2a10,#c9a84c20)',blue:'linear-gradient(135deg,#0d121a,#1a1f2a,#0d1a14,#c9a84c15)',warm:'linear-gradient(135deg,#1a0d0d,#2a1410,#3d1a10,#c9a84c18)',green:'linear-gradient(135deg,#0d1a14,#142a1a,#0d1a0d,#c9a84c12)'};
const carousel=document.getElementById('carousel');
const dots=document.getElementById('dots');
props.forEach((c,i)=>{
  const d=document.createElement('div');d.className='card';
  d.innerHTML=`<div class="card-img"><div class="ph" style="background:${pal[c.cl]}"></div><div class="badge">${c.ty}</div></div><div class="card-body"><div class="card-title">${c.t}</div><div class="card-loc">${c.l}</div><div class="card-price">${c.p} <span>· ${c.a}</span></div><div class="card-desc">${c.d}</div><div class="card-features"><span>🛏 <span class="num">${c.b}</span></span><span>🛁 <span class="num">${c.ba}</span></span><span>📐 <span class="num">${c.a}</span></span></div></div>`;
  carousel.appendChild(d);
  const dot=document.createElement('button');dot.className='dot'+(!i?' active':'');dots.appendChild(dot);
});
// Controls
const nextBtn=document.getElementById('nextBtn');
const prevBtn=document.getElementById('prevBtn');
function scrollCarousel(dir){
  const cw=carousel.querySelector('.card');
  if(!cw)return;
  const step=cw.offsetWidth+24;
  carousel.scrollBy({left:dir*step,behavior:'smooth'});
}
nextBtn.addEventListener('click',()=>scrollCarousel(1));
prevBtn.addEventListener('click',()=>scrollCarousel(-1));
carousel.addEventListener('scroll',()=>{
  const idx=Math.round(carousel.scrollLeft/(carousel.querySelector('.card')?.offsetWidth+24||1));
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===idx));
});
document.querySelectorAll('.dot').forEach((d,i)=>d.addEventListener('click',()=>{
  const cw=carousel.querySelector('.card');
  if(cw)carousel.scrollTo({left:i*(cw.offsetWidth+24),behavior:'smooth'});
}));
</script></body></html>
