<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>888.ESTATE — Minimal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#070707;color:#fff;font-family:'Cormorant Garamond',serif;min-height:100vh;overflow-x:hidden}
.f{position:fixed;background:rgba(201,168,76,0.07);z-index:100;pointer-events:none}
.f-t,.f-b{left:24px;right:24px;height:1px}.f-l,.f-r{top:24px;bottom:24px;width:1px}
.f-t{top:24px}.f-b{bottom:24px}.f-l{left:24px}.f-r{right:24px}
header{position:sticky;top:0;z-index:50;background:rgba(7,7,7,0.85);backdrop-filter:blur(12px);padding:20px 48px}
.header-inner{max-width:1280px;margin:0 auto;display:flex;justify-content:space-between;align-items:center}
.logo{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:1.2rem;letter-spacing:0.3em;color:#fff;text-decoration:none}
.logo span{color:#c9a84c;font-weight:600}
nav{font-family:'Montserrat',sans-serif;font-weight:200;font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase}
nav a{color:rgba(255,255,255,0.35);text-decoration:none;margin-left:32px;transition:color 0.4s}
nav a:hover{color:rgba(201,168,76,0.6)}
.hero-mini{text-align:center;padding:120px 24px 80px}
.hero-mini h1{font-weight:300;font-size:clamp(2rem,3.5vw,4rem);letter-spacing:0.25em;line-height:1.2}
.hero-mini h1 span{color:#c9a84c;font-weight:600}
.hero-mini .gl{width:40px;height:1px;background:linear-gradient(90deg,transparent,#c9a84c,transparent);margin:18px auto}
.hero-mini .sub{font-family:'Montserrat',sans-serif;font-weight:200;font-size:0.7rem;letter-spacing:0.4em;color:rgba(255,255,255,0.3);text-transform:uppercase}
.gallery{padding:0 0 100px}
.row{max-width:1100px;margin:0 auto;display:flex;padding:0 48px}
.row:not(:last-child){margin-bottom:28px;padding-bottom:28px;border-bottom:1px solid rgba(201,168,76,0.04)}
.card{display:flex;gap:40px;width:100%;cursor:pointer;transition:opacity 0.4s}
.card:hover{opacity:0.7}
.card-img{width:180px;min-height:130px;flex-shrink:0;position:relative}
.card-img .ph{width:100%;height:100%;min-height:130px}
.numeral{position:absolute;top:-6px;left:-6px;font-family:'Cormorant Garamond',serif;font-weight:600;font-size:2.5rem;color:rgba(201,168,76,0.08);line-height:1;pointer-events:none}
.card-body{flex:1;display:flex;justify-content:space-between;align-items:flex-start;padding-top:2px}
.card-left{flex:1}
.card-title{font-weight:300;font-size:1.3rem;letter-spacing:0.06em;margin-bottom:2px;color:#fff}
.card-loc{font-family:'Montserrat',sans-serif;font-size:0.55rem;letter-spacing:0.12em;color:rgba(255,255,255,0.25);margin-bottom:6px;text-transform:uppercase}
.card-desc{font-family:'Montserrat',sans-serif;font-weight:200;font-size:0.6rem;line-height:1.7;color:rgba(255,255,255,0.2);max-width:400px}
.card-right{text-align:right;flex-shrink:0}
.card-price{font-weight:600;font-size:1.1rem;color:#c9a84c;letter-spacing:0.02em}
.card-price span{font-weight:300;font-size:0.6rem;color:rgba(255,255,255,0.2);display:block;margin-top:2px}
.card-type{font-family:'Montserrat',sans-serif;font-size:0.5rem;letter-spacing:0.1em;color:rgba(255,255,255,0.2);margin-top:6px;text-transform:uppercase}
@media(max-width:900px){
  .row{padding:0 24px}.card{gap:24px}.card-img{width:120px;min-height:100px}
  .card-img .ph{min-height:100px}
  .card-title{font-size:1.1rem}
}
@media(max-width:768px){
  header{padding:14px 20px}.header-inner{flex-direction:column;gap:8px}
  nav a{margin:0 12px;font-size:0.55rem}
  .hero-mini{padding:80px 20px 50px}
  .card{flex-direction:column;gap:14px}.card-img{width:100%;min-height:160px}.card-img .ph{min-height:160px}
  .card-body{flex-direction:column;gap:8px}.card-right{text-align:left}
  .f-t,.f-b{left:12px;right:12px}.f-l,.f-r{top:12px;bottom:12px}
}
</style></head>
<body>
<div class="f f-t"></div><div class="f f-b"></div><div class="f f-l"></div><div class="f f-r"></div>
<header><div class="header-inner">
<a href="#" class="logo"><span>888</span>.ESTATE</a>
<nav><a href="#">Объекты</a><a href="#">О нас</a><a href="#">Контакты</a></nav>
</div></header>
<section class="hero-mini">
<h1>Объекты<br><span>в продаже</span></h1><div class="gl"></div>
<div class="sub">8 премиальных предложений</div>
</section>
<div class="gallery" id="gallery"></div>
<script>
const props=[
  {t:'Вилла «Золотой берег»',l:'Красная Поляна',p:'28 500 000 ₽',a:'320 м²',b:'4',ba:'3',ty:'Вилла',d:'Вид на Кавказский хребет, бассейн, терраса 80 м²',cl:'gold'},
  {t:'Особняк «Горный ручей»',l:'Эстосадок',p:'65 000 000 ₽',a:'480 м²',b:'6',ba:'4',ty:'Особняк',d:'Камин, винный погреб, спа-зона, гараж на 2 машины',cl:'gold'},
  {t:'Апартаменты «Лазурный»',l:'Центральный Сочи',p:'14 200 000 ₽',a:'95 м²',b:'2',ba:'1',ty:'Апартаменты',d:'Центр города, отделка премиум, подземный паркинг',cl:'blue'},
  {t:'Пентхаус «Панорама»',l:'Адлер',p:'47 800 000 ₽',a:'210 м²',b:'3',ba:'2',ty:'Пентхаус',d:'Два уровня, терраса 60 м², вид на море',cl:'warm'},
  {t:'Вилла «Сосновая аллея»',l:'Красная Поляна',p:'52 000 000 ₽',a:'380 м²',b:'5',ba:'3',ty:'Вилла',d:'Сосновый лес, кинозал, хамам, камин',cl:'gold'},
  {t:'Апартаменты «Морской бриз»',l:'Имеретинка',p:'19 600 000 ₽',a:'120 м²',b:'2',ba:'1',ty:'Апартаменты',d:'Первая линия у моря, закрытый ЖК',cl:'blue'},
  {t:'Таунхаус «Парковый»',l:'Хоста',p:'22 300 000 ₽',a:'170 м²',b:'3',ba:'2',ty:'Таунхаус',d:'Закрытый посёлок, сад, детская площадка',cl:'green'},
  {t:'Вилла «Чайный дом»',l:'Дагомыс',p:'38 900 000 ₽',a:'290 м²',b:'4',ba:'2',ty:'Вилла',d:'Чайные плантации, бассейн, фруктовый сад',cl:'gold'}
];
const pal={gold:'linear-gradient(135deg,#1a140a,#2a1f0d,#3d2a10,#c9a84c20)',blue:'linear-gradient(135deg,#0d121a,#1a1f2a,#0d1a14,#c9a84c15)',warm:'linear-gradient(135deg,#1a0d0d,#2a1410,#3d1a10,#c9a84c18)',green:'linear-gradient(135deg,#0d1a14,#142a1a,#0d1a0d,#c9a84c12)'};
const gal=document.getElementById('gallery');
props.forEach((c,i)=>{
  const r=document.createElement('div');r.className='row';
  r.innerHTML=`<div class="card"><div class="card-img"><div class="numeral">${('0'+(i+1)).slice(-2)}</div><div class="ph" style="background:${pal[c.cl]}"></div></div><div class="card-body"><div class="card-left"><div class="card-title">${c.t}</div><div class="card-loc">${c.l}</div><div class="card-desc">${c.d}</div></div><div class="card-right"><div class="card-price">${c.p} <span>${c.a}</span></div><div class="card-type">${c.ty} · ${c.b} спальни</div></div></div></div>`;
  gal.appendChild(r);
});
</script></body></html>
