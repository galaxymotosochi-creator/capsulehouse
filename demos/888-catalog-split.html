<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>888.ESTATE — Split View</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#070707;color:#fff;font-family:'Cormorant Garamond',serif;height:100vh;overflow:hidden}
.f{position:fixed;background:rgba(201,168,76,0.07);z-index:100;pointer-events:none}
.f-t,.f-b{left:24px;right:24px;height:1px}.f-l,.f-r{top:24px;bottom:24px;width:1px}
.f-t{top:24px}.f-b{bottom:24px}.f-l{left:24px}.f-r{right:24px}
.app{display:flex;height:100vh;padding:56px 48px 0}
/* Sidebar */
.sidebar{width:360px;flex-shrink:0;padding:32px 28px 24px 0;overflow-y:auto;border-right:1px solid rgba(201,168,76,0.06)}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-track{background:transparent}
.sidebar::-webkit-scrollbar-thumb{background:rgba(201,168,76,0.15)}
.sidebar .logo{font-size:1.2rem;letter-spacing:0.25em;margin-bottom:28px;display:block;color:#fff;text-decoration:none}
.sidebar .logo span{color:#c9a84c;font-weight:600}
.filter-group{margin-bottom:20px}
.filter-group label{display:block;font-family:'Montserrat',sans-serif;font-size:0.55rem;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:6px}
.filter-group select,.filter-group input{width:100%;padding:8px 12px;background:rgba(255,255,255,0.03);border:1px solid rgba(201,168,76,0.1);color:#fff;font-family:'Cormorant Garamond',serif;font-size:0.85rem;outline:none;transition:border 0.3s}
.filter-group select:focus,.filter-group input:focus{border-color:#c9a84c}
.filter-group select option{background:#070707;color:#fff}
.price-range{display:flex;gap:8px}
.price-range input{width:50%}
.list-title{font-family:'Montserrat',sans-serif;font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;color:rgba(255,255,255,0.25);margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid rgba(201,168,76,0.06)}
.list-item{padding:12px 0;border-bottom:1px solid rgba(201,168,76,0.04);cursor:pointer;transition:all 0.3s}
.list-item:hover,.list-item.active{padding-left:10px;border-left:2px solid #c9a84c;margin-left:-2px}
.list-item .li-title{font-weight:400;font-size:0.85rem;letter-spacing:0.04em}
.list-item .li-loc{font-family:'Montserrat',sans-serif;font-size:0.5rem;letter-spacing:0.1em;color:rgba(255,255,255,0.3);margin:2px 0 4px}
.list-item .li-price{font-weight:600;font-size:0.85rem;color:#c9a84c}
.list-item .li-meta{font-family:'Montserrat',sans-serif;font-size:0.5rem;color:rgba(255,255,255,0.3);margin-top:2px}
/* Main area */
.main{flex:1;display:flex;flex-direction:column;padding:32px 0 24px 32px;overflow:hidden}
.main .title{font-weight:300;font-size:clamp(1.2rem,2vw,2rem);letter-spacing:0.15em;margin-bottom:4px}
.main .title span{color:#c9a84c;font-weight:600}
.main .gl{width:40px;height:1px;background:linear-gradient(90deg,#c9a84c,transparent);margin-bottom:20px}
.map-area{flex:1;background:rgba(255,255,255,0.015);border:1px solid rgba(201,168,76,0.06);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.map-grid{position:absolute;width:100%;height:100%;opacity:0.15}
.map-grid line{stroke:rgba(201,168,76,0.15)}
.map-pins{position:absolute;width:100%;height:100%}
.pin{position:absolute;width:10px;height:10px;background:#c9a84c;clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);opacity:0.7;transition:all 0.3s;cursor:pointer}
.pin:hover,.pin.active{opacity:1;transform:scale(1.5)}
.pin-label{position:absolute;background:rgba(7,7,7,0.9);border:1px solid rgba(201,168,76,0.2);padding:4px 8px;font-family:'Montserrat',sans-serif;font-size:0.45rem;white-space:nowrap;color:#fff;pointer-events:none;opacity:0;transition:opacity 0.3s;top:-24px;left:50%;transform:translateX(-50%)}
.pin:hover .pin-label,.pin.active .pin-label{opacity:1}
.map-center{font-family:'Montserrat',sans-serif;font-size:0.8rem;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,255,255,0.08);z-index:1}
.detail-panel{background:rgba(255,255,255,0.02);border:1px solid rgba(201,168,76,0.06);margin-top:16px;padding:16px 20px;display:none}
.detail-panel.show{display:block}
.detail-panel .dp-title{font-weight:400;font-size:1rem;color:#c9a84c;margin-bottom:4px}
.detail-panel .dp-info{font-family:'Montserrat',sans-serif;font-size:0.6rem;color:rgba(255,255,255,0.4)}
@media(max-width:1024px){.sidebar{width:280px}.main{padding-left:20px}}
@media(max-width:768px){
  .app{flex-direction:column;padding:48px 12px 0}.sidebar{width:100%;border-right:none;padding:16px 0 12px;max-height:50vh}
  .main{padding:16px 0 12px}.f-t,.f-b{left:12px;right:12px}.f-l,.f-r{top:12px;bottom:12px}
}
</style></head>
<body>
<div class="f f-t"></div><div class="f f-b"></div><div class="f f-l"></div><div class="f f-r"></div>
<div class="app">
  <div class="sidebar">
    <a href="#" class="logo"><span>888</span>.ESTATE</a>
    <div class="filter-group"><label>Тип объекта</label>
      <select><option>Все</option><option>Дома</option><option>Апартаменты</option><option>Пентхаусы</option></select>
    </div>
    <div class="filter-group"><label>Цена, ₽</label><div class="price-range">
      <input type="text" placeholder="от"><input type="text" placeholder="до">
    </div></div>
    <div class="filter-group"><label>Площадь, м²</label><div class="price-range">
      <input type="text" placeholder="от"><input type="text" placeholder="до">
    </div></div>
    <div class="list-title">Найдено 8 объектов</div>
    <div id="sideList"></div>
  </div>
  <div class="main">
    <div class="title"><span>Каталог</span> / объекты</div>
    <div class="gl"></div>
    <div class="map-area" id="mapArea">
      <svg class="map-grid" viewBox="0 0 400 300" preserveAspectRatio="none">
        <line x1="0" y1="60" x2="400" y2="60"/><line x1="0" y1="120" x2="400" y2="120"/>
        <line x1="0" y1="180" x2="400" y2="180"/><line x1="0" y1="240" x2="400" y2="240"/>
        <line x1="80" y1="0" x2="80" y2="300"/><line x1="160" y1="0" x2="160" y2="300"/>
        <line x1="240" y1="0" x2="240" y2="300"/><line x1="320" y1="0" x2="320" y2="300"/>
      </svg>
      <div class="map-pins" id="mapPins"></div>
      <div class="map-center">КАРТА СОЧИ</div>
    </div>
    <div class="detail-panel" id="detailPanel">
      <div class="dp-title" id="dpTitle">Объект</div>
      <div class="dp-info" id="dpInfo">Характеристики</div>
    </div>
  </div>
</div>
<script>
const props=[
  {t:'Вилла «Золотой берег»',l:'Красная Поляна',p:'28,5 млн ₽',a:'320 м²',b:'4',ba:'3',ty:'Вилла',m:{x:230,y:80}},
  {t:'Особняк «Горный ручей»',l:'Эстосадок',p:'65 млн ₽',a:'480 м²',b:'6',ba:'4',ty:'Особняк',m:{x:250,y:60}},
  {t:'Апартаменты «Лазурный»',l:'Центральный Сочи',p:'14,2 млн ₽',a:'95 м²',b:'2',ba:'1',ty:'Апартаменты',m:{x:180,y:180}},
  {t:'Пентхаус «Панорама»',l:'Адлер',p:'47,8 млн ₽',a:'210 м²',b:'3',ba:'2',ty:'Пентхаус',m:{x:300,y:200}},
  {t:'Апартаменты «Морской бриз»',l:'Имеретинка',p:'19,6 млн ₽',a:'120 м²',b:'2',ba:'1',ty:'Апартаменты',m:{x:340,y:220}},
  {t:'Вилла «Сосновая аллея»',l:'Красная Поляна',p:'52 млн ₽',a:'380 м²',b:'5',ba:'3',ty:'Вилла',m:{x:220,y:90}},
  {t:'Таунхаус «Парковый»',l:'Хоста',p:'22,3 млн ₽',a:'170 м²',b:'3',ba:'2',ty:'Таунхаус',m:{x:120,y:200}},
  {t:'Вилла «Чайный дом»',l:'Дагомыс',p:'38,9 млн ₽',a:'290 м²',b:'4',ba:'2',ty:'Вилла',m:{x:100,y:150}}
];
const sideList=document.getElementById('sideList');
const mapPins=document.getElementById('mapPins');
const dp=document.getElementById('detailPanel');
const dpTitle=document.getElementById('dpTitle');
const dpInfo=document.getElementById('dpInfo');
const mapArea=document.getElementById('mapArea');
let activeIdx=-1;
function showDetail(i){
  document.querySelectorAll('.list-item').forEach((e,j)=>e.classList.toggle('active',j===i));
  document.querySelectorAll('.pin').forEach((e,j)=>e.classList.toggle('active',j===i));
  activeIdx=i;
  if(i>=0){
    const c=props[i];
    dpTitle.textContent=c.t;
    dpInfo.textContent=`${c.loc} · ${c.a} · ${c.b} спальни · ${c.ba} ванные`;
    dp.classList.add('show');
  }else dp.classList.remove('show');
}
props.forEach((c,i)=>{
  const d=document.createElement('div');d.className='list-item';
  d.innerHTML=`<div class="li-title">${c.t}</div><div class="li-loc">${c.l}</div><div class="li-price">${c.p}</div><div class="li-meta">${c.a} · ${c.b} спальни</div>`;
  d.addEventListener('click',()=>showDetail(i));
  sideList.appendChild(d);
  const p=document.createElement('div');p.className='pin';p.style.left=(c.m.x/400*100)+'%';p.style.top=(c.m.y/300*100)+'%';
  p.innerHTML=`<div class="pin-label">${c.t.substring(0,15)}…</div>`;
  p.addEventListener('click',()=>showDetail(i));
  mapPins.appendChild(p);
});
// Show first by default
showDetail(0);
</script></body></html>
