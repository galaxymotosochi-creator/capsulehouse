<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>888.ESTATE — Список объектов</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#070707;color:#fff;font-family:'Cormorant Garamond',serif;min-height:100vh;overflow-x:hidden}
.f{position:fixed;background:rgba(201,168,76,0.07);z-index:100;pointer-events:none}
.f-t,.f-b{left:24px;right:24px;height:1px}.f-l,.f-r{top:24px;bottom:24px;width:1px}
.f-t{top:24px}.f-b{bottom:24px}.f-l{left:24px}.f-r{right:24px}
header{position:sticky;top:0;z-index:50;background:rgba(7,7,7,0.85);backdrop-filter:blur(12px);border-bottom:1px solid rgba(201,168,76,0.08);padding:16px 48px}
.header-inner{max-width:1280px;margin:0 auto;display:flex;justify-content:space-between;align-items:center}
.logo{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:1.4rem;letter-spacing:0.25em;color:#fff;text-decoration:none}
.logo span{color:#c9a84c;font-weight:600}
nav{font-family:'Montserrat',sans-serif;font-weight:300;font-size:0.75rem;letter-spacing:0.15em;text-transform:uppercase}
nav a{color:rgba(255,255,255,0.5);text-decoration:none;margin-left:28px;transition:color 0.3s}
nav a:hover,nav a.active{color:#c9a84c}
.section-title{text-align:center;padding:64px 24px 12px}
.section-title h1{font-weight:300;font-size:clamp(1.4rem,2.2vw,2.4rem);letter-spacing:0.2em}
.section-title h1 span{color:#c9a84c;font-weight:600}
.section-title .gl{width:50px;height:1px;background:linear-gradient(90deg,transparent,#c9a84c,transparent);margin:14px auto}
.section-title .sub{font-family:'Montserrat',sans-serif;font-weight:200;font-size:0.65rem;letter-spacing:0.35em;color:rgba(255,255,255,0.35);text-transform:uppercase}
.list-wrap{max-width:1000px;margin:0 auto;padding:32px 48px 80px}
.card{display:flex;gap:0;margin-bottom:20px;border:1px solid rgba(201,168,76,0.06);background:rgba(255,255,255,0.015);transition:all 0.4s;cursor:pointer}
.card:hover{border-color:rgba(201,168,76,0.2);background:rgba(255,255,255,0.025)}
.card-img{width:280px;min-height:200px;flex-shrink:0;position:relative;overflow:hidden}
.card-img .ph{width:100%;height:100%;position:absolute;top:0;left:0}
.card-img .badge{position:absolute;top:12px;left:12px;font-family:'Montserrat',sans-serif;font-size:0.5rem;letter-spacing:0.12em;text-transform:uppercase;padding:4px 10px;background:#c9a84c;color:#070707;font-weight:500;z-index:2}
.card-body{flex:1;padding:22px 28px;display:flex;flex-direction:column;justify-content:center}
.card-badge-sm{display:none}
.card-title{font-weight:400;font-size:1.25rem;letter-spacing:0.06em;margin-bottom:2px}
.card-loc{font-family:'Montserrat',sans-serif;font-size:0.6rem;letter-spacing:0.12em;color:rgba(255,255,255,0.35);margin-bottom:10px}
.card-desc{font-family:'Montserrat',sans-serif;font-weight:200;font-size:0.7rem;line-height:1.6;color:rgba(255,255,255,0.35);margin-bottom:14px;max-width:480px}
.card-meta{display:flex;justify-content:space-between;align-items:center;margin-top:auto}
.card-price{font-weight:600;font-size:1.2rem;color:#c9a84c}
.card-price span{font-weight:300;font-size:0.7rem;color:rgba(255,255,255,0.3)}
.card-features{display:flex;gap:14px;font-family:'Montserrat',sans-serif;font-size:0.55rem;letter-spacing:0.08em;color:rgba(255,255,255,0.4)}
.card-features span{display:flex;align-items:center;gap:4px}
.card-features .num{color:rgba(255,255,255,0.7);font-weight:400}
@media(max-width:900px){
  .card{flex-direction:column}.card-img{width:100%;height:180px;position:relative}
  .card-body{padding:16px 20px}
  .card-badge-sm{display:inline-block;font-family:'Montserrat',sans-serif;font-size:0.5rem;letter-spacing:0.12em;text-transform:uppercase;padding:2px 8px;background:rgba(201,168,76,0.15);color:#c9a84c;font-weight:400;margin-bottom:8px}
}
@media(max-width:768px){
  header{padding:12px 20px}.header-inner{flex-direction:column;gap:10px}
  nav a{margin:0 10px;font-size:0.65rem}
  .list-wrap{padding:24px 20px 60px}
  .f-t,.f-b{left:12px;right:12px}.f-l,.f-r{top:12px;bottom:12px}
}
</style></head>
<body>
<div class="f f-t"></div><div class="f f-b"></div><div class="f f-l"></div><div class="f f-r"></div>
<header><div class="header-inner">
<a href="#" class="logo"><span>888</span>.ESTATE</a>
<nav><a href="#" class="active">Список</a><a href="#">Грид</a><a href="#">Избранное</a></nav>
</div></header>
<section class="section-title">
<h1><span>Объекты</span> в продаже</h1><div class="gl"></div><div class="sub">8 предложений от 11,8 до 65 млн ₽</div>
</section>
<div class="list-wrap" id="catalogList"></div>
<script>
const props=[
  {t:'Вилла «Золотой берег»',l:'Красная Поляна',p:'28 500 000 ₽',a:'320 м²',b:'4',ba:'3',ty:'Дом',d:'Роскошная вилла с панорамным видом на Кавказский хребет. Собственный бассейн, терраса 80 м², ландшафтный парк.',cl:'gold'},
  {t:'Особняк «Горный ручей»',l:'Эстосадок',p:'65 000 000 ₽',a:'480 м²',b:'6',ba:'4',ty:'Особняк',d:'Эксклюзивный особняк в тихом районе Эстосадка. Камин, винный погреб, спа-зона, гараж на 2 машины.',cl:'gold'},
  {t:'Апартаменты «Лазурный»',l:'Центральный Сочи',p:'14 200 000 ₽',a:'95 м²',b:'2',ba:'1',ty:'Апартаменты',d:'Современные апартаменты в центре Сочи. Отделка премиум-класса, подземный паркинг, круглосуточная охрана.',cl:'blue'},
  {t:'Пентхаус «Панорама»',l:'Адлер',p:'47 800 000 ₽',a:'210 м²',b:'3',ba:'2',ty:'Пентхаус',d:'Двухуровневый пентхаус с террасой 60 м². Вид на море и горы. Собственный лифт, камин.',cl:'warm'},
  {t:'Апартаменты «Морской бриз»',l:'Имеретинка',p:'19 600 000 ₽',a:'120 м²',b:'2',ba:'1',ty:'Апартаменты',d:'Апартаменты первой линии у моря. Закрытый ЖК с собственной пляжной зоной.',cl:'blue'},
  {t:'Вилла «Сосновая аллея»',l:'Красная Поляна',p:'52 000 000 ₽',a:'380 м²',b:'5',ba:'3',ty:'Вилла',d:'Вилла в окружении соснового леса. 4 спальни, кабинет, кинозал, хамам.',cl:'gold'},
  {t:'Таунхаус «Парковый»',l:'Хоста',p:'22 300 000 ₽',a:'170 м²',b:'3',ba:'2',ty:'Таунхаус',d:'Просторный таунхаус с небольшим садом. Закрытый посёлок, детская площадка.',cl:'green'},
  {t:'Вилла «Чайный дом»',l:'Дагомыс',p:'38 900 000 ₽',a:'290 м²',b:'4',ba:'2',ty:'Вилла',d:'Историческая вилла среди чайных плантаций. Бассейн, беседка, фруктовый сад.',cl:'gold'}
];
const pal={gold:'linear-gradient(135deg,#1a140a,#2a1f0d,#3d2a10,#c9a84c20)',blue:'linear-gradient(135deg,#0d121a,#1a1f2a,#0d1a14,#c9a84c15)',warm:'linear-gradient(135deg,#1a0d0d,#2a1410,#3d1a10,#c9a84c18)',green:'linear-gradient(135deg,#0d1a14,#142a1a,#0d1a0d,#c9a84c12)'};
const list=document.getElementById('catalogList');
props.forEach(c=>{
  const d=document.createElement('div');d.className='card';
  d.innerHTML=`<div class="card-img"><div class="ph" style="background:${pal[c.cl]}"></div><div class="badge">${c.ty}</div></div><div class="card-body"><div class="card-badge-sm">${c.ty}</div><div class="card-title">${c.t}</div><div class="card-loc">${c.l}</div><div class="card-desc">${c.d}</div><div class="card-meta"><div class="card-price">${c.p} <span>· ${c.a}</span></div><div class="card-features"><span>🛏 <span class="num">${c.b}</span></span><span>🛁 <span class="num">${c.ba}</span></span></div></div></div>`;
  list.appendChild(d);
});
</script></body></html>
