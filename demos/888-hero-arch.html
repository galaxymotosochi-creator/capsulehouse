<!DOCTYPE html><html lang="ru"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>888.ESTATE — Архитектоника</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;600;700&family=Montserrat:wght@200;300;400&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#070707;overflow:hidden;height:100vh;font-family:'Cormorant Garamond',serif}
#threeCanvas{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:0}
.overlay{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:2;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;pointer-events:none}
.vignette{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:1;pointer-events:none;background:radial-gradient(ellipse at center,transparent 30%,rgba(0,0,0,0.8) 100%)}
.frame-line{position:fixed;background:rgba(201,168,76,0.06);z-index:1;animation:frameAppear 2.5s ease forwards;animation-delay:2.5s;opacity:0}
.frame-t,.frame-b{left:30px;right:30px;height:1px}
.frame-l,.frame-r{top:30px;bottom:30px;width:1px}
.frame-t{top:30px}.frame-b{bottom:30px}.frame-l{left:30px}.frame-r{right:30px}
@keyframes frameAppear{to{opacity:1}}
.logo{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:clamp(4rem,12vw,10rem);letter-spacing:0.35em;color:#fff;opacity:0;animation:logoReveal 2.5s ease forwards;animation-delay:1s}
.logo span{color:#c9a84c;font-weight:700;text-shadow:0 0 60px rgba(201,168,76,0.15)}
@keyframes logoReveal{0%{opacity:0;transform:scale(0.92);filter:blur(3px)}100%{opacity:1;transform:scale(1);filter:blur(0)}}
.tagline{font-family:'Montserrat',sans-serif;font-weight:200;font-size:clamp(0.75rem,1.2vw,1rem);letter-spacing:0.7em;text-transform:uppercase;color:rgba(255,255,255,0.5);margin-top:20px;opacity:0;animation:tagReveal 2s ease forwards;animation-delay:2.5s}
@keyframes tagReveal{0%{opacity:0;transform:translateY(15px)}100%{opacity:1;transform:translateY(0)}}
.gold-line{width:0;height:1px;background:linear-gradient(90deg,transparent,#c9a84c,transparent);margin:24px auto 16px;animation:lineExpand 2s ease forwards;animation-delay:3.2s}
@keyframes lineExpand{to{width:120px}}
.sub{font-family:'Montserrat',sans-serif;font-weight:200;font-size:clamp(0.6rem,0.9vw,0.8rem);letter-spacing:0.4em;color:rgba(255,255,255,0.3);opacity:0;animation:tagReveal 2s ease forwards;animation-delay:3.8s}
.scroll-hint{position:fixed;bottom:50px;left:50%;transform:translateX(-50%);z-index:3;opacity:0;animation:tagReveal 2s ease forwards;animation-delay:4.5s;text-align:center}
.scroll-hint span{display:block;font-family:'Montserrat',sans-serif;font-size:0.55rem;letter-spacing:0.4em;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:6px}
.scroll-hint .mouse{width:18px;height:28px;border:1px solid rgba(201,168,76,0.3);border-radius:9px;margin:0 auto;position:relative}
.scroll-hint .mouse::after{content:'';position:absolute;top:5px;left:50%;transform:translateX(-50%);width:2px;height:5px;background:#c9a84c;border-radius:2px;animation:wheel 1.5s ease infinite}
@keyframes wheel{0%{opacity:1;transform:translateX(-50%)translateY(0)}100%{opacity:0;transform:translateX(-50%)translateY(8px)}}
@media(max-width:768px){.frame-t,.frame-b{left:15px;right:15px}.frame-l,.frame-r{top:15px;bottom:15px}.logo{letter-spacing:0.2em}.tagline{letter-spacing:0.3em}}
</style></head><body>
<canvas id="threeCanvas"></canvas><div class="vignette"></div>
<div class="frame-line frame-t"></div><div class="frame-line frame-b"></div>
<div class="frame-line frame-l"></div><div class="frame-line frame-r"></div>
<div class="overlay">
<div class="logo"><span>888</span>.ESTATE</div>
<div class="tagline">Архитектура будущего</div>
<div class="gold-line"></div>
<div class="sub">Сочи · Красная Поляна · Побережье</div>
</div>
<div class="scroll-hint"><span>Листайте</span><div class="mouse"></div></div>
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js"}}</script>
<script type="module">
import*as THREE from 'three';
const canvas=document.getElementById('threeCanvas');
const scene=new THREE.Scene();scene.background=new THREE.Color(0x070707);
const camera=new THREE.PerspectiveCamera(45,window.innerWidth/window.innerHeight,0.1,100);
camera.position.set(4,3,8);camera.lookAt(0,0,0);
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:false});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));

// ЗДАНИЕ ИЗ WIREFRAME-СЛОЁВ
const bg=new THREE.Group();scene.add(bg);
const L=6,W=2.5,D=1.8,TH=4,LH=TH/L;

for(let i=0;i<L;i++){
  const y=-TH/2+i*LH+LH/2;
  const w=W*(1-i*0.03),d=D*(1-i*0.03),f=i/L;
  const b=new THREE.BoxGeometry(w,LH*0.9,d);
  const e=new THREE.EdgesGeometry(b);
  const m=new THREE.LineBasicMaterial({color:0x8a7a5a,transparent:true,opacity:0.1+f*0.25});
  const box=new THREE.LineSegments(e,m);box.position.y=y;bg.add(box);
  if(i<L-1){
    const c=[[-w/2,-LH/2,-d/2],[w/2,-LH/2,-d/2],[-w/2,-LH/2,d/2],[w/2,-LH/2,d/2]];
    const nW=W*(1-(i+1)*0.03),nD=D*(1-(i+1)*0.03);
    const nc=[[-nW/2,LH/2,-nD/2],[nW/2,LH/2,-nD/2],[-nW/2,LH/2,nD/2],[nW/2,LH/2,nD/2]];
    for(let ci=0;ci<4;ci++){
      const g=new THREE.BufferGeometry();
      const p=new Float32Array([c[ci][0],y+c[ci][1],c[ci][2],nc[ci][0],y+nc[ci][1],nc[ci][2]]);
      g.setAttribute('position',new THREE.BufferAttribute(p,3));
      const vm=new THREE.LineBasicMaterial({color:0xc9a84c,transparent:true,opacity:0.05+f*0.15});
      bg.add(new THREE.Line(g,vm));
    }
  }
}
// Пирамида-шпиль
const tW=W*(1-(L-1)*0.03),tD=D*(1-(L-1)*0.03),tip=TH/2+0.8,base=TH/2-LH/2;
const pe=[[-tW/2,base,-tD/2,0,tip,0],[tW/2,base,-tD/2,0,tip,0],[-tW/2,base,tD/2,0,tip,0],[tW/2,base,tD/2,0,tip,0]];
for(const pts of pe){
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.BufferAttribute(new Float32Array(pts),3));
  bg.add(new THREE.Line(g,new THREE.LineBasicMaterial({color:0xc9a84c,transparent:true,opacity:0.25})));
}
// Золотое свечение на вершине
const glowGeo=new THREE.SphereGeometry(0.08,8,8);
const glowMat2=new THREE.MeshBasicMaterial({color:0xc9a84c,transparent:true,opacity:0.6});
const glowSphere=new THREE.Mesh(glowGeo,glowMat2);glowSphere.position.set(0,tip,0);bg.add(glowSphere);

// ЧАСТИЦЫ
const PC=500;
const pg=new THREE.BufferGeometry();
const pp=new Float32Array(PC*3),ps=new Float32Array(PC);
const pd=[];
for(let i=0;i<PC;i++){
  const t=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1),r=2.5+Math.random()*4.5;
  pp[i*3]=r*Math.sin(ph)*Math.cos(t);
  pp[i*3+1]=(Math.random()-0.5)*6;
  pp[i*3+2]=r*Math.sin(ph)*Math.sin(t);
  ps[i]=Math.random()*3+1;
  pd.push({t,ph,r,oy:pp[i*3+1],sp:0.1+Math.random()*0.2,fo:Math.random()*Math.PI*2,sz:ps[i]});
}
pg.setAttribute('position',new THREE.BufferAttribute(pp,3));
pg.setAttribute('size',new THREE.BufferAttribute(ps,1));
const pm=new THREE.PointsMaterial({color:0xc9a84c,size:0.022,transparent:true,opacity:0.35,blending:THREE.AdditiveBlending,depthWrite:false,sizeAttenuation:true});
const particles=new THREE.Points(pg,pm);scene.add(particles);

// ЗВЁЗДЫ
const SG=800,sg=new THREE.BufferGeometry(),sp2=new Float32Array(SG*3);
for(let i=0;i<SG;i++){const r=15+Math.random()*35,t=Math.random()*Math.PI*2,p=Math.acos(2*Math.random()-1);sp2[i*3]=r*Math.sin(p)*Math.cos(t);sp2[i*3+1]=Math.abs(r*Math.cos(p))*0.3;sp2[i*3+2]=-r*Math.sin(p)*Math.sin(t)-5}
sg.setAttribute('position',new THREE.BufferAttribute(sp2,3));
const sm=new THREE.PointsMaterial({color:0xffffff,size:0.018,transparent:true,opacity:0.25,blending:THREE.AdditiveBlending,depthWrite:false});
const stars=new THREE.Points(sg,sm);scene.add(stars);

// ПОЛ
const grid=new THREE.GridHelper(10,30,0x1a1a1a,0x1a1a1a);
grid.position.y=-TH/2-0.3;grid.material.transparent=true;grid.material.opacity=0.06;
scene.add(grid);
scene.fog=new THREE.FogExp2(0x070707,0.04);

// АНИМАЦИЯ
let time=0;
function animate(){
  requestAnimationFrame(animate);
  time+=0.008;
  bg.rotation.y=time*0.04;
  const b=1+Math.sin(time*0.3)*0.01;
  bg.scale.set(b,b,b);
  
  // Частицы движутся
  const pos=particles.geometry.attributes.position.array;
  for(let i=0;i<PC;i++){
    const d=pd[i];
    const a=d.t+time*d.sp*0.04;
    pos[i*3]=Math.cos(a)*d.r;
    pos[i*3+1]=d.oy+Math.sin(time*d.sp*0.5+d.fo)*0.4;
    pos[i*3+2]=Math.sin(a)*d.r;
  }
  particles.geometry.attributes.position.needsUpdate=true;
  
  // Камера плывёт
  camera.position.x=4+Math.sin(time*0.04)*1.2;
  camera.position.y=3+Math.sin(time*0.03)*0.2;
  camera.position.z=8+Math.sin(time*0.02)*0.3;
  camera.lookAt(0,0.2,0);
  
  // Мерцание
  pm.opacity=0.3+Math.sin(time*0.5)*0.08;
  
  // Вершина пульсирует
  const gs=0.08+Math.sin(time*0.8)*0.04;
  glowSphere.scale.set(gs/0.08,gs/0.08,gs/0.08);
  glowMat2.opacity=0.4+Math.sin(time*0.8)*0.2;
  
  renderer.render(scene,camera);
}
animate();
window.addEventListener('resize',()=>{
  const w=window.innerWidth,h=window.innerHeight;
  camera.aspect=w/h;camera.updateProjectionMatrix();
  renderer.setSize(w,h);
});
</script></body></html>
