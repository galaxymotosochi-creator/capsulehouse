<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>888.ESTATE — Featured</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#070707;color:#fff;font-family:'Cormorant Garamond',serif;min-height:100vh;overflow-x:hidden}
.f{position:fixed;background:rgba(201,168,76,0.07);z-index:100;pointer-events:none}
.f-t,.f-b{left:24px;right:24px;height:1px}.f-l,.f-r{top:24px;bottom:24px;width:1px}
.f-t{top:24px}.f-b{bottom:24px}.f-l{left:24px}.f-r{right:24px}
header{position:sticky;top:0;z-index:50;background:rgba(7,7,7,0.85);backdrop-filter:blur(12px);border-bottom:1px solid rgba(201,168,76,0.08);padding:16px 48px}
.header-inner{max-width:1280px;margin:0 auto;display:flex;justify-content:space-between;align-items:center}
.logo{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:1.4rem;letter-spacing:0.25em;color:#fff;text-decoration:none}
.logo span{color:#c9a84c;font-weight:600}
nav{font-family:'Montserrat',sans-serif;font-weight:300;font-size:0.75rem;letter-spacing:0.15em;text-transform:uppercase}
nav a{color:rgba(255,255,255,0.5);text-decoration:none;margin-left:28px;transition:color 0.3s}
nav a:hover{color:#c9a84c}
.featured{max-width:1280px;margin:0 auto;padding:40px 48px 0;display:grid;grid-template-columns:1fr 360px;gap:28px}
.featured-main{position:relative;overflow:hidden;border:1px solid rgba(201,168,76,0.08);cursor:pointer;transition:border 0.4s}
.featured-main:hover{border-color:rgba(201,168,76,0.3)}
.featured-main .ph{width:100%;height:420px}
.featured-main .info{position:absolute;bottom:0;left:0;right:0;padding:30px 28px 28px;background:linear-gradient(transparent,rgba(7,7,7,0.95))}
.featured-main .badge{display:inline-block;font-family:'Montserrat',sans-serif;font-size:0.45rem;letter-spacing:0.15em;text-transform:uppercase;padding:3px 8px;background:#c9a84c;color:#070707;font-weight:500;margin-bottom:8px}
.featured-main .title{font-weight:400;font-size:1.6rem;letter-spacing:0.06em;margin-bottom:2px}
.featured-main .loc{font-family:'Montserrat',sans-serif;font-size:0.6rem;letter-spacing:0.12em;color:rgba(255,255,255,0.35);margin-bottom:8px}
.featured-main .meta{display:flex;justify-content:space-between;align-items:center}
.featured-main .price{font-weight:600;font-size:1.3rem;color:#c9a84c}
.featured-main .price span{font-weight:300;font-size:0.65rem;color:rgba(255,255,255,0.4)}
.featured-main .features{display:flex;gap:16px;font-family:'Montserrat',sans-serif;font-size:0.55rem;color:rgba(255,255,255,0.4)}
.featured-main .features .num{color:rgba(255,255,255,0.7);font-weight:400}
.featured-side{display:flex;flex-direction:column;gap:14px}
.fs-card{border:1px solid rgba(201,168,76,0.06);padding:16px 18px;cursor:pointer;transition:all 0.3s;flex:1;display:flex;gap:14px;align-items:center}
.fs-card:hover,.fs-card.active{border-color:rgba(201,168,76,0.2);background:rgba(255,255,255,0.02)}
.fs-img{width:80px;height:80px;flex-shrink:0}
.fs-img .ph{width:100%;height:100%}
.fs-body{flex:1;min-width:0}
.fs-title{font-weight:400;font-size:0.8rem;letter-spacing:0.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:1px}
.fs-loc{font-family:'Montserrat',sans-serif;font-size:0.45rem;letter-spacing:0.1em;color:rgba(255,255,255,0.25);margin-bottom:4px}
.fs-price{font-weight:600;font-size:0.85rem;color:#c9a84c}
.fs-price span{font-weight:300;font-size:0.5rem;color:rgba(255,255,255,0.25)}
.st{text-align:center;padding:60px 24px 8px}
.st h2{font-weight:300;font-size:clamp(1.2rem,1.8vw,2rem);letter-spacing:0.2em}
.st h2 span{color:#c9a84c;font-weight:600}
.st .gl{width:40px;height:1px;background:linear-gradient(90deg,transparent,#c9a84c,transparent);margin:12px auto}
.st .sub{font-family:'Montserrat',sans-serif;font-weight:200;font-size:0.6rem;letter-spacing:0.35em;color:rgba(255,255,255,0.3);text-transform:uppercase}
.grid{max-width:1280px;margin:0 auto;padding:28px 48px 80px;display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
.card{background:rgba(255,255,255,0.015);border:1px solid rgba(201,168,76,0.05);transition:all 0.4s;cursor:pointer}
.card:hover{border-color:rgba(201,168,76,0.2);transform:translateY(-3px)}
.card-img{width:100%;height:160px;position:relative}
.card-img .ph{width:100%;height:100%}
.card-img .badge{position:absolute;top:8px;left:8px;font-family:'Montserrat',sans-serif;font-size:0.4rem;letter-spacing:0.1em;text-transform:uppercase;padding:2px 7px;background:rgba(201,168,76,0.85);color:#070707;font-weight:500}
.card-body{padding:14px 16px 18px}
.card-title{font-weight:400;font-size:0.85rem;letter-spacing:0.04em;margin-bottom:2px}
.card-loc{font-family:'Montserrat',sans-serif;font-size:0.45rem;letter-spacing:0.1em;color:rgba(255,255,255,0.25);margin-bottom:6px}
.card-price{font-weight:600;font-size:0.9rem;color:#c9a84c}
.card-price span{font-weight:300;font-size:0.5rem;color:rgba(255,255,255,0.2)}
@media(max-width:1100px){.grid{grid-template-columns:repeat(3,1fr)}.featured{grid-template-columns:1fr 280px}}
@media(max-width:900px){
  .featured{grid-template-columns:1fr}.featured-side{flex-direction:row;overflow-x:auto;gap:10px;padding-bottom:4px}
  .fs-card{flex:0 0 220px;flex-direction:column;text-align:center}.fs-img{width:100%;height:100px}
}
@media(max-width:768px){
  header{padding:12px 20px}.header-inner{flex-direction:column;gap:10px}
  nav a{margin:0 10px;font-size:0.65rem}
  .featured{padding:24px 20px 0}.featured-main .ph{height:260px}
  .grid{padding:20px 20px 60px;grid-template-columns:1fr 1fr}
  .f-t,.f-b{left:12px;right:12px}.f-l,.f-r{top:12px;bottom:12px}
}
@media(max-width:480px){.grid{grid-template-columns:1fr}}
</style></head>
<body>
<div class="f f-t"></div><div class="f f-b"></div><div class="f f-l"></div><div class="f f-r"></div>
<header><div class="header-inner">
<a href="#" class="logo"><span>888</span>.ESTATE</a>
<nav><a href="#" class="active">Каталог</a><a href="#">О нас</a><a href="#">Контакты</a></nav>
</div></header>

<section class="featured">
  <div class="featured-main" id="featMain">
    <div class="ph" style="background:linear-gradient(135deg,#1a140a 0%,#2a1f0d 30%,#3d2a10 60%,#c9a84c25 100%)"></div>
    <div class="info">
      <div class="badge">TOP</div>
      <div class="title" id="featTitle">Резиденция «Император»</div>
      <div class="loc" id="featLoc">Красная Поляна</div>
      <div class="meta">
        <div class="price" id="featPrice">89 000 000 ₽ <span>· 620 m²</span></div>
        <div class="features" id="featFeat">
          <span>8 спален</span><span>5 ванных</span><span>620 m²</span>
        </div>
      </div>
    </div>
  </div>
  <div class="featured-side" id="featSide"></div>
</section>

<div class="st"><h2>Все <span>объекты</span></h2><div class="gl"></div><div class="sub">Ещё 7 предложений</div></div>
<div class="grid" id="miniGrid"></div>

<script>
const topProps=[
  {t:'Резиденция «Император»',l:'Красная Поляна',p:'89 000 000 руб',a:'620 m2',b:'8',ba:'5',cl:'gold'},
  {t:'Особняк «Горный ручей»',l:'Эстосадок',p:'65 000 000 руб',a:'480 m2',b:'6',ba:'4',cl:'gold'},
  {t:'Вилла «Сосновая аллея»',l:'Красная Поляна',p:'52 000 000 руб',a:'380 m2',b:'5',ba:'3',cl:'gold'},
  {t:'Пентхаус «Панорама»',l:'Адлер',p:'47 800 000 руб',a:'210 m2',b:'3',ba:'2',cl:'warm'}
];
const miniProps=[
  {t:'Вилла «Золотой берег»',l:'Красная Поляна',p:'28,5 млн',a:'320 m2',cl:'gold'},
  {t:'Апартаменты «Лазурный»',l:'Центральный Сочи',p:'14,2 млн',a:'95 m2',cl:'blue'},
  {t:'Вилла «Чайный дом»',l:'Дагомыс',p:'38,9 млн',a:'290 m2',cl:'gold'},
  {t:'Таунхаус «Парковый»',l:'Хоста',p:'22,3 млн',a:'170 m2',cl:'green'},
  {t:'Апартаменты «Морской бриз»',l:'Имеретинка',p:'19,6 млн',a:'120 m2',cl:'blue'},
  {t:'Апартаменты «Атриум»',l:'Центральный Сочи',p:'11,8 млн',a:'78 m2',cl:'warm'},
  {t:'Вилла «Берег»',l:'Красная Поляна',p:'28,5 млн',a:'320 m2',cl:'gold'}
];
const pal={gold:'linear-gradient(135deg,#1a140a,#2a1f0d,#3d2a10,#c9a84c20)',blue:'linear-gradient(135deg,#0d121a,#1a1f2a,#0d1a14,#c9a84c15)',warm:'linear-gradient(135deg,#1a0d0d,#2a1410,#3d1a10,#c9a84c18)',green:'linear-gradient(135deg,#0d1a14,#142a1a,#0d1a0d,#c9a84c12)'};

const side=document.getElementById('featSide');
const featTitle=document.getElementById('featTitle');
const featLoc=document.getElementById('featLoc');
const featPrice=document.getElementById('featPrice');
const featFeat=document.getElementById('featFeat');
function showTop(i){
  const c=topProps[i];
  featTitle.textContent=c.t;
  featLoc.textContent=c.l;
  featPrice.innerHTML=c.p+' <span>'+c.a+'</span>';
  featFeat.innerHTML='<span>'+c.b+' спален</span><span>'+c.ba+' ванных</span><span>'+c.a+'</span>';
  document.getElementById('featMain').querySelector('.ph').style.background=pal[c.cl];
}
topProps.forEach(function(c,i){
  var d=document.createElement('div');d.className='fs-card';
  d.innerHTML='<div class="fs-img"><div class="ph" style="background:'+pal[c.cl]+'"></div></div><div class="fs-body"><div class="fs-title">'+c.t+'</div><div class="fs-loc">'+c.l+'</div><div class="fs-price">'+c.p.split(' ')[0]+' <span>'+c.a+'</span></div></div>';
  d.addEventListener('click',function(){showTop(i);});
  side.appendChild(d);
});
showTop(0);

const grid=document.getElementById('miniGrid');
miniProps.forEach(function(c){
  var d=document.createElement('div');d.className='card';
  d.innerHTML='<div class="card-img"><div class="ph" style="background:'+pal[c.cl]+'"></div></div><div class="card-body"><div class="card-title">'+c.t+'</div><div class="card-loc">'+c.l+'</div><div class="card-price">'+c.p+' <span>'+c.a+'</span></div></div></div>';
  grid.appendChild(d);
});
</script></body></html>
