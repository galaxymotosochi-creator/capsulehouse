<!DOCTYPE html><html lang="ru"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>888.ESTATE — Архитектурный каркас</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;600;700&family=Montserrat:wght@200;300;400&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#070707;overflow:hidden;height:100vh;font-family:'Cormorant Garamond',serif;color:#fff}
#bg{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:0}
.v{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:1;background:radial-gradient(ellipse at 50% 55%,transparent 5%,rgba(0,0,0,0.9) 100%)}
.f{position:fixed;background:rgba(201,168,76,0.06);z-index:1;animation:fa 2.5s ease forwards;animation-delay:2.5s;opacity:0}
.f-t,.f-b{left:30px;right:30px;height:1px}.f-l,.f-r{top:30px;bottom:30px;width:1px}
.f-t{top:30px}.f-b{bottom:30px}.f-l{left:30px}.f-r{right:30px}
@keyframes fa{to{opacity:1}}
.overlay{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:2;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;pointer-events:none}
.logo{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:clamp(4rem,12vw,10rem);letter-spacing:0.35em;color:#fff;opacity:0;animation:lr 2.5s ease forwards;animation-delay:1s}
.logo span{color:#c9a84c;font-weight:700;text-shadow:0 0 80px rgba(201,168,76,0.2)}
@keyframes lr{0%{opacity:0;transform:scale(0.92);filter:blur(3px)}100%{opacity:1;transform:scale(1);filter:blur(0)}}
.tag{font-family:'Montserrat',sans-serif;font-weight:200;font-size:clamp(0.75rem,1.2vw,1rem);letter-spacing:0.7em;text-transform:uppercase;color:rgba(255,255,255,0.5);margin-top:20px;opacity:0;animation:tr 2s ease forwards;animation-delay:2.5s}
@keyframes tr{0%{opacity:0;transform:translateY(15px)}100%{opacity:1;transform:translateY(0)}}
.gl{width:0;height:1px;background:linear-gradient(90deg,transparent,#c9a84c,transparent);margin:24px auto 16px;animation:le 2s ease forwards;animation-delay:3.2s}
@keyframes le{to{width:120px}}
.sub{font-family:'Montserrat',sans-serif;font-weight:200;font-size:clamp(0.6rem,0.9vw,0.8rem);letter-spacing:0.4em;color:rgba(255,255,255,0.3);opacity:0;animation:tr 2s ease forwards;animation-delay:3.8s}
.sh{position:fixed;bottom:50px;left:50%;transform:translateX(-50%);z-index:3;opacity:0;animation:tr 2s ease forwards;animation-delay:4.5s;text-align:center}
.sh span{display:block;font-family:'Montserrat',sans-serif;font-size:0.55rem;letter-spacing:0.4em;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:6px}
.sh .m{width:18px;height:28px;border:1px solid rgba(201,168,76,0.3);border-radius:9px;margin:0 auto;position:relative}
.sh .m::after{content:'';position:absolute;top:5px;left:50%;transform:translateX(-50%);width:2px;height:5px;background:#c9a84c;border-radius:2px;animation:w 1.5s ease infinite}
@keyframes w{0%{opacity:1;transform:translateX(-50%)translateY(0)}100%{opacity:0;transform:translateX(-50%)translateY(8px)}}
@media(max-width:768px){.f-t,.f-b{left:15px;right:15px}.f-l,.f-r{top:15px;bottom:15px}.logo{letter-spacing:0.2em}.tag{letter-spacing:0.3em}}
</style></head><body>
<canvas id="bg"></canvas><div class="v"></div>
<div class="f f-t"></div><div class="f f-b"></div><div class="f f-l"></div><div class="f f-r"></div>
<div class="overlay">
<div class="logo"><span>888</span>.ESTATE</div>
<div class="tag">Архитектура света</div>
<div class="gl"></div>
<div class="sub">Сочи · Красная Поляна · Побережье</div>
</div>
<div class="sh"><span>Листайте</span><div class="m"></div></div>
<script>
const canvas=document.getElementById('bg'),ctx=canvas.getContext('2d');
let W,H;function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
resize();window.addEventListener('resize',resize);
const gCanvas=document.createElement('canvas'),gCtx=gCanvas.getContext('2d');
function rG(){gCanvas.width=W;gCanvas.height=H}
rG();window.addEventListener('resize',rG);

// === BUILDING ===
const floors=6,tW=0.8,tD=0.6,fH=0.55,tH=floors*fH;
function buildTower(){
  const verts=[],edges=[];
  for(let f=0;f<=floors;f++){
    const y=-tH/2+f*fH,sh=1-f*0.025,w=tW*sh,d=tD*sh,idx=verts.length;
    verts.push([-w/2,y,-d/2],[w/2,y,-d/2],[w/2,y,d/2],[-w/2,y,d/2]);
    if(f<floors){
      const sy=y+fH,s=1-(f+1)*0.025,sw=tW*s,sd=tD*s;
      verts.push([-sw/2,sy,-sd/2],[sw/2,sy,-sd/2],[sw/2,sy,sd/2],[-sw/2,sy,sd/2]);
      for(let c=0;c<4;c++)edges.push([idx+c,idx+4+c]);
      for(let c=0;c<4;c++)edges.push([idx+c,idx+(c+1)%4]);
      for(let c=0;c<4;c++)edges.push([idx+4+c,idx+4+(c+1)%4]);
    }else{
      verts.push([0,tH/2+0.4,0]);const ti=verts.length-1;
      for(let c=0;c<4;c++)edges.push([idx+c,ti]);
      for(let c=0;c<4;c++)edges.push([idx+c,idx+(c+1)%4]);
    }
  }
  return{verts,edges};
}
const tower=buildTower();

// === WINDOWS ===
const windows=[];
for(let f=0;f<floors;f++){
  const y=-tH/2+f*fH+fH*0.4,sh=1-f*0.025,w=tW*sh*0.6,d=tD*sh*0.6;
  for(let side=0;side<4;side++)for(let c=0;c<4;c++){
    const wx=c/3-0.5;let px,py,pz;
    if(side===0){px=wx*w;py=y;pz=-d/2}else if(side===1){px=wx*w;py=y;pz=d/2}else if(side===2){px=-w/2;py=y;pz=wx*d}else{px=w/2;py=y;pz=wx*d}
    windows.push({x:px,y:py,z:pz,ph:Math.random()*Math.PI*2,sp:0.3+Math.random()*0.5});
  }
}

// === PARTICLES ===
const particles=[];
for(let i=0;i<300;i++){const a=Math.random()*Math.PI*2,r=1+Math.random()*3.5;particles.push({x:Math.cos(a)*r,y:(Math.random()-0.5)*tH,z:Math.sin(a)*r,r,a,oy:(Math.random()-0.5)*tH,sp:0.05+Math.random()*0.1,ph:Math.random()*Math.PI*2})}

// === STARS ===
const stars=[];
for(let i=0;i<200;i++){const a=Math.random()*Math.PI*2,r=8+Math.random()*20;stars.push({x:Math.cos(a)*r,y:(Math.random()-0.5)*8,z:Math.sin(a)*r-3,s:0.5+Math.random()*1.5,o:0.1+Math.random()*0.3,ph:Math.random()*Math.PI*2})}

function project(x,y,z,scale){const d=6,f=3.2,sz=f/(d+z);return{x:x*sz*scale+W/2,y:-y*sz*scale+H*0.55,sz}}
function rotY(x,y,z,a){const c=Math.cos(a),s=Math.sin(a);return{x:x*c-z*s,y,z:x*s+z*c}}

let time=0;
function draw(){
  time+=0.004;const rot=time*0.25,sc=Math.min(W/800,H/600)*1.2;
  ctx.fillStyle='#070707';ctx.fillRect(0,0,W,H);
  const bg=ctx.createRadialGradient(W/2,H*0.4,0,W/2,H*0.4,W*0.9);
  bg.addColorStop(0,'rgba(15,12,8,0.4)');bg.addColorStop(1,'rgba(7,7,7,0)');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  const wg=ctx.createRadialGradient(W/2,H+20,0,W/2,H+20,W*0.6);
  wg.addColorStop(0,'rgba(201,168,76,0.03)');wg.addColorStop(1,'rgba(201,168,76,0)');
  ctx.fillStyle=wg;ctx.fillRect(0,H-80,W,80);
  
  // Stars
  for(const s of stars){const r=rotY(s.x,s.y,s.z,rot*0.02),p=project(r.x,r.y,r.z,sc);if(p.sz>0){ctx.globalAlpha=s.o*(0.5+0.5*Math.sin(time*0.2+s.ph))*p.sz;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(p.x,p.y,s.s*p.sz*1.5,0,6);ctx.fill()}}
  ctx.globalAlpha=1;
  
  // Grid
  for(let i=-20;i<=20;i++){const p=i/20*5;const x1=project(p,-tH/2-0.2,-5,sc),x2=project(p,-tH/2-0.2,5,sc);ctx.strokeStyle='rgba(60,55,40,0.04)';ctx.lineWidth=0.5;ctx.beginPath();ctx.moveTo(x1.x,x1.y);ctx.lineTo(x2.x,x2.y);ctx.stroke();const z1=project(-5,-tH/2-0.2,p,sc),z2=project(5,-tH/2-0.2,p,sc);ctx.beginPath();ctx.moveTo(z1.x,z1.y);ctx.lineTo(z2.x,z2.y);ctx.stroke()}
  
  // Building edges
  for(const e of tower.edges){
    const v1=tower.verts[e[0]],v2=tower.verts[e[1]];
    const r1=rotY(v1[0],v1[1],v1[2],rot),r2=rotY(v2[0],v2[1],v2[2],rot);
    const p1=project(r1.x,r1.y,r1.z,sc),p2=project(r2.x,r2.y,r2.z,sc);
    if(p1.sz>0&&p2.sz>0){
      const az=(p1.sz+p2.sz)/2;
      ctx.globalAlpha=az*0.15;ctx.strokeStyle='#8a7a5a';ctx.lineWidth=0.8;
      ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);ctx.stroke();
    }
  }
  
  // Pyramid edges gold
  for(let i=24;i<28;i++){const e=tower.edges[i];const v1=tower.verts[e[0]],v2=tower.verts[e[1]];const r1=rotY(v1[0],v1[1],v1[2],rot),r2=rotY(v2[0],v2[1],v2[2],rot);const p1=project(r1.x,r1.y,r1.z,sc),p2=project(r2.x,r2.y,r2.z,sc);if(p1.sz>0&&p2.sz>0){const az=(p1.sz+p2.sz)/2;ctx.globalAlpha=az*0.25;ctx.strokeStyle='#c9a84c';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);ctx.stroke()}}
  
  // Windows on glow canvas
  gCtx.clearRect(0,0,W,H);
  for(const w of windows){
    const r=rotY(w.x,w.y,w.z,rot);const p=project(r.x,r.y,r.z,sc);
    if(p.sz>0&&r.z>-2){
      const tw=0.3+0.7*(0.5+0.5*Math.sin(time*w.sp+w.ph));
      gCtx.globalAlpha=tw*p.sz*0.6;
      const gg=gCtx.createRadialGradient(p.x,p.y,0,p.x,p.y,3*p.sz);
      gg.addColorStop(0,'rgb(255,218,140)');gg.addColorStop(1,'rgba(255,218,140,0)');
      gCtx.fillStyle=gg;gCtx.beginPath();gCtx.arc(p.x,p.y,3*p.sz,0,6);gCtx.fill();
    }
  }
  gCtx.globalAlpha=1;ctx.drawImage(gCanvas,0,0);
  
  // Particles
  for(const p of particles){
    const a=p.a+time*p.sp;const r=rotY(Math.cos(a)*p.r,p.oy+Math.sin(time*p.sp*0.3+p.ph)*0.3,Math.sin(a)*p.r,rot);
    const pp=project(r.x,r.y,r.z,sc);
    if(pp.sz>0){
      ctx.globalAlpha=pp.sz*0.12;ctx.fillStyle='#c9a84c';
      ctx.beginPath();ctx.arc(pp.x,pp.y,1.5*pp.sz,0,6);ctx.fill();
    }
  }
  ctx.globalAlpha=1;
  
  requestAnimationFrame(draw);
}
draw();
</script></body></html>
