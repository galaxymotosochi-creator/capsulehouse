<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>888.ESTATE — Spaces You Want to Live In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bg: '#070707',
                        'bg-card': '#0e0e0e',
                        'gold': '#c9a84c',
                        'gold-light': '#e0c068',
                        'gold-muted': '#8a7840',
                        'surface': '#141414',
                        'surface-hover': '#1c1c1c',
                        'border-subtle': 'rgba(255,255,255,0.06)',
                        'border-hover': 'rgba(201,168,76,0.15)',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['"Playfair Display"', 'serif'],
                    },
                    letterSpacing: {
                        'ultra-wide': '0.25em',
                        'mega': '0.4em',
                    }
                }
            }
        }
    </script>
    <style>
        html { scroll-behavior: smooth; }
        body {
            background-color: #070707;
            color: #f5f5f5;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        /* ============================================
           KEYFRAMES
           ============================================ */
        
        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(60px) scale(0.96);
                filter: blur(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }
        
        @keyframes slowFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        
        @keyframes gentlePulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(201,168,76,0); }
            50% { box-shadow: 0 0 25px 4px rgba(201,168,76,0.06); }
        }
        
        @keyframes goldShimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }
        
        @keyframes lineGrow {
            from { transform: scaleX(0); }
            to { transform: scaleX(1); }
        }
        
        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.08); opacity: 0.85; }
        }
        
        @keyframes gradientRotate {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-40px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(40px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        /* ============================================
           SCROLL REVEAL CLASSES
           ============================================ */
        
        .reveal {
            opacity: 0;
            transform: translateY(50px);
            transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        /* ============================================
           ESTATE CARD
           ============================================ */
        
        .estate-card {
            background: rgba(14,14,14,0.7);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.04);
            border-radius: 16px;
            padding: 56px 44px;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.55s cubic-bezier(0.16, 1, 0.3, 1);
            will-change: transform, box-shadow;
        }
        
        .estate-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 16px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(201,168,76,0) 0%, rgba(201,168,76,0.08) 50%, rgba(201,168,76,0) 100%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.6s ease;
        }
        
        .estate-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(600px circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(201,168,76,0.04), transparent 60%);
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
            border-radius: 16px;
        }
        
        .estate-card:hover {
            transform: translateY(-8px) scale(1.01);
            border-color: rgba(201,168,76,0.12);
            box-shadow: 0 32px 64px -16px rgba(0,0,0,0.5), 0 0 0 1px rgba(201,168,76,0.06);
        }
        
        .estate-card:hover::before {
            opacity: 1;
        }
        
        .estate-card:hover::after {
            opacity: 1;
        }
        
        .estate-card:hover .card-glow {
            opacity: 1;
        }
        
        .estate-card:hover .icon-ring {
            border-color: rgba(201,168,76,0.25);
            box-shadow: 0 0 30px rgba(201,168,76,0.08), inset 0 0 20px rgba(201,168,76,0.03);
        }
        
        .estate-card:hover .estate-icon {
            transform: scale(1.1) rotate(-3deg);
            filter: drop-shadow(0 0 12px rgba(201,168,76,0.3));
        }
        
        .estate-card:hover .card-desc {
            color: rgba(255,255,255,0.75);
        }
        
        /* Card inner glow element */
        .card-glow {
            position: absolute;
            top: -100px;
            right: -100px;
            width: 260px;
            height: 260px;
            background: radial-gradient(circle, rgba(201,168,76,0.06) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.6s ease;
            pointer-events: none;
        }
        
        /* Card footer line */
        .card-footer-line {
            position: absolute;
            bottom: 0;
            left: 24px;
            right: 24px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(201,168,76,0.15), transparent);
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        
        .estate-card:hover .card-footer-line {
            opacity: 1;
        }
        
        /* Icon ring */
        .icon-ring {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 32px;
            position: relative;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            background: rgba(255,255,255,0.015);
        }
        
        .icon-ring::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 50%;
            padding: 1px;
            background: linear-gradient(135deg, rgba(201,168,76,0.2), rgba(201,168,76,0));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0.4;
            transition: opacity 0.5s ease;
        }
        
        .estate-icon {
            font-size: 32px;
            line-height: 1;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: block;
        }
        
        .card-desc {
            color: rgba(255,255,255,0.45);
            transition: color 0.4s ease;
        }
        
        /* Number watermark */
        .card-number {
            position: absolute;
            top: 32px;
            right: 36px;
            font-family: 'Playfair Display', serif;
            font-size: 72px;
            font-weight: 400;
            color: rgba(255,255,255,0.02);
            line-height: 1;
            pointer-events: none;
            transition: color 0.4s ease;
        }
        
        .estate-card:hover .card-number {
            color: rgba(201,168,76,0.04);
        }
        
        /* ============================================
           TYPOGRAPHY
           ============================================ */
        
        .title-main {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            font-weight: 400;
            line-height: 1.15;
            color: #ffffff;
            letter-spacing: -0.02em;
        }
        
        .title-accent {
            color: #c9a84c;
            font-style: italic;
            position: relative;
        }
        
        .title-accent::after {
            content: '';
            position: absolute;
            bottom: 2px;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, #c9a84c, transparent);
            opacity: 0.5;
        }
        
        /* ============================================
           AMBIENT ELEMENTS
           ============================================ */
        
        .ambient-line {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(201,168,76,0.2), rgba(201,168,76,0.3), rgba(201,168,76,0.2), transparent);
            background-size: 200% 100%;
            animation: goldShimmer 4s ease-in-out infinite;
        }
        
        .ambient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
            opacity: 0.35;
        }
        
        .ambient-orb-1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(201,168,76,0.06), transparent 70%);
            top: 10%;
            left: -10%;
            animation: slowFloat 12s ease-in-out infinite;
        }
        
        .ambient-orb-2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(201,168,76,0.04), transparent 70%);
            bottom: 5%;
            right: -5%;
            animation: slowFloat 15s ease-in-out infinite reverse;
        }
        
        .ambient-orb-3 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255,255,255,0.02), transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: breathe 8s ease-in-out infinite;
        }
        
        /* Decorative corner accents */
        .corner-accent {
            position: absolute;
            width: 40px;
            height: 40px;
            border-color: rgba(201,168,76,0.1);
            transition: border-color 0.5s ease;
        }
        
        .corner-tl {
            top: -1px;
            left: -1px;
            border-top: 1px solid;
            border-left: 1px solid;
            border-top-left-radius: 16px;
        }
        
        .corner-tr {
            top: -1px;
            right: -1px;
            border-top: 1px solid;
            border-right: 1px solid;
            border-top-right-radius: 16px;
        }
        
        .corner-bl {
            bottom: -1px;
            left: -1px;
            border-bottom: 1px solid;
            border-left: 1px solid;
            border-bottom-left-radius: 16px;
        }
        
        .corner-br {
            bottom: -1px;
            right: -1px;
            border-bottom: 1px solid;
            border-right: 1px solid;
            border-bottom-right-radius: 16px;
        }
        
        .estate-card:hover .corner-accent {
            border-color: rgba(201,168,76,0.2);
        }
        
        /* Dot pattern background */
        .dot-pattern {
            background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 24px 24px;
        }
        
        /* Section number */
        .section-number {
            font-family: 'Playfair Display', serif;
            font-size: 200px;
            font-weight: 300;
            color: rgba(255,255,255,0.015);
            line-height: 1;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
