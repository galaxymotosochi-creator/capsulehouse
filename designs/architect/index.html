<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>888.ESTATE — Архитектура вашего пространства</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#fafafa;--bg2:#f0f0f0;--bg3:#e8e8e8;--t1:#1a1a1a;--t2:#6b6b6b;--t3:#a0a0a0;--accent:#1a1a1a;--accent2:#4a4a4a;--brd:#d4d4d4;--r:4px;--mw:1200px;--hh:60px}
    html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
    body{font-family:'Instrument Sans','Inter',sans-serif;background:var(--bg);color:var(--t1);line-height:1.6}
    header{position:sticky;top:0;z-index:100;background:rgba(250,250,250,.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:2px solid var(--t1)}
    .hi{max-width:var(--mw);margin:0 auto;padding:0 24px;height:var(--hh);display:flex;align-items:center;justify-content:space-between}
    .logo{font-weight:700;font-size:14px;letter-spacing:3px;color:var(--t1);text-decoration:none;text-transform:uppercase}
    .logo span{font-weight:300}
    .hdr-r{display:flex;align-items:center;gap:24px}
    .hdr-r .cnt{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--t2)}
    .hero{position:relative;padding:100px 24px 60px;text-align:center}
    .hero::after{content:'';display:block;width:60px;height:2px;background:var(--t1);margin:0 auto;margin-top:40px}
    .hero h1{font-weight:400;font-size:clamp(28px,5vw,52px);letter-spacing:-.5px;line-height:1.1;margin-bottom:20px;position:relative}
    .hero h1 em{font-weight:700;font-style:normal;display:block}
    .hero p{font-size:clamp(14px,1.5vw,16px);color:var(--t2);max-width:480px;margin:0 auto 32px;position:relative;line-height:1.7}
    .hero-btn{display:inline-block;padding:12px 40px;border:2px solid var(--t1);background:transparent;color:var(--t1);font-weight:600;font-size:12px;letter-spacing:2px;text-transform:uppercase;text-decoration:none;transition:all .3s;position:relative}
    .hero-btn:hover{background:var(--t1);color:var(--bg)}
    .stats{display:flex;justify-content:center;gap:0;padding:40px 0 48px;flex-wrap:wrap;max-width:var(--mw);margin:0 auto}
    .stat-item{text-align:center;padding:24px 48px;border-right:1px solid var(--brd);flex:1;min-width:100px}
    .stat-item:last-child{border-right:none}
    .stat-value{font-size:30px;font-weight:300;letter-spacing:-.5px}
    .stat-label{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:2px;margin-top:4px;font-weight:500}
    .filters{max-width:var(--mw);margin:0 auto;padding:0 24px 24px}
    .fr{display:flex;gap:0;flex-wrap:wrap;justify-content:center}
    .fb{flex-shrink:0;padding:10px 24px;border:none;border-bottom:2px solid var(--brd);background:transparent;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);cursor:pointer;transition:all .2s;font-family:inherit}
    .fb:hover{color:var(--t1);border-bottom-color:var(--t2)}
    .fb.on{color:var(--t1);border-bottom-color:var(--t1)}
    .grid{max-width:var(--mw);margin:0 auto;padding:8px 24px 80px;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:2px}
    .card{background:var(--bg);padding:0;transition:all .25s;opacity:0;animation:fi .4s ease forwards;border:1px solid transparent;position:relative}
    .card:hover{background:var(--bg2);border-color:var(--brd)}
    .ci{width:100%;aspect-ratio:16/9;background:var(--bg2);margin-bottom:0;display:flex;align-items:center;justify-content:center;border-bottom:1px solid var(--bg3)}
    .cip{font-size:10px;color:var(--t3);letter-spacing:2px;text-transform:uppercase}
    .card-body{padding:16px 20px 20px}
    .cs{font-size:9px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:2px;margin-bottom:4px}
    .cn{font-size:16px;font-weight:600;letter-spacing:-.2px}
    .cd{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:12px;border-top:1px solid var(--bg3)}
    .ca{font-size:12px;color:var(--t2);font-weight:500}
    .cp{font-size:15px;font-weight:700;font-feature-settings:'tnum' 1}
    .empty{grid-column:1/-1;text-align:center;padding:60px 24px;color:var(--t3);font-size:13px;letter-spacing:1px}
    @keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .card:nth-child(1){animation-delay:.02s}.card:nth-child(2){animation-delay:.04s}.card:nth-child(3){animation-delay:.06s}
    .card:nth-child(4){animation-delay:.08s}.card:nth-child(5){animation-delay:.10s}.card:nth-child(6){animation-delay:.12s}
    .card:nth-child(7){animation-delay:.14s}.card:nth-child(8){animation-delay:.16s}.card:nth-child(9){animation-delay:.18s}
    .card:nth-child(10){animation-delay:.20s}.card:nth-child(11){animation-delay:.22s}.card:nth-child(12){animation-delay:.24s}
    .card:nth-child(13){animation-delay:.26s}.card:nth-child(14){animation-delay:.28s}.card:nth-child(15){animation-delay:.30s}
    .card:nth-child(16){animation-delay:.32s}.card:nth-child(17){animation-delay:.34s}.card:nth-child(18){animation-delay:.36s}
    .card:nth-child(19){animation-delay:.38s}.card:nth-child(20){animation-delay:.40s}.card:nth-child(21){animation-delay:.42s}
    .card:nth-child(22){animation-delay:.44s}.card:nth-child(23){animation-delay:.46s}.card:nth-child(24){animation-delay:.48s}
    .card:nth-child(25){animation-delay:.50s}.card:nth-child(26){animation-delay:.52s}.card:nth-child(27){animation-delay:.54s}
    .card:nth-child(28){animation-delay:.56s}.card:nth-child(29){animation-delay:.58s}.card:nth-child(30){animation-delay:.60s}
    footer{text-align:center;padding:40px 24px 48px;border-top:1px solid var(--bg3);font-size:11px;color:var(--t3);letter-spacing:1px}
    footer span{font-weight:600;color:var(--t1)}
    @media(max-width:640px){.hero{padding:72px 20px 48px}.stats{gap:0}.stat-item{padding:16px 20px;min-width:80px;border-right:none;border-bottom:1px solid var(--brd)}.stat-item:last-child{border-bottom:none}.grid{grid-template-columns:1fr}.card-body{padding:12px 16px 16px}.hi{padding:0 16px}}
    @media(min-width:641px)and (max-width:1024px){.grid{grid-template-columns:repeat(2,1fr)}}  </style>
</head>
<body>
  <header>
    <div class="hi">
      <a href="/" class="logo">888<span>.</span>ESTATE</a>
      <div class="hdr-r">
        <span class="cnt">Моделей: <strong id="cnt">30</strong></span>
      </div>
    </div>
  </header>
  <section class="hero">
    <h1>Ваше пространство.<em>Ваши правила</em></h1>
    <p>Премиальные модульные дома из Китая. Лаконичные формы, бескомпромиссное качество, установка под ключ.</p>
    <a href="#catalog" class="hero-btn">К проектам</a>
  </section>
  <section class="stats">
    <div class="stat-item"><div class="stat-value">30</div><div class="stat-label">моделей</div></div>
    <div class="stat-item"><div class="stat-value">12,5–74,5 м²</div><div class="stat-label">площадь</div></div>
    <div class="stat-item"><div class="stat-value">от 456 тыс. ₽</div><div class="stat-label">цена</div></div>
    <div class="stat-item"><div class="stat-value">9</div><div class="stat-label">серий</div></div>
  </section>
  <div class="filters" id="catalog">
    <div class="fr" id="filters">
      <button class="fb on" data-f="all">Все</button>
      <button class="fb" data-f="AC">Атомные</button>
      <button class="fb" data-f="V">Серия V</button>
      <button class="fb" data-f="PX">Серия PX</button>
      <button class="fb" data-f="E">Серия E</button>
      <button class="fb" data-f="X">Серия X</button>
      <button class="fb" data-f="T">Серия T</button>
      <button class="fb" data-f="FT">Фортуна</button>
      <button class="fb" data-f="Z">Серия Z</button>
      <button class="fb" data-f="M9">Флагман</button>
    </div>
  </div>
  <div class="grid" id="grid"></div>
  <footer>888.ESTATE — <span>модульные дома премиум-класса</span> из Китая</footer>
  <script>
const H=[{n:"AC02-1",a:12.5,p:466281,s:"AC"},{n:"AC02-2",a:12.5,p:455684,s:"AC"},{n:"AC02-3",a:12.5,p:802184,s:"AC"},{n:"AC02-4",a:12.5,p:782033,s:"AC"},{n:"AC03-1",a:25.3,p:1011882,s:"AC"},{n:"AC03-2",a:25.3,p:1236673,s:"AC"},{n:"AC05",a:38.1,p:1780347,s:"AC"},{n:"V2",a:18.5,p:1420109,s:"V"},{n:"V3",a:21,p:1670688,s:"V"},{n:"V7",a:23,p:1790023,s:"V"},{n:"V6",a:28,p:2148028,s:"V"},{n:"V8",a:32,p:2386697,s:"V"},{n:"V9",a:38,p:2816319,s:"V"},{n:"V11",a:38,p:2565741,s:"V"},{n:"PX3",a:18.5,p:1622970,s:"PX"},{n:"PX5",a:28,p:2088401,s:"PX"},{n:"PX7",a:38,p:2780511,s:"PX"},{n:"E3",a:18.5,p:1730396,s:"E"},{n:"E5",a:28,p:2088401,s:"E"},{n:"X5",a:29,p:2183836,s:"X"},{n:"X7",a:39,p:2864037,s:"X"},{n:"T5",a:12.6,p:1348492,s:"T"},{n:"T7",a:26,p:2028693,s:"T"},{n:"FT10",a:18.5,p:693943,s:"FT"},{n:"FT20",a:37,p:838145,s:"FT"},{n:"FT30",a:56,p:1193123,s:"FT"},{n:"FT40",a:73,p:1508678,s:"FT"},{n:"Z7",a:28,p:1462428,s:"Z"},{n:"ZD5",a:38,p:2522159,s:"Z"},{n:"M9",a:74.5,p:5239894,s:"M9"}];
const SN={AC:"Атомные",V:"Серия V",PX:"Серия PX",E:"Серия E",X:"Серия X",T:"Серия T",FT:"Фортуна",Z:"Серия Z",M9:"Флагман"};
function fmt(n){return n.toLocaleString("ru-RU")}
function render(f){
  const g=document.getElementById("grid");const items=f==="all"?H:H.filter(h=>h.s===f);
  document.getElementById("cnt").textContent=items.length;
  if(!items.length){g.innerHTML='<div class="empty">Нет домов в этой серии</div>';return}
  g.innerHTML=items.map(h=>'<div class="card"><div class="ci"><div class="cip">План</div></div><div class="card-body"><div class="cs">'+(SN[h.s]||h.s)+'</div><div class="cn">'+h.n+'</div><div class="cd"><span class="ca">'+h.a+' м²</span><span class="cp">'+fmt(h.p)+' ₽</span></div></div></div>').join('');
}
document.querySelectorAll('.fb').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.fb').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    render(b.dataset.f);
  });
});
render('all');
  </script>
</body>
</html>
