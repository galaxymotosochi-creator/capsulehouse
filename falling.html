<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>888.ESTATE — Дом у моря</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden}
body{
  background:#070707;
  font-family:'Montserrat',sans-serif;
  display:flex;align-items:center;justify-content:center;
  position:relative;
}

/* shake container */
#scene{
  position:relative;
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;
}
#scene.shake{animation:shake 0.4s ease-out}
@keyframes shake{
  0%,100%{transform:translate(0,0)}
  10%{transform:translate(-8px,4px)}
  20%{transform:translate(7px,-5px)}
  30%{transform:translate(-5px,3px)}
  40%{transform:translate(4px,-2px)}
  50%{transform:translate(-3px,1px)}
}

/* house canvas */
#houseCanvas{
  position:relative;
  z-index:2;
  image-rendering:auto;
  opacity:0;
  transition:opacity 0.3s;
}

/* dust particles canvas */
#dustCanvas{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
  pointer-events:none;
  z-index:3;
}

/* text */
#title{
  position:absolute;
  bottom:12%;
  text-align:center;
  z-index:4;
  opacity:0;
  transition:opacity 1.2s ease, transform 1.2s ease;
  transform:translateY(30px);
}
#title.visible{
  opacity:1;
  transform:translateY(0);
}
#title h1{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(2rem,6vw,5rem);
  font-weight:700;
  color:#c9a84c;
  letter-spacing:0.15em;
  text-shadow:0 0 40px rgba(201,168,76,0.3),0 0 80px rgba(201,168,76,0.1);
}
#title p{
  font-family:'Montserrat',sans-serif;
  font-size:clamp(0.7rem,1.5vw,1.2rem);
  font-weight:300;
  color:#fff;
  letter-spacing:0.3em;
  text-transform:uppercase;
  margin-top:12px;
  opacity:0.8;
}

/* ground line */
#ground{
  position:absolute;
  bottom:10%;
  left:10%;
  right:10%;
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(201,168,76,0.4),transparent);
  z-index:1;
  opacity:0;
  transition:opacity 0.8s ease 0.5s;
}
#ground.visible{opacity:1}

/* glow burst on landing */
#glowBurst{
  position:absolute;
  bottom:10%;
  left:50%;
  transform:translateX(-50%);
  width:0;height:0;
  border-radius:50%;
  background:radial-gradient(circle,rgba(201,168,76,0.6),transparent 70%);
  z-index:0;
  pointer-events:none;
  transition:none;
}
#glowBurst.burst{
  animation:burstGlow 0.8s ease-out forwards;
}
@keyframes burstGlow{
  0%{width:10px;height:10px;opacity:1}
  100%{width:800px;height:200px;opacity:0}
}

/* loading */
#loading{
  position:fixed;
  top:0;left:0;width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  background:#070707;
  z-index:100;
  transition:opacity 0.8s ease;
  pointer-events:none;
}
#loading span{
  font-family:'Cormorant Garamond',serif;
  font-size:2rem;
  color:#c9a84c;
  opacity:0.5;
  letter-spacing:0.3em;
  animation:pulse 1.5s infinite;
}
@keyframes pulse{0%,100%{opacity:0.3}50%{opacity:0.8}}

/* responsive */
@media(max-width:768px){
  #title{bottom:8%}
  #ground{bottom:8%}
  #glowBurst.burst{animation:burstGlowMobile 0.8s ease-out forwards}
  @keyframes burstGlowMobile{
    0%{width:10px;height:10px;opacity:1}
    100%{width:400px;height:120px;opacity:0}
  }
}
@media(max-width:480px){
  #title{bottom:5%}
  #ground{bottom:5%}
  #title p{letter-spacing:0.15em}
}
</style>
</head>
<body>

<div id="loading"><span>888.ESTATE</span></div>

<div id="scene">
  <canvas id="houseCanvas"></canvas>
  <canvas id="dustCanvas"></canvas>
  <div id="glowBurst"></div>
  <div id="ground"></div>
  <div id="title">
    <h1>888.ESTATE</h1>
    <p>Премиальная недвижимость у моря</p>
  </div>
</div>

let imgW, imgH, displayW, displayH, scale;
let targetY; // final position (bottom of house on ground line)
let animId;

// ========== IMAGE PROCESSING ==========
function processImage(img) {
  // Determine display size (responsive)
  const vpW = window.innerWidth;
  const vpH = window.innerHeight;
  const maxW = vpW * 0.75;
  const maxH = vpH * 0.55;
  
  const ratio = img.width / img.height;
  let dW, dH;
  if (ratio > maxW / maxH) { dW = maxW; dH = maxW / ratio; }
  else { dH = maxH; dW = maxH * ratio; }
  
  displayW = Math.round(dW);
  displayH = Math.round(dH);
  scale = displayW / img.width;
  
  houseCanvas.width = displayW;
  houseCanvas.height = displayH;
  
  // Draw image to offscreen canvas at full resolution for processing
  const offscreen = document.createElement('canvas');
  offscreen.width = img.width;
  offscreen.height = img.height;
  const offCtx = offscreen.getContext('2d');
  offCtx.drawImage(img, 0, 0);
  
  const imageData = offCtx.getImageData(0, 0, img.width, img.height);
  const data = imageData.data;
  
  // Sample sky color from top row
  let rSum = 0, gSum = 0, bSum = 0, count = 0;
  for (let x = 0; x < img.width; x += 3) {
    const idx = x * 4;
    rSum += data[idx];
    gSum += data[idx + 1];
    bSum += data[idx + 2];
    count++;
  }
  const skyR = rSum / count;
  const skyG = gSum / count;
  const skyB = bSum / count;
  
  // Remove sky pixels
  for (let i = 0; i < data.length; i += 4) {
    const dr = data[i] - skyR;
    const dg = data[i + 1] - skyG;
    const db = data[i + 2] - skyB;
    const dist = Math.sqrt(dr*dr + dg*dg + db*db);
    
    if (dist < SKY_THRESHOLD) {
      data[i + 3] = 0; // transparent
    }
  }
  
  offCtx.putImageData(imageData, 0, 0);
  
  // Draw processed image to display canvas
  ctx.clearRect(0, 0, displayW, displayH);
  ctx.drawImage(offscreen, 0, 0, displayW, displayH);
}

// ========== DUST PARTICLES ==========
const particles = [];
const MAX_PARTICLES = 120;

function spawnDust(x, y, count) {
  for (let i = 0; i < count && particles.length < MAX_PARTICLES; i++) {
    const angle = -Math.PI/2 + (Math.random() - 0.5) * Math.PI * 0.9;
    const speed = 2 + Math.random() * 6;
    const size = 2 + Math.random() * 6;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed * (0.5 + Math.random()),
      vy: Math.sin(angle) * speed * (0.5 + Math.random()),
      size,
      alpha: 0.7 + Math.random() * 0.3,
      life: 1,
      decay: 0.008 + Math.random() * 0.015,
      color: Math.random() > 0.6 ? 
        `hsl(42, 70%, ${50 + Math.random() * 30}%)` : // gold
        `hsl(0, 0%, ${60 + Math.random() * 30}%)`      // gray
    });
  }
}

function updateParticles() {
  dctx.clearRect(0, 0, dustCanvas.width, dustCanvas.height);
  
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.06; // gravity on dust
    p.life -= p.decay;
    p.size *= 0.995;
    p.alpha *= 0.99;
    
    if (p.life <= 0 || p.alpha < 0.01) {
      particles.splice(i, 1);
      continue;
    }
    
    dctx.save();
    dctx.globalAlpha = p.life * p.alpha;
    dctx.fillStyle = p.color;
    dctx.beginPath();
    dctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    dctx.fill();
    dctx.restore();
  }
}

// ========== FALL ANIMATION ==========
let fallState = {
  phase: 'falling', // 'falling' | 'bouncing' | 'done'
  y: 0,             // current y position (top of house)
  vy: 0,
  bounceCount: 0,
  targetY: 0,
  startTime: 0
};

function startFallAnimation() {
  // Set initial position: above viewport
  fallState.y = -displayH - 50;
  fallState.vy = 0;
  fallState.phase = 'falling';
  fallState.bounceCount = 0;
  
  // Target: centered vertically, bottom on ground line
  const groundY = window.innerHeight * 0.88; // ground at 88% from top
  fallState.targetY = groundY - displayH;
  
  houseCanvas.style.opacity = '1';
  houseCanvas.style.position = 'absolute';
  
  // Center horizontally
  const left = (window.innerWidth - displayW) / 2;
  houseCanvas.style.left = left + 'px';
  
  houseCanvas.style.top = fallState.y + 'px';
  
  // Setup dust canvas
  dustCanvas.width = window.innerWidth;
  dustCanvas.height = window.innerHeight;
  
  fallState.startTime = performance.now();
  
  if (animId) cancelAnimationFrame(animId);
  animateFall();
}

function animateFall() {
  const dt = 1; // simplified physics
  
  if (fallState.phase === 'falling') {
    fallState.vy += GRAVITY;
    fallState.y += fallState.vy;
    
    // Check if reached target (landed)
    if (fallState.y >= fallState.targetY) {
      fallState.y = fallState.targetY;
      fallState.phase = 'bouncing';
      fallState.vy = -fallState.vy * BOUNCE_FACTOR;
      
      // Landing effects
      scene.classList.remove('shake');
      void scene.offsetWidth; // reflow
      scene.classList.add('shake');
      
      // Glow burst
      glowBurst.className = '';
      void glowBurst.offsetWidth;
      glowBurst.classList.add('burst');
      
      // Dust particles burst from bottom center of house
      const bottomX = (window.innerWidth) / 2;
      const bottomY = fallState.y + displayH;
      spawnDust(bottomX, bottomY, 60);
      
      // Show ground line
      ground.classList.add('visible');
    }
  }
  
  if (fallState.phase === 'bouncing') {
    // Apply gravity to bounce
    fallState.vy += GRAVITY;
    fallState.y += fallState.vy;
    
    // Check ground again
    if (fallState.y >= fallState.targetY) {
      fallState.y = fallState.targetY;
      fallState.bounceCount++;
      
      if (fallState.bounceCount >= BOUNCE_COUNT) {
        fallState.phase = 'done';
        fallState.vy = 0;
        houseCanvas.style.top = fallState.y + 'px';
        
        // Show title after settling
        setTimeout(() => {
          title.classList.add('visible');
        }, 300);
        
        // Final check for any leftover particles
        setTimeout(() => {
          animId = requestAnimationFrame(animateDustOnly);
        }, 500);
        return;
      }
      
      fallState.vy = -fallState.vy * (BOUNCE_FACTOR * (1 - fallState.bounceCount * 0.2));
      
      // Smaller dust bursts on each bounce
      const bx = window.innerWidth / 2;
      const by = fallState.y + displayH;
      spawnDust(bx, by, 20);
    }
  }
  
  // Update house position
  houseCanvas.style.top = fallState.y + 'px';
  
  // Update dust particles
  updateParticles();
  
  animId = requestAnimationFrame(animateFall);
}

function animateDustOnly() {
  if (particles.length === 0) {
    dctx.clearRect(0, 0, dustCanvas.width, dustCanvas.height);
    return;
  }
  updateParticles();
  animId = requestAnimationFrame(animateDustOnly);
}

// ========== INIT ==========
function init() {
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = function() {
    imgW = this.width;
    imgH = this.height;
    
    processImage(this);
    
    loading.style.opacity = '0';
    setTimeout(() => { loading.style.display = 'none'; }, 800);
    
    // Small delay then start fall
    setTimeout(startFallAnimation, 400);
  };
  img.onerror = function() {
    loading.innerHTML = '<span style="color:#fff;font-size:1rem;">Ошибка загрузки изображения</span>';
  };
  img.src = HOUSE_IMG_B64;
}

// ========== RESIZE ==========
let resizeTimeout;
window.addEventListener('resize', function() {
  clearTimeout(resizeTimeout);
  resizeTimeout = setTimeout(() => {
    location.reload();
  }, 300);
});

// ========== START ==========
init();
</script>
</body>
</html>
