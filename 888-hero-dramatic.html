<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>888.ESTATE — Драма</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;600;700&family=Montserrat:wght@200;300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    overflow: hidden;
    height: 100vh;
    font-family: 'Cormorant Garamond', serif;
  }

  #threeCanvas {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    z-index: 0;
  }

  .overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    z-index: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    pointer-events: none;
  }

  /* винтажная тёмная рамка */
  .frame-line {
    position: fixed;
    background: rgba(180, 150, 100, 0.08);
    z-index: 1;
    animation: frameAppear 2s ease forwards;
    animation-delay: 2.5s;
    opacity: 0;
  }
  .frame-t, .frame-b { left: 30px; right: 30px; height: 1px; }
  .frame-l, .frame-r { top: 30px; bottom: 30px; width: 1px; }
  .frame-t { top: 30px; }
  .frame-b { bottom: 30px; }
  .frame-l { left: 30px; }
  .frame-r { right: 30px; }
  @keyframes frameAppear { to { opacity: 1; } }

  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(4rem, 12vw, 10rem);
    letter-spacing: 0.35em;
    color: #fff;
    opacity: 0;
    animation: logoReveal 2.5s ease forwards;
    animation-delay: 0.8s;
    text-shadow: 0 0 40px rgba(180, 150, 100, 0.15), 0 0 100px rgba(180, 150, 100, 0.05);
    text-align: center;
    line-height: 1;
  }
  .logo span {
    color: #c9a84c;
    font-weight: 700;
    text-shadow: 0 0 60px rgba(201, 168, 76, 0.2);
  }

  @keyframes logoReveal {
    0% { opacity: 0; transform: scale(0.9) translateY(20px); letter-spacing: 0.6em; filter: blur(4px); }
    60% { filter: blur(0); }
    100% { opacity: 1; transform: scale(1) translateY(0); letter-spacing: 0.35em; }
  }

  .tagline {
    font-family: 'Montserrat', sans-serif;
    font-weight: 200;
    font-size: clamp(0.75rem, 1.2vw, 1rem);
    letter-spacing: 0.7em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    margin-top: 24px;
    opacity: 0;
    animation: tagReveal 2s ease forwards;
    animation-delay: 2.5s;
  }
  @keyframes tagReveal {
    0% { opacity: 0; transform: translateY(15px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .gold-line {
    width: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, #c9a84c, transparent);
    margin: 28px auto 20px;
    animation: lineExpand 2s ease forwards;
    animation-delay: 3s;
  }
  @keyframes lineExpand {
    to { width: 140px; }
  }

  .sub {
    font-family: 'Montserrat', sans-serif;
    font-weight: 200;
    font-size: clamp(0.6rem, 0.9vw, 0.8rem);
    letter-spacing: 0.4em;
    color: rgba(255,255,255,0.3);
    opacity: 0;
    animation: tagReveal 2s ease forwards;
    animation-delay: 3.5s;
  }

  .scroll-hint {
    position: fixed;
    bottom: 50px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2;
    opacity: 0;
    animation: tagReveal 2s ease forwards;
    animation-delay: 4.5s;
    text-align: center;
    pointer-events: none;
  }
  .scroll-hint span {
    display: block;
    font-family: 'Montserrat', sans-serif;
    font-size: 0.55rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    margin-bottom: 8px;
  }
  .scroll-hint .mouse {
    width: 18px; height: 28px;
    border: 1px solid rgba(201, 168, 76, 0.4);
    border-radius: 9px;
    margin: 0 auto;
    position: relative;
  }
  .scroll-hint .mouse::after {
    content: '';
    position: absolute;
    top: 5px; left: 50%;
    transform: translateX(-50%);
    width: 2px; height: 5px;
    background: #c9a84c;
    border-radius: 2px;
    animation: wheelAnim 1.5s ease infinite;
  }
  @keyframes wheelAnim {
    0% { opacity: 1; transform: translateX(-50%) translateY(0); }
    100% { opacity: 0; transform: translateX(-50%) translateY(8px); }
  }

  /* виньетка */
  .vignette {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    z-index: 1;
    pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);
  }

  @media (max-width: 768px) {
    .frame-t, .frame-b { left: 15px; right: 15px; }
    .frame-l, .frame-r { top: 15px; bottom: 15px; }
    .logo { letter-spacing: 0.2em; }
    .tagline { letter-spacing: 0.3em; }
  }
</style>
</head>
<body>

<canvas id="threeCanvas"></canvas>

<div class="vignette"></div>

<div class="frame-line frame-t"></div>
<div class="frame-line frame-b"></div>
<div class="frame-line frame-l"></div>
<div class="frame-line frame-r"></div>

<div class="overlay">
  <div class="logo"><span>888</span>.ESTATE</div>
  <div class="tagline">Строим будущее</div>
  <div class="gold-line"></div>
  <div class="sub">Сочи · Красная Поляна · Побережье</div>
</div>

<div class="scroll-hint">
  <span>Листайте</span>
  <div class="mouse"></div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

const canvas = document.getElementById('threeCanvas');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0a);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 1, 8);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

// ====== ЗВЁЗДНОЕ НЕБО ======
const starsGeo = new THREE.BufferGeometry();
const starsCount = 1500;
const starsPos = new Float32Array(starsCount * 3);
const starsSize = new Float32Array(starsCount);
for (let i = 0; i < starsCount; i++) {
  const radius = 15 + Math.random() * 30;
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  starsPos[i*3] = radius * Math.sin(phi) * Math.cos(theta);
  starsPos[i*3+1] = Math.abs(radius * Math.cos(phi)) * 0.4;
  starsPos[i*3+2] = -radius * Math.sin(phi) * Math.sin(theta) - 5;
  starsSize[i] = Math.random() * 2 + 0.5;
}
starsGeo.setAttribute('position', new THREE.BufferAttribute(starsPos, 3));
starsGeo.setAttribute('size', new THREE.BufferAttribute(starsSize, 1));

const starMat = new THREE.PointsMaterial({
  color: 0xffffff,
  size: 0.04,
  transparent: true,
  opacity: 0.6,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
});
const stars = new THREE.Points(starsGeo, starMat);
scene.add(stars);

// ====== ТУМАН / ДЫМ (много полупрозрачных сфер) ======
const fogGroup = new THREE.Group();

function createFogParticle() {
  const size = 1.5 + Math.random() * 3;
  const geo = new THREE.SphereGeometry(size, 8, 8);
  const mat = new THREE.MeshBasicMaterial({
    color: 0x1a1a1a,
    transparent: true,
    opacity: 0.03 + Math.random() * 0.04,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
  });
  const mesh = new THREE.Mesh(geo, mat);
  const angle = Math.random() * Math.PI * 2;
  const radius = 3 + Math.random() * 5;
  mesh.position.set(
    Math.cos(angle) * radius,
    (Math.random() - 0.5) * 4,
    Math.sin(angle) * radius - 2,
  );
  mesh.userData = {
    speed: 0.05 + Math.random() * 0.1,
    angle: angle,
    radius: radius,
    floatSpeed: 0.2 + Math.random() * 0.3,
    floatOffset: Math.random() * Math.PI * 2,
  };
  return mesh;
}

for (let i = 0; i < 20; i++) {
  fogGroup.add(createFogParticle());
}
scene.add(fogGroup);

// ====== АРХИТЕКТУРНАЯ СЕТКА ======
const gridHelper = new THREE.GridHelper(12, 20, 0x1a1a1a, 0x1a1a1a);
gridHelper.position.y = -1.5;
gridHelper.material.transparent = true;
gridHelper.material.opacity = 0.15;
scene.add(gridHelper);

// ====== СВЕТЯЩИЕСЯ ЧАСТИЦЫ (ЗОЛОТЫЕ) ======
const glowCount = 120;
const glowGeo = new THREE.BufferGeometry();
const glowPos = new Float32Array(glowCount * 3);
const glowData = [];
for (let i = 0; i < glowCount; i++) {
  const theta = Math.random() * Math.PI * 2;
  const r = 2 + Math.random() * 4;
  const y = (Math.random() - 0.5) * 5;
  glowPos[i*3] = Math.cos(theta) * r;
  glowPos[i*3+1] = y;
  glowPos[i*3+2] = Math.sin(theta) * r - 1;
  glowData.push({
    theta, r, y,
    speed: 0.1 + Math.random() * 0.2,
    floatSpeed: 0.3 + Math.random() * 0.5,
    floatOff: Math.random() * Math.PI * 2,
    size: 0.03 + Math.random() * 0.06,
  });
}
glowGeo.setAttribute('position', new THREE.BufferAttribute(glowPos, 3));

const glowMat = new THREE.PointsMaterial({
  color: 0xc9a84c,
  size: 0.04,
  transparent: true,
  opacity: 0.5,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  sizeAttenuation: true,
});
const glowPoints = new THREE.Points(glowGeo, glowMat);
scene.add(glowPoints);

// ====== АНИМАЦИЯ ======
let time = 0;

function animate() {
  requestAnimationFrame(animate);
  time += 0.01;

  // медленное вращение звёзд
  stars.rotation.y += 0.0002;

  // туман движется
  fogGroup.children.forEach((mesh, i) => {
    const d = mesh.userData;
    const newAngle = d.angle + time * d.speed * 0.02;
    mesh.position.x = Math.cos(newAngle) * d.radius;
    mesh.position.z = Math.sin(newAngle) * d.radius - 2;
    mesh.position.y += Math.sin(time * d.floatSpeed + d.floatOffset) * 0.002;
  });

  // золотые частицы
  const positions = glowPoints.geometry.attributes.position.array;
  for (let i = 0; i < glowCount; i++) {
    const d = glowData[i];
    const a = d.theta + time * d.speed * 0.05;
    positions[i*3] = Math.cos(a) * d.r;
    positions[i*3+1] = d.y + Math.sin(time * d.floatSpeed + d.floatOff) * 0.3;
    positions[i*3+2] = Math.sin(a) * d.r - 1;
  }
  glowPoints.geometry.attributes.position.needsUpdate = true;

  // мерцание звёзд
  starMat.opacity = 0.4 + Math.sin(time * 0.5) * 0.15;

  // лёгкое движение камеры
  camera.position.x = Math.sin(time * 0.03) * 0.5;
  camera.position.y = 1 + Math.sin(time * 0.02) * 0.1;
  camera.lookAt(0, 0, 0);

  renderer.render(scene, camera);
}

animate();

// ====== РЕСАЙЗ ======
window.addEventListener('resize', () => {
  const w = window.innerWidth;
  const h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
});
</script>
</body>
</html>
