<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>888.ESTATE — Капсульные дома</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script type="module" crossorigin src="assets/index-CguyBJZF.js"></script>
    <link rel="stylesheet" crossorigin href="assets/index-CTYFC3_u.css">
  </head>
  <body>
    <div id="root"></div>

    <!-- Секция видео -->
    <style>
      .vs{padding:3rem 1.5rem;max-width:1200px;margin:0 auto}
      .vs-hdr{text-align:center;margin-bottom:2rem}
      .vs-hdr h2{font-size:1.5rem;font-weight:700;color:#1a1a1a;margin:0 0 .5rem}
      .vs-hdr p{font-size:.9rem;color:#888;margin:0}
      .vs-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}
      .vs-grid .wide{grid-column:span 2}
      .vs-card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.06);cursor:pointer}
      .vs-card:hover{box-shadow:0 6px 20px rgba(0,0,0,.1)}
      .vs-prev{position:relative;aspect-ratio:9/16;background:linear-gradient(135deg,#1a1a2e,#2a1a3e);display:flex;align-items:center;justify-content:center}
      .vs-pb{width:60px;height:60px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center}
      .vs-pb svg{width:22px;height:22px;fill:#c9a84c}
      .vs-info{padding:.8rem 1rem}
      .vs-info h4{font-size:.85rem;font-weight:600;color:#1a1a1a;margin:0 0 .1rem}
      .vs-info span{font-size:.75rem;color:#999}
      .vm{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9999;align-items:center;justify-content:center;padding:1rem}
      .vm.active{display:flex}
      .vm video{max-height:90vh;border-radius:12px}
      .vm-close{position:absolute;top:1.5rem;right:1.5rem;width:44px;height:44px;background:rgba(255,255,255,.1);border:none;border-radius:50%;color:#fff;font-size:1.5rem;cursor:pointer;z-index:10000}
      @media(max-width:640px){.vs-grid{grid-template-columns:repeat(2,1fr);gap:.6rem}.vs-grid .wide{grid-column:span 1}}
    </style>

    <section class="vs">
      <div class="vs-hdr">
        <h2>Видеообзоры</h2>
        <p>Смотрите наши дома в действии</p>
      </div>
      <div class="vs-grid" id="vsGrid"></div>
    </section>

    <div class="vm" id="vmModal">
      <button class="vm-close" onclick="document.getElementById('vmModal').classList.remove('active')">&times;</button>
      <video controls id="vmPlayer"><source src="" type="video/mp4"></video>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', function(){
      var v = [['Обзор дома V11','Экскурсия по дому'],['Производство','Как делают наши дома'],['Доставка и монтаж','Процесс установки'],['Интерьер V11','Внутреннее пространство'],['Отзыв клиента','Реальный опыт']];
      var g = document.getElementById('vsGrid');
      if(!g) return;
      for(var i=0;i<v.length;i++){
        var d = document.createElement('div');
        d.className = 'vs-card' + (i===0?' wide':'');
        d.innerHTML = '<div class="vs-prev"><div class="vs-pb"><svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3" fill="#c9a84c"/></svg></div></div><div class="vs-info"><h4>' + v[i][0] + '</h4><span>' + v[i][1] + '</span></div>';
        d.onclick = function(){document.getElementById('vmModal').classList.add('active');};
        g.appendChild(d);
      }
    });
    </script>

    <!-- Комплектация V11 -->
    <div id="equipment-modal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:999;justify-content:center;align-items:flex-start;padding:2rem 1rem;overflow-y:auto">
      <div style="background:#fff;max-width:600px;width:100%;margin:auto;border-radius:12px;padding:1.5rem;position:relative;box-shadow:0 10px 40px rgba(0,0,0,.2)">
        <button onclick="document.getElementById('equipment-modal').style.display='none'" style="position:absolute;top:.75rem;right:1rem;background:none;border:none;font-size:1.3rem;cursor:pointer;color:#999">&times;</button>
        <div id="equipment-content"></div>
      </div>
    </div>





    <script>
    // Данные комплектации
    var eqData = {
      paymentSections: [
        {title: 'Заключение контракта:', items: ['Напрямую с фабрикой (вы контрактодержатель и импортер)', 'С нашим российским юр.лицом (все вопросы берем на себя)']},
        {title: 'Способы оплаты:', items: ['Безналичный платеж (оплата на р/с)', 'Наличными (в одном из наших офисов)', 'Альтернативные способы (уточняйте у менеджера)']},
        {title: 'Порядок оплаты:', items: ['50% — авансовый платеж для начала производства', '50% — после производства и инспекции в Китае']},
        {title: '', text: 'Если у вас есть необходимость согласовать индивидуальные условия поставки — уточняйте у персонального менеджера.'}
      ],
      deliverySections: [
        {title: 'Способы доставки (виды транспорта):', items: ['Авто (евро-фуры, низкорамный тралл, контейнеровоз)', 'ЖД (контейнеры 20HQ, 40HQ, 40FR)', 'Море (контейнеры 20HQ, 40HQ, 40FR)', 'Мультимодальная доставка']},
        {title: 'Доставка домов возможна в контейнерах:', items: ['20HQ', '40HQ', '40FR (открытая платформа)']},
        {title: 'Состояние домов для доставки:', items: ['Полностью собранные «под ключ»']},
        {title: 'Этапы доставки:', items: ['Отправка из Китая: подготовка, упаковка, экспортное оформление', 'Получение в стране: таможня, СВХ', 'Доставка на место установки', 'Монтаж, подключение, первый запуск']},
        {title: 'Сроки:', items: ['Производство: 1-45 дней (в среднем 15-30)', 'Доставка: 10-30 дней (в среднем 10-20)', 'Монтаж: 1-5 дней (в среднем 1-2)']},
        {title: '', text: 'Сроки могут меняться в зависимости от степени готовности дома, уникальности проекта, загрузки производства, праздников, сложности маршрута.'}
      ],

      sections: [
        {title: 'Дом:', items: ['Отделка «под ключ»','Каркас из оцинкованной стали','Обшивка из авиационного алюминия','Защита от УФ','Теплоизоляция и гидроизоляция','Стеклянные стены: закаленное стекло LOW-E','Окна с алюминиевыми рамами и сеткой','Душевая, туалет, раковина, смарт-зеркало','Умный замок, дверь из нержавейки','LED освещение, электропроводка, щиток','Канализация, водоподготовка, водоснабжение','Розетки с умным управлением']},
        {title: 'Техника (варианты):', text: 'Водонагреватель, кондиционеры, вытяжка, умный дом, раздвигатели штор, подогрев пола, HD-проектор, кофемашина, микроволновка, холодильник, телевизор, варочная панель.'},
        {title: 'Мебель (варианты):', text: 'Диван, журнальный столик, обеденный стол, ТВ-тумба, кровать, шкаф-кровать, диван-кровать, гардероб, шкаф, шторы, кухонный гарнитур, барная стойка.'}
      ]
    };

    function openDelivery() {
      var content = document.getElementById('equipment-content');
      var html = '';
      for (var i = 0; i < eqData.deliverySections.length; i++) {
        var s = eqData.deliverySections[i];
        html += '<div style="margin-bottom:.75rem;padding-bottom:.5rem;border-bottom:1px solid #eee">';
        if (s.title) html += '<strong style="color:#333;font-size:.9rem">' + s.title + '</strong>';
        if (s.items) {
          html += '<ul style="margin:.3rem 0 0;padding-left:1.2rem;font-size:.82rem">';
          for (var j = 0; j < s.items.length; j++) {
            html += '<li style="margin-bottom:.1rem">' + s.items[j] + '</li>';
          }
          html += '</ul>';
        } else if (s.text) {
          html += '<p style="margin:.3rem 0 0;font-size:.82rem;color:#666">' + s.text + '</p>';
        }
        html += '</div>';
      }
      content.innerHTML = html;
      document.getElementById('equipment-modal').style.display = 'flex';
    }

    function openPayment() {
      var content = document.getElementById('equipment-content');
      var html = '';
      for (var i = 0; i < eqData.paymentSections.length; i++) {
        var s = eqData.paymentSections[i];
        html += '<div style="margin-bottom:.75rem;padding-bottom:.5rem;border-bottom:1px solid #eee">';
        if (s.title) html += '<strong style="color:#333;font-size:.9rem">' + s.title + '</strong>';
        if (s.items) {
          html += '<ul style="margin:.3rem 0 0;padding-left:1.2rem;font-size:.82rem">';
          for (var j = 0; j < s.items.length; j++) {
            html += '<li style="margin-bottom:.1rem">' + s.items[j] + '</li>';
          }
          html += '</ul>';
        } else if (s.text) {
          html += '<p style="margin:.3rem 0 0;font-size:.82rem;color:#666">' + s.text + '</p>';
        }
        html += '</div>';
      }
      content.innerHTML = html;
      document.getElementById('equipment-modal').style.display = 'flex';
    }

    function openEquipment() {
      var content = document.getElementById('equipment-content');
      var html = '';
      for (var i = 0; i < eqData.sections.length; i++) {
        var s = eqData.sections[i];
        html += '<div style="margin-bottom:.75rem;padding-bottom:.5rem;border-bottom:1px solid #eee">';
        html += '<strong style="color:#333;font-size:.9rem">' + s.title + '</strong>';
        if (s.items) {
          html += '<ul style="margin:.3rem 0 0;padding-left:1.2rem;font-size:.82rem">';
          for (var j = 0; j < s.items.length; j++) {
            html += '<li style="margin-bottom:.1rem">' + s.items[j] + '</li>';
          }
          html += '</ul>';
        } else {
          html += '<p style="margin:.3rem 0 0;font-size:.82rem">' + s.text + '</p>';
        }
        html += '</div>';
      }
      content.innerHTML = html;
      document.getElementById('equipment-modal').style.display = 'flex';
    }

    // Ждём появления карточки и добавляем кнопку
    function addEquipmentButton() {
      var cards = document.querySelectorAll('.house-card__cta');
      for (var i = 0; i < cards.length; i++) {
        if (cards[i].textContent.trim() === 'Подробнее') {
          cards[i].textContent = 'Рассчитать стоимость'; cards[i].style.padding='.35rem .8rem'; cards[i].style.letterSpacing='.02em';
          cards[i].href = cards[i].href || '#';
          // Проверяем, не добавили ли уже кнопку
          if (!cards[i].previousElementSibling || cards[i].previousElementSibling.textContent.trim() !== 'Доставка') {
            var btn = document.createElement('button');
            btn.className = 'house-card__cta';
            btn.style.cssText = 'cursor:pointer;background:none;border:none;color:var(--color-text-muted);padding:0;font-size:13px;font-family:inherit';
            btn.textContent = 'Комплектация';
            btn.onmouseover = function(){this.style.borderColor='#999'};
            btn.onmouseout = function(){this.style.borderColor='#ccc'};
            btn.onclick = function(e){e.stopPropagation();openEquipment()};
            cards[i].parentNode.insertBefore(btn, cards[i]);
            
            var btn2 = document.createElement('button');
            btn2.className = 'house-card__cta';
            btn2.style.cssText = 'cursor:pointer;background:none;border:none;color:var(--color-text-muted);padding:0;font-size:13px;font-family:inherit';
            btn2.textContent = 'Доставка';
            btn2.onmouseover = function(){this.style.borderColor='#999'};
            btn2.onmouseout = function(){this.style.borderColor='#ccc'};
            btn2.onclick = function(e){e.stopPropagation();openDelivery()};
            cards[i].parentNode.insertBefore(btn2, cards[i]);

            var btn3 = document.createElement('button');
            btn3.className = 'house-card__cta';
            btn3.style.cssText = 'cursor:pointer;background:none;border:none;color:var(--color-text-muted);padding:0;font-size:13px;font-family:inherit';
            btn3.textContent = 'Оплата';
            btn3.onmouseover = function(){this.style.borderColor='#999'};
            btn3.onmouseout = function(){this.style.borderColor='#ccc'};
            btn3.onclick = function(e){e.stopPropagation();openPayment()};
            cards[i].parentNode.insertBefore(btn3, cards[i]);
          }
        }
      }
    }

        // Проверка каждые 2 секунды
    function fixHomePage(){
      var footers=document.querySelectorAll('.house-card__footer');
      for(var i=0;i<footers.length;i++){
        if(footers[i].classList.contains('btn-fixed')) continue;
        
        footers[i].style.justifyContent='space-between';
        footers[i].style.alignItems='center';
        
        // Меняем текст Подробнее на Рассчитать стоимость
        var link=footers[i].querySelector('.house-card__cta');
        if(link && link.textContent.trim()==='Подробнее'){
          link.textContent='Рассчитать стоимость';
        }
        if(!link) continue;
        
        // Создаём обёртку и добавляем кнопки
        var wrap=document.createElement('div');
        wrap.className='btn-group';
        wrap.style.cssText='display:flex;gap:4px;align-items:center;flex-wrap:wrap';
        
        var btns=['Комплектация','Доставка','Оплата'];
        var handlers=[openEquipment,openDelivery,openPayment];
        for(var j=0;j<btns.length;j++){
          var btn=document.createElement('button');
          btn.textContent=btns[j];
          btn.style.cssText='cursor:pointer;background:none;border:none;color:var(--color-text-muted);padding:0;font-size:13px;font-family:inherit';
          btn.onmouseover=function(){this.style.color='#000'};
          btn.onmouseout=function(){this.style.color='var(--color-text-muted)'};
          btn.onclick=(function(h){return function(e){e.stopPropagation();h()}})(handlers[j]);
          wrap.appendChild(btn);
        }
        
        // Стилизуем Рассчитать стоимость и помещаем в обёртку
        link.style.background='none';
        link.style.backgroundColor='transparent';
        link.style.color='var(--color-text-muted)';
        link.style.border='none';
        link.style.padding='0';
        link.style.fontSize='13px';
        wrap.appendChild(link);
        
        footers[i].appendChild(wrap);
        footers[i].classList.add('btn-fixed');
      }
    }
    
    try{fixHomePage()}catch(e){}
    setInterval(function(){try{fixHomePage()}catch(e){}}, 2000);
  </body>
</html>
