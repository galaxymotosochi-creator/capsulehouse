    function initVideo(){
      var v = [['Капсула 39 м²','Модель с балконом','videos/v11-overview.mp4','images/v11-thumb.jpg'],['Капсула 38 м² с балконом','Пространство с видом на природу','videos/petal-720.mp4','images/petal-thumb.jpg'],['Личный офис 38 м²','Пространство для встреч','videos/petal3-720.mp4','images/petal3-thumb.jpg'],['Уютный глэмпинг 28 м²','Комфорт на свежем воздухе','videos/petal4-720.mp4','images/petal4-thumb.jpg'],['Жилая капсула 39 м²','Максимум пространства и уюта','videos/petal5-720.mp4','images/petal5-thumb.jpg'],['Бизнес - пространство 38 м²','Зона для отдела продаж','videos/petal6-720.mp4','images/petal6-thumb.jpg']];
      var g = document.getElementById('vsGrid');
      if(g && g.children.length===0){
        for(var i=0;i<v.length;i++){
          var d = document.createElement('div');
          d.className = 'vs-card';
          d.innerHTML = '<div class="vs-prev"' + (v[i][3]?' style="background-image:url('+v[i][3]+');background-size:cover;background-position:center"':'') + '><div class="vs-pb"><svg viewBox="0 0 24 24" width="24" height="24"><polygon points="5 3 19 12 5 21 5 3" fill="#fff"/></svg></div></div><div class="vs-info"><h4>' + v[i][0] + '</h4><span>' + v[i][1] + '</span></div>';
          d.onclick = (function(idx){return function(){
            var src = v[idx][2];
            if(src){
              document.getElementById('vmPlayer').querySelector('source').src = src;
              document.getElementById('vmPlayer').load();
              document.getElementById('vmPlayer').play();
            }
            document.getElementById('vmModal').classList.add('active');
          }})(i);
          g.appendChild(d);
        }
      }
      // Клик по горизонтальной карточке
      document.getElementById('vsHoriz').onclick = function(){
        var player = document.getElementById('vmPlayer');
        player.querySelector('source').src = 'videos/horizontal-video.mp4';
        player.load();
        player.play();
        document.getElementById('vmModal').classList.add('active');
      };
      // Перемещаем секцию под hero
      var vs = document.querySelector('.vs');
      var hero = document.querySelector('.hero');
      if(vs && hero && vs.parentNode !== hero.parentNode){
        var parent = hero.parentNode;
        var next = hero.nextElementSibling;
        if(next){
          parent.insertBefore(vs, next);
        } else {
          parent.appendChild(vs);
        }
      }
    }
    // Ждём пока React отрендерит
    setTimeout(function(){document.querySelector('.vs').style.display='';initVideo();}, 500);
    setInterval(function(){
      var vs = document.querySelector('.vs');
      var hero = document.querySelector('.hero');
      if(vs && hero && vs.previousElementSibling !== hero){
        var parent = hero.parentNode;
        var next = hero.nextElementSibling;
        if(next) parent.insertBefore(vs, next);
        else parent.appendChild(vs);
      }
    }, 2000);
    </script>

      'Симферополь':9500,'Севастополь':9600
    };
    // Выбранный город и константы
    var calcSelectedCity = '';
    var calcChinaDelivery = 350000;
    var calcTaxRate = 0.27;

    // Какой массив опций активен на текущем шаге
    function getStepOptions(step) {
      if (step === 0) return calcWinter;
      if (step === 1) return calcInterior;
      return [];
    }

    function toggleOption(id) {
      var opts = getStepOptions(calcStep);
      for (var i = 0; i < opts.length; i++) {
        if (opts[i].id === id) {
          opts[i].on = !opts[i].on;
          break;
        }
      }
      renderCalc();
    }

    function openCalc() { document.getElementById('calcOverlay').classList.add('active'); renderCalc(); }
    function closeCalc() { document.getElementById('calcOverlay').classList.remove('active'); }

    function getTotalOptions() {
      var total = 0;
      var steps = [calcWinter, calcInterior];
      for (var s = 0; s < steps.length; s++) {
        for (var i = 0; i < steps[s].length; i++) {
          if (steps[s][i].on) total += steps[s][i].price;
        }
      }
      return total;
    }

    function getTaxBase() {
      return calcModel.basePrice + getTotalOptions() + calcChinaDelivery;
    }

    function getRussiaDelivery() {
      if (calcSelectedCity && calcDist[calcSelectedCity]) {
        return 120 * calcDist[calcSelectedCity];
      }
      return 0;
    }

    function getTaxAmount() {
      return Math.round(getTaxBase() * calcTaxRate);
    }

    function getGrandTotal() {
      return calcModel.basePrice + getTotalOptions() + calcChinaDelivery + getRussiaDelivery() + getTaxAmount();
    }

    function selectCity(city) {
      calcSelectedCity = city;
      var input = document.getElementById('citySearch');
      if (input) input.value = city;
      renderCalc();
    }

    function renderCalc() {
      var steps = document.querySelectorAll('.calc-step');
      steps.forEach(function(s, i) {
        s.classList.toggle('active', i === calcStep);
        s.classList.toggle('done', i < calcStep);
      });
      if (calcStep === 0) renderStep0();
      else if (calcStep === 1) renderStep1();
      else if (calcStep === 2) renderStep2();
      else if (calcStep === 3) renderStep3();
      document.getElementById('calcPrev').disabled = calcStep === 0;
      document.getElementById('calcNext').textContent = calcStep === 3 ? 'Готово' : 'Далее';
    }

    function renderStep0() {
      var opts = getStepOptions(0);
      var html = '';
      // Модель по центру
      html += '<div style="margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid #eee;text-align:center">';
      html += '<h3 style="margin:0 0 2px;color:#333;font-size:17px;font-weight:700">' + calcModel.name + '</h3>';
      html += '<p style="margin:0;color:#888;font-size:13px">Площадь: ' + calcModel.area + ' м²</p>';
      html += '</div>';
      // Заголовок
      html += '<p style="margin:0 0 12px;font-size:14px;font-weight:600;color:#000;text-align:center">ВЫБЕРИТЕ ЗИМНЕЕ УТЕПЛЕНИЕ КАПСУЛЫ</p>';
      // Опции
      for (var i = 0; i < opts.length; i++) {
        var o = opts[i];
        var priceClass = o.on ? 'calc-option__price--on' : 'calc-option__price--off';
        var checked = o.on ? 'checked' : '';
        html += '<div class="calc-option">';
        html += '<span style="white-space:nowrap;display:flex;align-items:center;gap:4px"><span class="calc-option__label">' + o.label + ' </span><span class="calc-option__price ' + priceClass + '">+' + o.price.toLocaleString('ru-RU') + ' ₽</span></span>';
        html += '<label class="calc-toggle">';
        html += '<input type="checkbox" ' + checked + ' onchange="toggleOption(\'' + o.id + '\')">';
        html += '<span class="calc-toggle__slider"></span>';
        html += '</label>';
        html += '</div>';
      }
      document.getElementById('calcBody').innerHTML = html;
    }

    function renderStep1() {
      var opts = getStepOptions(1);
      var html = '';
      // Заголовок
      html += '<p style="margin:0 0 12px;font-size:14px;font-weight:600;color:#000;text-align:center">ВЫБЕРИТЕ ИНТЕРЬЕР КАПСУЛЫ</p>';
      // Опции
      for (var i = 0; i < opts.length; i++) {
        var o = opts[i];
        var priceClass = o.on ? 'calc-option__price--on' : 'calc-option__price--off';
        var checked = o.on ? 'checked' : '';
        html += '<div class="calc-option">';
        html += '<span style="white-space:nowrap;display:flex;align-items:center;gap:4px"><span class="calc-option__label">' + o.label + ' </span><span class="calc-option__price ' + priceClass + '">+' + o.price.toLocaleString('ru-RU') + ' ₽</span></span>';
        html += '<label class="calc-toggle">';
        html += '<input type="checkbox" ' + checked + ' onchange="toggleOption(\'' + o.id + '\')">';
        html += '<span class="calc-toggle__slider"></span>';
        html += '</label>';
        html += '</div>';
      }
      document.getElementById('calcBody').innerHTML = html;
    }

    function renderStep2() {
      var html = '';
      html += '<p style="margin:0 0 16px;font-size:14px;font-weight:600;color:#000;text-align:center">ДОСТАВКА И НАЛОГИ</p>';
      
      html += '<p style="margin:0 0 8px;font-size:13px;color:#333">Выберите Ваш город или ближайший город от Вас</p>';
      
      // Поиск города
      html += '<input type="text" id="citySearch" placeholder="Начните вводить город…" oninput="filterCities()" style="width:100%;padding:10px 12px;font-size:13px;font-family:Inter,sans-serif;border:1px solid #ddd;border-radius:8px;color:#333;background:#fff;margin-bottom:4px;box-sizing:border-box">';
      html += '<div id="cityList" style="max-height:180px;overflow-y:auto;border:1px solid #eee;border-radius:8px;margin-bottom:10px;text-align:left"></div>';
      
      // Если город выбран — результаты
      if (calcSelectedCity) {
        var rusDel = getRussiaDelivery();
        var totalDel = rusDel + calcChinaDelivery;
        var tax = getTaxAmount();
        html += '<div style="padding:10px 12px;background:#f9f9f9;border-radius:8px;margin-bottom:8px">';
        html += '<div style="display:flex;justify-content:space-between;align-items:center;font-size:13px">';
        html += '<span style="color:#555">Доставка</span>';
        html += '<span style="font-weight:600;color:#000">' + totalDel.toLocaleString('ru-RU') + ' ₽</span>';
        html += '</div></div>';
        html += '<div style="padding:10px 12px;background:#f9f9f9;border-radius:8px;margin-bottom:8px">';
        html += '<div style="display:flex;justify-content:space-between;align-items:center;font-size:13px">';
        html += '<span style="color:#555">Таможенные пошлины (27%)</span>';
        html += '<span style="font-weight:600;color:#000">' + tax.toLocaleString('ru-RU') + ' ₽</span>';
        html += '</div></div>';
      }
      
      // Стикер
      html += '<div style="margin-top:14px;padding:10px 12px;background:#fff7e6;border-radius:8px;font-size:12px;color:#b8860b;text-align:center;line-height:1.5">';
      html += 'При заказе от 2 домов стоимость доставки делится на 2!<br>Уточняйте у менеджера';
      html += '</div>';
      
      document.getElementById('calcBody').innerHTML = html;
      filterCities();
    }

    function filterCities() {
      var input = document.getElementById('citySearch');
      var list = document.getElementById('cityList');
      if (!input || !list) return;
      var q = input.value.toLowerCase().trim();
      var html = '';
      var found = 0;
      if (q !== '') {
        for (var city in calcDist) {
          if (city.toLowerCase().indexOf(q) !== -1) found++;
        }
        if (found === 0) {
          html = '<div style="padding:12px;font-size:12px;color:#999;text-align:left;border-bottom:1px solid #eee">Город не найден. <span style="color:#333;cursor:pointer;text-decoration:underline" onclick="alert(\'Уточните у менеджера\')">Уточнить у менеджера</span></div>';
        }
      }
      list.innerHTML = html;
    }

    function renderStep3() {
      var rusDel = getRussiaDelivery();
      var tax = getTaxAmount();
      var optionsTotal = getTotalOptions();
      var grand = getGrandTotal();
      
      var html = '';
      html += '<p style="margin:0 0 16px;font-size:14px;font-weight:600;color:#000;text-align:center">ИТОГОВАЯ СТОИМОСТЬ</p>';
      
      function row(label, val, cls) {
        return '<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f0f0f0;font-size:13px">' +
          '<span style="color:' + (cls || '#555') + '">' + label + '</span>' +
          '<span style="font-weight:600;color:' + (cls || '#333') + '">' + val.toLocaleString('ru-RU') + ' ₽</span></div>';
      }
      
      html += row(calcModel.name + ' (базовая)', calcModel.basePrice);
      html += row('Доп. опции', optionsTotal);
      html += row('Доставка по Китаю', calcChinaDelivery);
      if (calcSelectedCity) {
        html += row('Доставка по России (' + calcSelectedCity + ')', rusDel);
      }
      html += row('Таможенные пошлины 27%', tax);
      
      // Итог
      html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:14px 0;margin-top:8px;font-size:16px;font-weight:700;border-top:2px solid #000">';
      html += '<span>ИТОГО</span>';
      html += '<span>' + grand.toLocaleString('ru-RU') + ' ₽</span>';
      html += '</div>';
      
      document.getElementById('calcBody').innerHTML = html;
    }

    function nextStep() {
      if (calcStep < 3) { calcStep++; renderCalc(); }
      else closeCalc();
    }

    function prevStep() {
      if (calcStep > 0) { calcStep--; renderCalc(); }
    }

    // ====== Добавляем тестовую кнопку на карточку V11 ======
    setTimeout(function addTestBtn() {
      // Ищем карточку V11 по ссылке с slug galaxy-s1
      var link = document.querySelector('a[href="/capsulehouse/house/galaxy-s1"]');
      if (!link) { link = document.querySelector('a[href$="galaxy-s1"]'); }
      if (!link) { setTimeout(addTestBtn, 1000); return; }

      // Ищем название дома внутри карточки
      var card = link.closest('[class*="house-card"]') || link.closest('a, div, article');
      if (!card) { setTimeout(addTestBtn, 1000); return; }

      // Если кнопка уже есть — не добавляем
      if (card.querySelector('.calc-test-btn')) return;

      var testBtn = document.createElement('button');
      testBtn.className = 'calc-test-btn';
      testBtn.textContent = '🧪 Тест расчёта';
      testBtn.onclick = function(e) { e.preventDefault(); e.stopPropagation(); openCalc(); };
      testBtn.style.cssText = 'display:inline-block;padding:4px 12px;font-size:11px;font-weight:500;font-family:Inter,sans-serif;background:#f0f0f0;border:1px solid #ddd;border-radius:6px;color:#888;cursor:pointer;margin-top:4px;transition:all .15s';
      testBtn.onmouseenter = function() { this.style.background = '#e0e0e0'; };
      testBtn.onmouseleave = function() { this.style.background = '#f0f0f0'; };

      // Вставляем после названия дома
      var nameEl = card.querySelector('h3, h4, [class*="name"], [class*="title"]');
      if (nameEl && nameEl.parentNode) {
        nameEl.parentNode.insertBefore(testBtn, nameEl.nextSibling);
      } else {
        card.appendChild(testBtn);
      }
    }, 2000);
    </script>

  </body>
</html>
