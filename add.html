<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8:8 — Новый товар</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:#f8f9fa;color:#212529;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem}
  .card{background:#fff;border-radius:.75rem;padding:2rem;box-shadow:0 .5rem 1rem rgba(0,0,0,.08);border:1px solid #dee2e6;width:100%;max-width:520px}
  h1{font-size:1.3rem;font-weight:600;margin-bottom:.25rem}
  .sub{font-size:.85rem;color:#6c757d;margin-bottom:1.25rem}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
  .full{grid-column:1/-1}
  label{display:block;font-size:.8rem;font-weight:500;color:#212529;margin-bottom:.35rem}
  input,select{width:100%;padding:.65rem .85rem;font-family:inherit;font-size:.85rem;border:1px solid #dee2e6;border-radius:.75rem;background:#fff;color:#212529;outline:none;transition:border-color .15s}
  input:focus,select:focus{border-color:#1983dd;box-shadow:0 0 0 3px rgba(25,131,221,.1)}
  input[readonly]{background:#f8f9fa}
  .btn{display:inline-flex;align-items:center;justify-content:center;font-size:.9rem;font-weight:500;padding:.7rem 1.5rem;border-radius:.75rem;border:none;cursor:pointer;text-decoration:none;transition:all .2s}
  .btn-primary{background:#1983dd;color:#fff;box-shadow:0 2px 8px rgba(25,131,221,.25);flex:1}
  .btn-primary:hover{background:#1469b1;transform:translateY(-1px)}
  .btn-outline{background:transparent;color:#1983dd;border:1px solid #1983dd;flex:1}
  .box{display:flex;gap:.75rem;margin-top:.5rem}
  .photo{border:2px dashed #dee2e6;border-radius:.75rem;padding:1.5rem;text-align:center;cursor:pointer;color:#6c757d;font-size:.85rem;transition:all .15s}
  .photo:hover{border-color:#1983dd;background:#eaf5ff}
  .back{display:inline-flex;align-items:center;gap:.4rem;font-size:.85rem;color:#6c757d;cursor:pointer;margin-bottom:1rem;background:none;border:none;font-family:inherit;padding:0}
  .back:hover{color:#212529}
  @media(max-width:480px){.grid{grid-template-columns:1fr}.box{flex-direction:column}}
</style>
</head>
<body>
<div class="card">
  <button class="back" onclick="history.back()">&larr; Назад</button>
  <h1>Новый товар</h1>
  <div class="sub">Заполните информацию о товаре</div>
  
  <div class="grid">
    <div class="full">
      <label>Название товара *</label>
      <input type="text" id="name" placeholder="Доска обрезная 50x150">
    </div>
    <div>
      <label>Категория</label>
      <select id="cat">
        <option>Без категории</option>
        <option>Пиломатериалы</option>
        <option>Крепеж</option>
        <option>Сантехника</option>
        <option>Электрика</option>
        <option>Отделка</option>
        <option>Инструмент</option>
      </select>
    </div>
    <div>
      <label>Единица</label>
      <select id="unit">
        <option>шт</option><option>м</option><option>м2</option><option>м3</option><option>кг</option><option>л</option>
      </select>
    </div>
    <div>
      <label>Цена закупки</label>
      <input type="number" id="cost" placeholder="0" min="0">
    </div>
    <div>
      <label>Цена продажи</label>
      <input type="number" id="price" placeholder="0" min="0" oninput="calc()">
    </div>
    <div>
      <label>Наценка</label>
      <input type="text" id="margin" readonly>
    </div>
    <div>
      <label>Штрихкод</label>
      <input type="text" id="barcode" placeholder="Введите код">
    </div>
    <div class="full">
      <label>Фото</label>
      <div class="photo" onclick="document.getElementById('photo').click()">
        <span id="photoLabel">+ Нажмите для загрузки фото</span>
      </div>
      <input type="file" id="photo" accept="image/*" style="display:none" onchange="loadPhoto(event)">
    </div>
  </div>
  
  <div class="box">
    <button class="btn btn-primary" onclick="save()">Сохранить товар</button>
    <button class="btn btn-outline" onclick="history.back()">Отмена</button>
  </div>
</div>

<script>
var photoData = '';
function calc() {
  var c = parseFloat(document.getElementById('cost').value) || 0;
  var p = parseFloat(document.getElementById('price').value) || 0;
  document.getElementById('margin').value = c && p ? Math.round((p-c)/c*100) + '%' : '';
}
function loadPhoto(e) {
  var f = e.target.files[0];
  if (!f) return;
  var r = new FileReader();
  r.onload = function(ev) {
    photoData = ev.target.result;
    document.getElementById('photoLabel').textContent = 'Фото загружено';
  };
  r.readAsDataURL(f);
}
function save() {
  var name = document.getElementById('name').value.trim();
  if (!name) { alert('Введите название'); return; }
  var items = JSON.parse(localStorage.getItem('products8') || '[]');
  items.push({
    id: Date.now(),
    name: name,
    cat: document.getElementById('cat').value,
    unit: document.getElementById('unit').value,
    cost: parseFloat(document.getElementById('cost').value) || 0,
    price: parseFloat(document.getElementById('price').value) || 0,
    barcode: document.getElementById('barcode').value.trim(),
    photo: photoData,
    createdAt: new Date().toISOString()
  });
  localStorage.setItem('products8', JSON.stringify(items));
  alert('Товар "' + name + '" сохранен!');
  document.getElementById('name').value = '';
  document.getElementById('cost').value = '';
  document.getElementById('price').value = '';
  document.getElementById('margin').value = '';
  document.getElementById('barcode').value = '';
}
</script>
</body>
</html>
