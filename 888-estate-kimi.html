<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>888.ESTATE — Премиальная недвижимость</title>
  
  <!-- Cormorant Garamond (300,600,700) + Montserrat (200,300,400) via Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;0,700;1,300;1,600;1,700&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">

  <style>
    /* Reset & Base */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #070707;
      --gold: #c9a84c;
      --gold-dim: rgba(201, 168, 76, 0.5);
      --gold-faint: rgba(201, 168, 76, 0.15);
      --white: #ffffff;
      --white-mid: rgba(255, 255, 255, 0.7);
      --white-dim: rgba(255, 255, 255, 0.4);
      --white-faint: rgba(255, 255, 255, 0.08);
    }

    html {
      scroll-behavior: smooth;
      scrollbar-width: thin;
      scrollbar-color: var(--gold) var(--bg);
    }

    html::-webkit-scrollbar {
      width: 4px;
    }

    html::-webkit-scrollbar-track {
      background: var(--bg);
    }

    html::-webkit-scrollbar-thumb {
      background: var(--gold);
      border-radius: 2px;
    }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    ::selection {
      background: rgba(201, 168, 76, 0.3);
      color: var(--white);
    }

    /* ========== HERO ========== */
    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      min-height: 680px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #particleCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .hero-vignette {
      position: absolute;
      inset: 0;
      z-index: 1;
      background: radial-gradient(ellipse at center, transparent 0%, transparent 40%, rgba(7,7,7,0.6) 100%);
      pointer-events: none;
    }

    .hero-noise {
      position: absolute;
      inset: 0;
      z-index: 1;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    /* Navigation */
    .nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 100;
      padding: 28px 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: background 0.6s ease, backdrop-filter 0.6s ease;
    }

    .nav.scrolled {
      background: rgba(7,7,7,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 18px 48px;
      border-bottom: 1px solid rgba(201,168,76,0.08);
    }

    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 700;
      font-size: 1.6rem;
      color: var(--gold);
      text-decoration: none;
      letter-spacing: 3px;
      transition: all 0.4s ease;
      position: relative;
    }

    .nav-logo::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 1px;
      background: var(--gold);
      transition: width 0.4s ease;
    }

    .nav-logo:hover {
      text-shadow: 0 0 20px rgba(201,168,76,0.3);
    }

    .nav-logo:hover::after {
      width: 100%;
    }

    .nav-links {
      display: flex;
      gap: 36px;
      list-style: none;
    }

    .nav-links a {
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      font-size: 0.78rem;
      color: var(--white-mid);
      text-decoration: none;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      position: relative;
      padding: 6px 0;
      transition: color 0.4s ease;
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%) scaleX(0);
      width: 100%;
      height: 1px;
      background: var(--gold);
      transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .nav-links a:hover {
      color: var(--gold);
    }

    .nav-links a:hover::after {
      transform: translateX(-50%) scaleX(1);
    }

    .nav-toggle {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 6px;
      z-index: 102;
      background: none;
      border: none;
    }

    .nav-toggle span {
      display: block;
      width: 24px;
      height: 1px;
      background: var(--gold);
      transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .nav-toggle.active span:nth-child(1) {
      transform: rotate(45deg) translate(4px, 4px);
    }

    .nav-toggle.active span:nth-child(2) {
      opacity: 0;
    }

    .nav-toggle.active span:nth-child(3) {
      transform: rotate(-45deg) translate(4px, -4px);
    }

    /* Hero Content */
    .hero-content {
      position: relative;
      z-index: 10;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 0 24px;
    }

    .logo-wrapper {
      position: relative;
      display: inline-block;
      perspective: 800px;
      margin-bottom: 24px;
    }

    .logo-3d {
      transform-style: preserve-3d;
      transition: transform 0.1s ease-out;
      will-change: transform;
    }

    .logo-main {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 700;
      font-size: clamp(4.5rem, 12vw, 9rem);
      line-height: 1;
      color: var(--gold);
      letter-spacing: 6px;
      text-shadow:
        0 0 40px rgba(201,168,76,0.25),
        0 0 80px rgba(201,168,76,0.1),
        0 0 120px rgba(201,168,76,0.05);
      animation: breathe 5s ease-in-out infinite;
      display: block;
    }

    .logo-dot {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2rem, 5vw, 3.8rem);
      color: var(--white-mid);
      letter-spacing: 8px;
      text-transform: uppercase;
      margin-left: 4px;
      display: inline-block;
      animation: breathe 5s ease-in-out infinite 0.5s;
    }

    @keyframes breathe {
      0%, 100% { 
        text-shadow: 0 0 40px rgba(201,168,76,0.2), 0 0 80px rgba(201,168,76,0.08);
        opacity: 1;
      }
      50% { 
        text-shadow: 0 0 60px rgba(201,168,76,0.35), 0 0 120px rgba(201,168,76,0.15), 0 0 180px rgba(201,168,76,0.08);
        opacity: 0.92;
      }
    }

    .hero-subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(1.1rem, 2.5vw, 1.5rem);
      color: var(--white-mid);
      letter-spacing: 6px;
      text-transform: uppercase;
      margin-bottom: 32px;
      opacity: 0;
      animation: fadeSlideUp 1s ease 0.5s forwards;
    }

    .hero-line {
      width: 80px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 0 auto 32px;
      opacity: 0;
      animation: expandWidth 1.2s ease 0.8s forwards;
    }

    @keyframes expandWidth {
      from { width: 0; opacity: 0; }
      to { width: 80px; opacity: 1; }
    }

    .hero-locations {
      font-family: 'Montserrat', sans-serif;
      font-weight: 200;
      font-size: clamp(0.72rem, 1.5vw, 0.85rem);
      color: var(--white-dim);
      letter-spacing: 5px;
      text-transform: uppercase;
      opacity: 0;
      animation: fadeSlideUp 1s ease 1.1s forwards;
    }

    .hero-locations span {
      display: inline-block;
      position: relative;
    }

    .hero-locations span:not(:last-child)::after {
      content: '·';
      margin: 0 12px;
      color: var(--gold-dim);
      font-weight: 400;
    }

    /* Social Icons - Right Vertical */
    .hero-socials {
      position: absolute;
      right: 40px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 24px;
      align-items: center;
    }

    .hero-socials::before {
      content: '';
      width: 1px;
      height: 40px;
      background: linear-gradient(to bottom, transparent, var(--gold-dim));
    }

    .hero-socials::after {
      content: '';
      width: 1px;
      height: 40px;
      background: linear-gradient(to top, transparent, var(--gold-dim));
    }

    .social-icon {
      font-size: 1.3rem;
      color: var(--white-dim);
      text-decoration: none;
      transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      position: relative;
    }

    .social-icon::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid transparent;
      transition: all 0.4s ease;
    }

    .social-icon:hover {
      color: var(--gold);
      transform: scale(1.15) translateY(-2px);
    }

    .social-icon:hover::before {
      border-color: var(--gold-faint);
      box-shadow: 0 0 20px rgba(201,168,76,0.15);
    }

    /* Scroll Indicator */
    .scroll-indicator {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      opacity: 0;
      animation: fadeSlideUp 1s ease 1.6s forwards;
    }

    .scroll-text {
      font-family: 'Montserrat', sans-serif;
      font-weight: 200;
      font-size: 0.65rem;
      color: var(--white-dim);
      letter-spacing: 4px;
      text-transform: uppercase;
      writing-mode: vertical-rl;
      text-orientation: mixed;
    }

    .scroll-arrow {
      width: 1
